<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#F3F1EC">
  <title>Вход по приглашению — AppСтрой</title>
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; }
    body {
      min-height: 100vh;
      min-height: 100dvh;
      display: grid;
      place-items: center;
      padding: 24px;
      color: #20242a;
      background:
        radial-gradient(circle at 82% 14%, rgba(255,255,255,.95), transparent 34%),
        linear-gradient(145deg, #fbfaf8 0%, #e7e5df 100%);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    .card {
      width: min(100%, 430px);
      padding: 30px;
      text-align: center;
      border: 1px solid rgba(255,255,255,.94);
      border-radius: 30px;
      background: rgba(255,255,255,.78);
      box-shadow: 0 28px 70px rgba(25,29,36,.14);
      backdrop-filter: blur(24px);
    }
    .mark {
      width: 72px;
      height: 72px;
      margin: 0 auto 20px;
      display: grid;
      place-items: center;
      border-radius: 22px;
      color: #fff;
      background: linear-gradient(145deg, #686b70, #a7a9ac);
      box-shadow: 0 14px 30px rgba(35,39,46,.20);
      font-size: 34px;
      font-weight: 800;
    }
    h1 { margin: 0; font-size: 25px; line-height: 1.2; }
    p { margin: 12px 0 0; color: #6b7075; line-height: 1.5; }
    .progress {
      position: relative;
      width: 150px;
      height: 3px;
      margin: 24px auto 0;
      overflow: hidden;
      border-radius: 999px;
      background: rgba(31,37,47,.10);
    }
    .progress::after {
      content: "";
      position: absolute;
      inset: 0;
      width: 45%;
      border-radius: inherit;
      background: #7c7f83;
      animation: travel 1.2s ease-in-out infinite;
    }
    .error { color: #874540; }
    .hidden { display: none; }
    a {
      display: inline-flex;
      margin-top: 20px;
      padding: 13px 20px;
      border-radius: 14px;
      color: #fff;
      background: #30343a;
      text-decoration: none;
      font-weight: 700;
    }
    @keyframes travel {
      from { transform: translateX(-115%); }
      to { transform: translateX(340%); }
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="mark" aria-hidden="true">A</div>
    <h1 id="title">Принимаем приглашение</h1>
    <p id="message">Проверяем одноразовую ссылку и выполняем безопасный вход в AppСтрой.</p>
    <div id="progress" class="progress" aria-hidden="true"></div>
    <a id="back" class="hidden" href="./">Открыть AppСтрой</a>
  </main>

  <script>
    (async function () {
      const supabaseUrl = 'https://dxbrhsefgxcaxzmrbfrb.supabase.co';
      const publishableKey = 'sb_publishable_QBdH-vIQv4F_tVVNc4Ps_w_ssxwSaEm';
      const query = new URLSearchParams(window.location.search);
      const companyId = (query.get('companyInvite') || '').trim();
      const tokenHash = (query.get('inviteTokenHash') || '').trim();
      const verificationType = (query.get('inviteType') || '').trim().toLowerCase();
      const title = document.getElementById('title');
      const message = document.getElementById('message');
      const progress = document.getElementById('progress');
      const back = document.getElementById('back');

      function fail(text) {
        title.textContent = 'Не удалось открыть приглашение';
        message.textContent = text;
        message.classList.add('error');
        progress.classList.add('hidden');
        back.classList.remove('hidden');
      }

      if (!companyId || !tokenHash || !verificationType) {
        fail('Ссылка неполная или устарела. Создайте новое приглашение в приложении.');
        return;
      }

      try {
        const response = await fetch(`${supabaseUrl}/auth/v1/verify`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'apikey': publishableKey,
            'Authorization': `Bearer ${publishableKey}`,
          },
          body: JSON.stringify({
            token_hash: tokenHash,
            type: verificationType,
          }),
        });
        const data = await response.json().catch(() => ({}));
        if (!response.ok) {
          throw new Error(data.msg || data.message || data.error_description || data.error || 'Одноразовая ссылка недействительна');
        }
        if (!data.access_token || !data.refresh_token) {
          throw new Error('Сервис не вернул сессию пользователя');
        }

        const appUrl = new URL('./', window.location.href);
        appUrl.searchParams.set('companyInvite', companyId);
        const session = new URLSearchParams({
          access_token: data.access_token,
          refresh_token: data.refresh_token,
          expires_in: String(data.expires_in || 3600),
          token_type: data.token_type || 'bearer',
          type: verificationType,
        });
        if (data.expires_at) {
          session.set('expires_at', String(data.expires_at));
        }
        appUrl.hash = session.toString();
        window.location.replace(appUrl.toString());
      } catch (error) {
        fail(error instanceof Error ? error.message : String(error));
      }
    })();
  </script>
</body>
</html>
