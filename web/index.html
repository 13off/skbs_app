<!DOCTYPE html>
<html lang="ru">
<head>
  <script src="https://github.com/corbado/flutter-passkeys/releases/download/2.4.0/bundle.js"></script>

  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
  >

  <meta name="description" content="AppСтрой — управление сотрудниками, табелем, задачами, выплатами и документами на строительном объекте.">
  <meta name="theme-color" content="#24272B">
  <meta name="color-scheme" content="light">

  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="AppСтрой">
  <meta name="application-name" content="AppСтрой">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700;800&display=swap" rel="stylesheet">

  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="icon" type="image/png" href="favicon.png">

  <title>AppСтрой</title>
  <link rel="manifest" href="manifest.json">

  <style>
    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      min-height: 100%;
      overflow: hidden;
      background: #f3f1ec;
      font-family: "Manrope", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      overscroll-behavior: none;
      touch-action: manipulation;
      -webkit-text-size-adjust: 100%;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      position: relative;
      min-height: 100dvh;
    }

    flutter-view,
    flt-glass-pane {
      position: absolute !important;
      inset: 0 !important;
      width: 100% !important;
      height: 100% !important;
      max-width: 100% !important;
      max-height: 100% !important;
      overflow: hidden !important;
    }

    #app-loader {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      overflow: hidden;
      background:
        radial-gradient(circle at 75% 18%, rgba(255,255,255,.96) 0, rgba(255,255,255,0) 34%),
        linear-gradient(145deg, #faf9f6 0%, #e8e5de 100%);
      color: #24272b;
      transition: opacity 420ms cubic-bezier(.22,1,.36,1), visibility 420ms ease;
    }

    #app-loader::before {
      content: "";
      position: absolute;
      inset: 0;
      opacity: .34;
      background-image:
        linear-gradient(rgba(36,39,43,.045) 1px, transparent 1px),
        linear-gradient(90deg, rgba(36,39,43,.045) 1px, transparent 1px);
      background-size: 34px 34px;
      mask-image: linear-gradient(to bottom, black, transparent 86%);
      -webkit-mask-image: linear-gradient(to bottom, black, transparent 86%);
    }

    #app-loader.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .loader-card {
      position: relative;
      width: min(78vw, 336px);
      padding: 34px 28px 30px;
      border-radius: 34px;
      background: rgba(255, 255, 255, 0.78);
      border: 1px solid rgba(255, 255, 255, 0.94);
      box-shadow:
        0 30px 80px rgba(20, 22, 25, 0.15),
        inset 0 1px 0 rgba(255,255,255,.9);
      text-align: center;
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      animation: cardIn 760ms cubic-bezier(.22,1,.36,1) both;
    }

    .loader-mark {
      position: relative;
      width: 84px;
      height: 84px;
      margin: 0 auto 24px;
      border-radius: 27px;
      background: rgba(255,255,255,.78);
      border: 1px solid rgba(255,255,255,.94);
      box-shadow: 0 18px 42px rgba(24, 26, 29, 0.18);
    }

    .loader-mark-inner {
      position: absolute;
      inset: 17px;
    }

    .brick {
      position: absolute;
      height: 9px;
      border-radius: 4px;
      opacity: 0;
      transform: translateY(14px) scale(.76);
      background: linear-gradient(135deg, #2c3035, #5a5e64);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.20);
      animation: buildBrick 2.25s cubic-bezier(.34,1.56,.64,1) infinite alternate;
    }

    .brick.b1 { left: 4px;  top: 35px; width: 19px; animation-delay: 0ms; }
    .brick.b2 { right: 4px; top: 35px; width: 19px; animation-delay: 120ms; }
    .brick.b3 { left: 0; top: 22px; width: 23px; animation-delay: 240ms; }
    .brick.b4 { right: 0; top: 22px; width: 23px; animation-delay: 360ms; }
    .brick.b5 { left: 4px; top: 9px; width: 19px; animation-delay: 480ms; }
    .brick.b6 { right: 4px; top: 9px; width: 19px; animation-delay: 600ms; }

    .loader-title {
      font-size: 28px;
      line-height: 1.12;
      font-weight: 800;
      letter-spacing: -0.055em;
    }

    .loader-subtitle {
      margin-top: 9px;
      font-size: 13px;
      line-height: 1.5;
      font-weight: 600;
      color: rgba(36, 39, 43, 0.58);
    }

    .loader-dots {
      display: flex;
      justify-content: center;
      gap: 7px;
      margin-top: 24px;
    }

    .loader-dots span {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #25282c;
      opacity: .28;
      animation: dotPulse 1.1s ease-in-out infinite;
    }

    .loader-dots span:nth-child(2) { animation-delay: 140ms; }
    .loader-dots span:nth-child(3) { animation-delay: 280ms; }

    @keyframes buildBrick {
      0%, 5% { opacity: 0; transform: translateY(14px) scale(.76); }
      36%, 100% { opacity: 1; transform: translateY(0) scale(1); }
    }

    @keyframes dotPulse {
      0%, 100% { opacity: .24; transform: translateY(0); }
      50% { opacity: 1; transform: translateY(-4px); }
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(20px) scale(.97); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    @media (prefers-reduced-motion: reduce) {
      .loader-card,
      .brick,
      .loader-dots span {
        animation: none !important;
        opacity: 1;
        transform: none;
      }
    }
  </style>
</head>
<body>
  <div id="app-loader" aria-label="Загрузка AppСтрой">
    <div class="loader-card">
      <div class="loader-mark" aria-hidden="true">
        <div class="loader-mark-inner">
          <span class="brick b1"></span>
          <span class="brick b2"></span>
          <span class="brick b3"></span>
          <span class="brick b4"></span>
          <span class="brick b5"></span>
          <span class="brick b6"></span>
        </div>
      </div>
      <div class="loader-title">AppСтрой</div>
      <div class="loader-subtitle">собираем рабочее пространство</div>
      <div class="loader-dots" aria-hidden="true">
        <span></span><span></span><span></span>
      </div>
    </div>
  </div>

  <script>
    (function () {
      var loader = document.getElementById('app-loader');

      var hideLoader = function () {
        if (!loader) return;
        loader.classList.add('hidden');
        window.setTimeout(function () {
          if (loader && loader.parentNode) {
            loader.parentNode.removeChild(loader);
          }
        }, 480);
      };

      window.addEventListener('flutter-first-frame', hideLoader);
      window.setTimeout(hideLoader, 9000);
    })();
  </script>

  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
