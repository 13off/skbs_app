<!DOCTYPE html>
<html lang="ru">
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
  >

  <meta name="description" content="AppСтрой — управление сотрудниками, табелем, задачами, выплатами и документами на строительном объекте.">
  <meta name="theme-color" content="#F3F1EC">
  <meta name="color-scheme" content="light">

  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="AppСтрой">
  <meta name="application-name" content="AppСтрой">

  <link rel="apple-touch-icon" href="icons/AppStroy-192-v2.png">
  <link rel="icon" type="image/png" href="favicon-v2.png">
  <link rel="icon" type="image/svg+xml" href="icons/app_icon_matte_v2.svg">

  <title>AppСтрой</title>
  <link rel="manifest" href="manifest.json">

  <style>
    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      min-height: 100%;
      overflow: hidden;
      background: #f3f1ec;
      font-family: "Manrope", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      overscroll-behavior: none;
      touch-action: manipulation;
      -webkit-text-size-adjust: 100%;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      position: relative;
      min-height: 100dvh;
    }

    flutter-view,
    flt-glass-pane {
      position: absolute !important;
      inset: 0 !important;
      width: 100% !important;
      height: 100% !important;
      max-width: 100% !important;
      max-height: 100% !important;
      overflow: hidden !important;
    }

    #app-loader {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: grid;
      place-items: center;
      min-height: 100dvh;
      overflow: hidden;
      color: #171c25;
      background:
        radial-gradient(circle at 78% 16%, rgba(255,255,255,.98) 0, rgba(255,255,255,0) 31%),
        radial-gradient(circle at 18% 84%, rgba(104,107,111,.09) 0, rgba(104,107,111,0) 34%),
        linear-gradient(145deg, #fbfaf8 0%, #e9e7e2 100%);
      transition:
        opacity 520ms cubic-bezier(.22,1,.36,1),
        visibility 520ms ease;
    }

    #app-loader::before {
      content: "";
      position: absolute;
      inset: 0;
      opacity: .26;
      background-image:
        linear-gradient(rgba(31,37,47,.036) 1px, transparent 1px),
        linear-gradient(90deg, rgba(31,37,47,.036) 1px, transparent 1px);
      background-size: 42px 42px;
      mask-image: radial-gradient(circle at center, black 0, transparent 72%);
      -webkit-mask-image: radial-gradient(circle at center, black 0, transparent 72%);
    }

    #app-loader::after {
      content: "";
      position: absolute;
      width: min(74vw, 520px);
      aspect-ratio: 1;
      border-radius: 50%;
      background: rgba(255,255,255,.38);
      filter: blur(62px);
      transform: translateY(-4%);
      pointer-events: none;
    }

    #app-loader.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .loader-stage {
      position: relative;
      z-index: 1;
      width: min(86vw, 360px);
      text-align: center;
      animation: stageIn 900ms cubic-bezier(.22,1,.36,1) both;
    }

    .logo-shell {
      position: relative;
      width: 164px;
      height: 164px;
      margin: 0 auto 24px;
      display: grid;
      place-items: center;
      border-radius: 48px;
      background:
        linear-gradient(145deg, rgba(255,255,255,.90), rgba(255,255,255,.56));
      border: 1px solid rgba(255,255,255,.96);
      box-shadow:
        0 32px 70px rgba(20,26,36,.16),
        0 8px 22px rgba(20,26,36,.06),
        inset 0 1px 0 rgba(255,255,255,.98),
        inset 0 -1px 0 rgba(17,23,32,.035);
      backdrop-filter: blur(26px);
      -webkit-backdrop-filter: blur(26px);
      overflow: hidden;
    }

    .logo-shell::before {
      content: "";
      position: absolute;
      inset: -55% -120%;
      background: linear-gradient(
        105deg,
        transparent 43%,
        rgba(255,255,255,0) 46%,
        rgba(255,255,255,.82) 50%,
        rgba(255,255,255,0) 54%,
        transparent 57%
      );
      transform: translateX(-42%) rotate(6deg);
      animation: shellGlint 2.8s cubic-bezier(.22,1,.36,1) .65s both;
      pointer-events: none;
    }

    .brand-logo {
      width: 132px;
      height: 132px;
      overflow: visible;
      filter: drop-shadow(0 12px 15px rgba(34,36,39,.16));
    }

    .tower-shape {
      transform-box: fill-box;
      transform-origin: center bottom;
      opacity: 0;
      animation: buildTower 760ms cubic-bezier(.22,1,.36,1) forwards;
    }

    .tower-left {
      animation-delay: 160ms;
    }

    .tower-center {
      animation-delay: 280ms;
    }

    .tower-right {
      animation-delay: 420ms;
    }

    .mark-sheen {
      opacity: 0;
      animation: markSheen 880ms cubic-bezier(.22,1,.36,1) 920ms forwards;
    }

    .loader-title {
      font-family: "Manrope", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 37px;
      line-height: 1;
      font-weight: 350;
      letter-spacing: -.055em;
      color: #303235;
      opacity: 0;
      transform: translateY(10px);
      animation: textIn 700ms cubic-bezier(.22,1,.36,1) 1.02s forwards;
    }

    .loader-subtitle {
      margin-top: 12px;
      font-size: 11px;
      line-height: 1.5;
      font-weight: 700;
      letter-spacing: .16em;
      text-transform: lowercase;
      color: rgba(28,35,45,.56);
      opacity: 0;
      transform: translateY(8px);
      animation: textIn 700ms cubic-bezier(.22,1,.36,1) 1.16s forwards;
    }

    .loader-progress {
      position: relative;
      width: 132px;
      height: 2px;
      margin: 27px auto 0;
      overflow: hidden;
      border-radius: 999px;
      background: rgba(29,38,51,.10);
      opacity: 0;
      animation: textIn 500ms ease 1.32s forwards;
    }

    .loader-progress::after {
      content: "";
      position: absolute;
      inset: 0;
      width: 42%;
      border-radius: inherit;
      background: linear-gradient(90deg, #85878a, #d2d3d4, #6f7174);
      box-shadow: 0 0 14px rgba(61,63,66,.16);
      animation: progressTravel 1.55s cubic-bezier(.4,0,.2,1) infinite;
    }

    @keyframes stageIn {
      from { opacity: 0; transform: translateY(18px) scale(.975); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    @keyframes shellGlint {
      0% { transform: translateX(-44%) rotate(6deg); opacity: 0; }
      22% { opacity: .85; }
      100% { transform: translateX(44%) rotate(6deg); opacity: 0; }
    }

    @keyframes buildTower {
      from { opacity: 0; transform: translateY(22px) scaleY(.08); }
      to { opacity: 1; transform: translateY(0) scaleY(1); }
    }

    @keyframes markSheen {
      0% { opacity: 0; transform: translateX(0); }
      18% { opacity: .72; }
      82% { opacity: .32; }
      100% { opacity: 0; transform: translateX(300px); }
    }

    @keyframes textIn {
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes progressTravel {
      0% { transform: translateX(-115%); }
      100% { transform: translateX(350%); }
    }

    @media (prefers-reduced-motion: reduce) {
      .loader-stage,
      .logo-shell::before,
      .tower-shape,
      .mark-sheen,
      .loader-title,
      .loader-subtitle,
      .loader-progress,
      .loader-progress::after {
        animation: none !important;
        opacity: 1 !important;
        transform: none !important;
      }
    }
  </style>
</head>
<body>
  <div id="app-loader" aria-label="Загрузка AppСтрой">
    <div class="loader-stage">
      <div class="logo-shell" aria-hidden="true">
        <svg class="brand-logo" viewBox="0 0 240 240" role="presentation">
          <defs>
            <linearGradient id="loaderMetal" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0" stop-color="#D8D8D8"/>
              <stop offset=".47" stop-color="#A3A4A6"/>
              <stop offset="1" stop-color="#77797C"/>
            </linearGradient>
            <linearGradient id="loaderSheen" x1="0" y1="0" x2="1" y2="0">
              <stop offset="0" stop-color="#FFFFFF" stop-opacity="0"/>
              <stop offset=".5" stop-color="#FFFFFF" stop-opacity=".72"/>
              <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
            </linearGradient>
            <clipPath id="loaderMarkClip">
              <path d="M38 204V146C38 130 48 119 61 114L72 110C79 107 86 112 86 120V204Z"/>
              <path d="M96 204V82C96 61 109 45 128 39L139 36C146 34 153 39 153 47V204Z"/>
              <path d="M163 204V110C163 97 174 88 187 91C211 96 225 109 225 129V204Z"/>
            </clipPath>
          </defs>

          <path class="tower-shape tower-left" fill="url(#loaderMetal)" d="M38 204V146C38 130 48 119 61 114L72 110C79 107 86 112 86 120V204Z"/>
          <path class="tower-shape tower-center" fill="url(#loaderMetal)" d="M96 204V82C96 61 109 45 128 39L139 36C146 34 153 39 153 47V204Z"/>
          <path class="tower-shape tower-right" fill="url(#loaderMetal)" d="M163 204V110C163 97 174 88 187 91C211 96 225 109 225 129V204Z"/>
          <g class="mark-sheen" clip-path="url(#loaderMarkClip)">
            <path fill="url(#loaderSheen)" d="M-64 214L-18 25H12L-34 214Z"/>
          </g>
        </svg>
      </div>

      <div class="loader-title">AppСтрой</div>
      <div class="loader-subtitle">планируй. строй. управляй.</div>
      <div class="loader-progress" aria-hidden="true"></div>
    </div>
  </div>

  <script>
    (function () {
      var loader = document.getElementById('app-loader');
      var startedAt = performance.now();
      var minimumVisibleMs = 650;
      var hidden = false;

      var hideLoader = function () {
        if (!loader || hidden) return;
        hidden = true;
        loader.classList.add('hidden');
        window.setTimeout(function () {
          if (loader && loader.parentNode) {
            loader.parentNode.removeChild(loader);
          }
        }, 560);
      };

      var hideAfterMinimum = function () {
        var elapsed = performance.now() - startedAt;
        var delay = Math.max(0, minimumVisibleMs - elapsed);
        window.setTimeout(hideLoader, delay);
      };

      window.addEventListener('flutter-first-frame', hideAfterMinimum, { once: true });
      window.setTimeout(hideLoader, 4400);
    })();
  </script>

  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
