<!DOCTYPE html>
<html lang="ru">
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
  >

  <meta name="description" content="AppСтрой — управление сотрудниками, табелем, задачами, выплатами и документами на строительном объекте.">
  <meta name="theme-color" content="#F3F1EC">
  <meta name="color-scheme" content="light">

  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="AppСтрой">
  <meta name="application-name" content="AppСтрой">

  <link rel="apple-touch-icon" href="icons/AppStroy-192-v2.png">
  <link rel="icon" type="image/png" href="favicon-v2.png">
  <link rel="icon" type="image/svg+xml" href="icons/app_icon_matte_v2.svg">

  <title>AppСтрой</title>
  <link rel="manifest" href="manifest.json">

  <style>
    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      min-height: 100%;
      overflow: hidden;
      background: #f3f1ec;
      font-family: "Manrope", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      overscroll-behavior: none;
      touch-action: manipulation;
      -webkit-text-size-adjust: 100%;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      position: relative;
      min-height: 100dvh;
    }

    flutter-view,
    flt-glass-pane {
      position: absolute !important;
      inset: 0 !important;
      width: 100% !important;
      height: 100% !important;
      max-width: 100% !important;
      max-height: 100% !important;
      overflow: hidden !important;
    }

    #app-loader {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: grid;
      place-items: center;
      min-height: 100dvh;
      overflow: hidden;
      color: #171c25;
      background:
        radial-gradient(circle at 78% 16%, rgba(255,255,255,.98) 0, rgba(255,255,255,0) 31%),
        radial-gradient(circle at 18% 84%, rgba(42,83,137,.09) 0, rgba(42,83,137,0) 34%),
        linear-gradient(145deg, #fbfaf7 0%, #e9e5dd 100%);
      transition:
        opacity 520ms cubic-bezier(.22,1,.36,1),
        visibility 520ms ease;
    }

    #app-loader::before {
      content: "";
      position: absolute;
      inset: 0;
      opacity: .26;
      background-image:
        linear-gradient(rgba(31,37,47,.036) 1px, transparent 1px),
        linear-gradient(90deg, rgba(31,37,47,.036) 1px, transparent 1px);
      background-size: 42px 42px;
      mask-image: radial-gradient(circle at center, black 0, transparent 72%);
      -webkit-mask-image: radial-gradient(circle at center, black 0, transparent 72%);
    }

    #app-loader::after {
      content: "";
      position: absolute;
      width: min(74vw, 520px);
      aspect-ratio: 1;
      border-radius: 50%;
      background: rgba(255,255,255,.38);
      filter: blur(62px);
      transform: translateY(-4%);
      pointer-events: none;
    }

    #app-loader.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .loader-stage {
      position: relative;
      z-index: 1;
      width: min(86vw, 360px);
      text-align: center;
      animation: stageIn 900ms cubic-bezier(.22,1,.36,1) both;
    }

    .logo-shell {
      position: relative;
      width: 164px;
      height: 164px;
      margin: 0 auto 24px;
      display: grid;
      place-items: center;
      border-radius: 48px;
      background:
        linear-gradient(145deg, rgba(255,255,255,.90), rgba(255,255,255,.56));
      border: 1px solid rgba(255,255,255,.96);
      box-shadow:
        0 32px 70px rgba(20,26,36,.16),
        0 8px 22px rgba(20,26,36,.06),
        inset 0 1px 0 rgba(255,255,255,.98),
        inset 0 -1px 0 rgba(17,23,32,.035);
      backdrop-filter: blur(26px);
      -webkit-backdrop-filter: blur(26px);
      overflow: hidden;
    }

    .logo-shell::before {
      content: "";
      position: absolute;
      inset: -55% -120%;
      background: linear-gradient(
        105deg,
        transparent 43%,
        rgba(255,255,255,0) 46%,
        rgba(255,255,255,.82) 50%,
        rgba(255,255,255,0) 54%,
        transparent 57%
      );
      transform: translateX(-42%) rotate(6deg);
      animation: shellGlint 2.8s cubic-bezier(.22,1,.36,1) .65s both;
      pointer-events: none;
    }

    .brand-logo {
      width: 132px;
      height: 132px;
      overflow: visible;
      filter: drop-shadow(0 12px 15px rgba(18,25,36,.16));
    }

    .guide-group {
      transform-origin: 120px 120px;
      animation: guideTurn 12s linear infinite;
    }

    .guide-line {
      fill: none;
      stroke: #7d838d;
      stroke-width: 1;
      opacity: .18;
      stroke-dasharray: 4 7;
    }

    .gold-ring {
      fill: none;
      stroke: url(#loaderGold);
      stroke-width: 7;
      stroke-linecap: round;
      stroke-dasharray: 410;
      stroke-dashoffset: 410;
      animation: drawRing 1.65s cubic-bezier(.22,1,.36,1) .18s forwards;
    }

    .logo-a,
    .tower,
    .logo-curve,
    .gold-accent,
    .logo-base {
      transform-box: fill-box;
      transform-origin: center bottom;
      opacity: 0;
    }

    .logo-a {
      animation: riseMark 980ms cubic-bezier(.22,1,.36,1) .30s forwards;
    }

    .tower-one {
      animation: riseTower 840ms cubic-bezier(.22,1,.36,1) .48s forwards;
    }

    .tower-two {
      animation: riseTower 900ms cubic-bezier(.22,1,.36,1) .61s forwards;
    }

    .tower-three {
      animation: riseTower 960ms cubic-bezier(.22,1,.36,1) .74s forwards;
    }

    .logo-curve {
      transform-origin: left bottom;
      animation: curveIn 980ms cubic-bezier(.22,1,.36,1) .78s forwards;
    }

    .gold-accent {
      animation: accentIn 620ms cubic-bezier(.34,1.56,.64,1) 1.08s forwards;
    }

    .logo-base {
      transform-origin: center center;
      animation: baseIn 760ms cubic-bezier(.22,1,.36,1) .92s forwards;
    }

    .loader-title {
      font-family: "Cormorant Garamond", Georgia, serif;
      font-size: 38px;
      line-height: 1;
      font-weight: 600;
      letter-spacing: -.045em;
      color: #18202b;
      opacity: 0;
      transform: translateY(10px);
      animation: textIn 700ms cubic-bezier(.22,1,.36,1) 1.02s forwards;
    }

    .loader-subtitle {
      margin-top: 12px;
      font-size: 11px;
      line-height: 1.5;
      font-weight: 700;
      letter-spacing: .16em;
      text-transform: lowercase;
      color: rgba(28,35,45,.56);
      opacity: 0;
      transform: translateY(8px);
      animation: textIn 700ms cubic-bezier(.22,1,.36,1) 1.16s forwards;
    }

    .loader-progress {
      position: relative;
      width: 132px;
      height: 2px;
      margin: 27px auto 0;
      overflow: hidden;
      border-radius: 999px;
      background: rgba(29,38,51,.10);
      opacity: 0;
      animation: textIn 500ms ease 1.32s forwards;
    }

    .loader-progress::after {
      content: "";
      position: absolute;
      inset: 0;
      width: 42%;
      border-radius: inherit;
      background: linear-gradient(90deg, #173d70, #b9985b, #173d70);
      box-shadow: 0 0 14px rgba(31,78,135,.20);
      animation: progressTravel 1.55s cubic-bezier(.4,0,.2,1) infinite;
    }

    @keyframes stageIn {
      from { opacity: 0; transform: translateY(18px) scale(.975); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    @keyframes shellGlint {
      0% { transform: translateX(-44%) rotate(6deg); opacity: 0; }
      22% { opacity: .85; }
      100% { transform: translateX(44%) rotate(6deg); opacity: 0; }
    }

    @keyframes guideTurn {
      to { transform: rotate(360deg); }
    }

    @keyframes drawRing {
      to { stroke-dashoffset: 0; }
    }

    @keyframes riseMark {
      from { opacity: 0; transform: translateY(22px) scaleY(.78); }
      to { opacity: 1; transform: translateY(0) scaleY(1); }
    }

    @keyframes riseTower {
      from { opacity: 0; transform: translateY(24px) scaleY(.48); }
      to { opacity: 1; transform: translateY(0) scaleY(1); }
    }

    @keyframes curveIn {
      from { opacity: 0; transform: translateX(12px) scale(.84); }
      to { opacity: 1; transform: translateX(0) scale(1); }
    }

    @keyframes accentIn {
      from { opacity: 0; transform: scale(.45) rotate(-8deg); }
      to { opacity: 1; transform: scale(1) rotate(0); }
    }

    @keyframes baseIn {
      from { opacity: 0; transform: scaleX(.18); }
      to { opacity: 1; transform: scaleX(1); }
    }

    @keyframes textIn {
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes progressTravel {
      0% { transform: translateX(-115%); }
      100% { transform: translateX(350%); }
    }

    @media (prefers-reduced-motion: reduce) {
      .loader-stage,
      .logo-shell::before,
      .guide-group,
      .gold-ring,
      .logo-a,
      .tower,
      .logo-curve,
      .gold-accent,
      .logo-base,
      .loader-title,
      .loader-subtitle,
      .loader-progress,
      .loader-progress::after {
        animation: none !important;
        opacity: 1 !important;
        transform: none !important;
        stroke-dashoffset: 0 !important;
      }
    }
  </style>
</head>
<body>
  <div id="app-loader" aria-label="Загрузка AppСтрой">
    <div class="loader-stage">
      <div class="logo-shell" aria-hidden="true">
        <svg class="brand-logo" viewBox="0 0 240 240" role="presentation">
          <defs>
            <linearGradient id="loaderNavy" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0" stop-color="#111823"/>
              <stop offset="1" stop-color="#27354A"/>
            </linearGradient>
            <linearGradient id="loaderBlue" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0" stop-color="#2A65A8"/>
              <stop offset="1" stop-color="#123B70"/>
            </linearGradient>
            <linearGradient id="loaderGold" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0" stop-color="#E5CC92"/>
              <stop offset="1" stop-color="#A98443"/>
            </linearGradient>
          </defs>

          <g class="guide-group">
            <circle class="guide-line" cx="120" cy="118" r="91"/>
            <circle class="guide-line" cx="150" cy="87" r="55"/>
            <circle class="guide-line" cx="173" cy="137" r="34"/>
            <path class="guide-line" d="M28 118H212M120 25V211"/>
          </g>

          <path class="gold-ring" d="M50 156C30 94 66 43 119 34C164 27 202 59 207 102"/>
          <path class="logo-a" fill="url(#loaderNavy)" d="M43 195L112 40H127L84 195Z"/>
          <path class="tower tower-one" fill="url(#loaderBlue)" d="M94 195V122L119 102V195Z"/>
          <path class="tower tower-two" fill="url(#loaderNavy)" d="M127 195V64L153 84V195Z"/>
          <path class="tower tower-three" fill="url(#loaderBlue)" d="M156 195V126L176 142V195Z"/>
          <path class="logo-curve" fill="url(#loaderBlue)" d="M172 195C199 175 201 142 176 121L191 110C227 140 222 184 194 203H172Z"/>
          <path class="gold-accent" fill="url(#loaderGold)" d="M111 113L127 96V114L115 125Z"/>
          <path class="logo-base" d="M37 204H205" stroke="url(#loaderGold)" stroke-width="5" stroke-linecap="round"/>
        </svg>
      </div>

      <div class="loader-title">AppСтрой</div>
      <div class="loader-subtitle">планируй. строй. управляй.</div>
      <div class="loader-progress" aria-hidden="true"></div>
    </div>
  </div>

  <script>
    (function () {
      var loader = document.getElementById('app-loader');
      var startedAt = performance.now();
      var minimumVisibleMs = 650;
      var hidden = false;

      var hideLoader = function () {
        if (!loader || hidden) return;
        hidden = true;
        loader.classList.add('hidden');
        window.setTimeout(function () {
          if (loader && loader.parentNode) {
            loader.parentNode.removeChild(loader);
          }
        }, 560);
      };

      var hideAfterMinimum = function () {
        var elapsed = performance.now() - startedAt;
        var delay = Math.max(0, minimumVisibleMs - elapsed);
        window.setTimeout(hideLoader, delay);
      };

      window.addEventListener('flutter-first-frame', hideAfterMinimum, { once: true });
      window.setTimeout(hideLoader, 4400);
    })();
  </script>

  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
