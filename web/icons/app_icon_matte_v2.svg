<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="AppСтрой">
  <defs>
    <linearGradient id="matte" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#202124"/>
      <stop offset="1" stop-color="#090a0c"/>
    </linearGradient>
    <radialGradient id="softLight" cx="0.22" cy="0.14" r="0.9">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.11"/>
      <stop offset="0.55" stop-color="#ffffff" stop-opacity="0.025"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <mask id="mark">
      <rect width="512" height="512" fill="black"/>
      <!-- construction radii: 150, 93 and 57 = approximately r, r/phi, r/phi² -->
      <circle cx="222" cy="224" r="150" fill="white"/>
      <circle cx="286" cy="224" r="93" fill="black"/>
      <circle cx="322" cy="316" r="93" fill="white"/>
      <circle cx="322" cy="316" r="57" fill="black"/>
      <rect x="116" y="356" width="280" height="30" rx="15" fill="white"/>
    </mask>
    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="180%">
      <feDropShadow dx="0" dy="12" stdDeviation="12" flood-color="#000000" flood-opacity="0.34"/>
    </filter>
  </defs>
  <rect x="16" y="16" width="480" height="480" rx="128" fill="url(#matte)"/>
  <rect x="16" y="16" width="480" height="480" rx="128" fill="url(#softLight)"/>
  <rect x="24" y="24" width="464" height="464" rx="120" fill="none" stroke="#ffffff" stroke-opacity="0.08" stroke-width="2"/>
  <g filter="url(#softShadow)">
    <rect x="80" y="72" width="352" height="352" fill="#f5f5f3" mask="url(#mark)"/>
  </g>
</svg>
