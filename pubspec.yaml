name: skbs_app
description: "Приложение СКБС для сотрудников, табеля, задач, выплат и документов."
publish_to: 'none'
version: 1.3.0+4

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^8.1.0
  excel: ^4.0.6
  universal_html: ^2.3.0
  archive: ^3.6.1
  pdf: ^3.11.3
  supabase_flutter: ^2.8.3
  shared_preferences: ^2.3.3
  intl: ^0.19.0
  docx_template: ^0.4.0
  file_saver: ^0.2.14
  mime_type: ^1.0.0
  file_selector: ^1.0.4
  firebase_core: ^4.11.0
  firebase_messaging: ^16.4.1
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/templates/
