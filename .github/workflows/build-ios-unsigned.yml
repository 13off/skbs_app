name: Build iOS IPA unsigned

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: appstroy-ios-unsigned
  cancel-in-progress: true

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - name: Check publish token
        shell: bash
        run: |
          if [ -z "${{ secrets.WEB_DEPLOY_TOKEN }}" ]; then
            echo "::error::Не найден secret WEB_DEPLOY_TOKEN"
            exit 1
          fi

      - name: Checkout source
        uses: actions/checkout@v4

      - name: Checkout download repository
        uses: actions/checkout@v4
        with:
          repository: 13off/appstroy-web
          token: ${{ secrets.WEB_DEPLOY_TOKEN }}
          path: appstroy-web

      - name: Publish building status
        shell: bash
        run: |
          mkdir -p appstroy-web/downloads
          printf 'building\n' > appstroy-web/downloads/ios-build-status.txt
          printf '%s\n' "$(git rev-parse HEAD)" > appstroy-web/downloads/ios-source-commit.txt
          cd appstroy-web
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add downloads/ios-build-status.txt downloads/ios-source-commit.txt
          if ! git diff --cached --quiet; then
            git commit -m "запущена сборка IPA для iPhone"
            git push
          fi

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Prepare iOS identity
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          project = Path('ios/Runner.xcodeproj/project.pbxproj')
          text = project.read_text(encoding='utf-8')
          text = text.replace('com.example.skbsApp', 'ru.appstroy.mobile')
          project.write_text(text, encoding='utf-8')
          PY
          /usr/libexec/PlistBuddy -c "Set :CFBundleDisplayName AppСтрой" ios/Runner/Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleName AppStroy" ios/Runner/Info.plist

      - name: Build unsigned iOS app
        shell: bash
        run: |
          set -o pipefail
          flutter build ios --release --no-codesign \
            --dart-define=SUPABASE_URL=https://api.appstroy-web.ru \
            2>&1 | tee ios-build.log

      - name: Package IPA
        shell: bash
        run: |
          SOURCE_SHA="$(git rev-parse HEAD)"
          SHORT_SHA="$(git rev-parse --short=12 HEAD)"
          mkdir -p ios-output/Payload
          cp -R build/ios/iphoneos/Runner.app ios-output/Payload/AppStroy.app
          cd ios-output
          ditto -c -k --sequesterRsrc --keepParent Payload "AppStroy-${SHORT_SHA}.ipa"
          cp "AppStroy-${SHORT_SHA}.ipa" AppStroy-latest.ipa
          rm -rf Payload
          printf '%s\n' "$SOURCE_SHA" > source-commit.txt
          shasum -a 256 AppStroy-latest.ipa > AppStroy-iOS-latest.sha256

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: AppStroy-iOS-IPA
          path: ios-output/
          retention-days: 30
          if-no-files-found: error

      - name: Publish IPA
        shell: bash
        run: |
          cd appstroy-web
          git pull --rebase
          cd ..

          mkdir -p appstroy-web/downloads
          rm -f appstroy-web/downloads/AppStroy-*.ipa
          cp ios-output/AppStroy-*.ipa appstroy-web/downloads/
          cp ios-output/AppStroy-iOS-latest.sha256 appstroy-web/downloads/
          cp ios-build.log appstroy-web/downloads/ios-build.log
          printf '%s\n' "$(git rev-parse HEAD)" > appstroy-web/downloads/ios-source-commit.txt
          printf 'success\n' > appstroy-web/downloads/ios-build-status.txt

          cd appstroy-web
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add downloads
          if ! git diff --cached --quiet; then
            git commit -m "опубликована IPA для iPhone"
            git push
          fi
