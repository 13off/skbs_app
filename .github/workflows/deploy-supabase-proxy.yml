name: Deploy Supabase proxy

on:
  workflow_dispatch:
  push:
    paths:
      - infra/supabase-proxy/deploy.trigger

permissions:
  contents: read

concurrency:
  group: appstroy-supabase-proxy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Check required secrets
        shell: bash
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          PROXY_DOMAIN: ${{ secrets.SUPABASE_PROXY_DOMAIN }}
        run: |
          for name in VPS_HOST VPS_USER VPS_SSH_KEY PROXY_DOMAIN; do
            if [ -z "${!name}" ]; then
              echo "::error::Не найден secret $name"
              exit 1
            fi
          done

      - name: Checkout source
        uses: actions/checkout@v4

      - name: Prepare SSH
        shell: bash
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/appstroy_proxy
          chmod 600 ~/.ssh/appstroy_proxy
          ssh-keyscan -H "$VPS_HOST" >> ~/.ssh/known_hosts

      - name: Upload proxy configuration
        shell: bash
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          tar -C infra/supabase-proxy -czf /tmp/appstroy-proxy.tar.gz .
          scp -i ~/.ssh/appstroy_proxy /tmp/appstroy-proxy.tar.gz "$VPS_USER@$VPS_HOST:/tmp/appstroy-proxy.tar.gz"

      - name: Install and start proxy
        shell: bash
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          PROXY_DOMAIN: ${{ secrets.SUPABASE_PROXY_DOMAIN }}
        run: |
          ssh -i ~/.ssh/appstroy_proxy "$VPS_USER@$VPS_HOST" \
            "PROXY_DOMAIN='$PROXY_DOMAIN' bash -s" <<'REMOTE'
          set -euo pipefail

          SUDO=""
          if [ "$(id -u)" -ne 0 ]; then
            SUDO="sudo"
          fi

          if ! command -v docker >/dev/null 2>&1; then
            $SUDO apt-get update
            $SUDO DEBIAN_FRONTEND=noninteractive apt-get install -y docker.io docker-compose-v2 curl
            $SUDO systemctl enable --now docker
          fi

          $SUDO mkdir -p /opt/appstroy-proxy
          $SUDO tar -xzf /tmp/appstroy-proxy.tar.gz -C /opt/appstroy-proxy
          $SUDO rm -f /tmp/appstroy-proxy.tar.gz

          printf 'PROXY_DOMAIN=%s\nSUPABASE_UPSTREAM=dxbrhsefgxcaxzmrbfrb.supabase.co\n' \
            "$PROXY_DOMAIN" | $SUDO tee /opt/appstroy-proxy/.env >/dev/null

          cd /opt/appstroy-proxy
          $SUDO docker compose pull
          $SUDO docker compose up -d --remove-orphans
          REMOTE

      - name: Verify proxy
        shell: bash
        env:
          PROXY_DOMAIN: ${{ secrets.SUPABASE_PROXY_DOMAIN }}
        run: |
          for attempt in $(seq 1 24); do
            if curl --fail --silent --show-error "https://$PROXY_DOMAIN/proxy-health" | grep -qx 'ok'; then
              echo "Proxy is ready: https://$PROXY_DOMAIN"
              exit 0
            fi
            sleep 5
          done

          echo "::error::Прокси не прошел проверку HTTPS"
          exit 1
