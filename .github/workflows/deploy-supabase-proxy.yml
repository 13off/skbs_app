name: Deploy Supabase proxy and Russian web

on:
  workflow_dispatch:
  schedule:
    - cron: '*/5 * * * *'
  push:
    paths:
      - infra/supabase-proxy/**
      - .github/workflows/deploy-supabase-proxy.yml

permissions:
  contents: read

concurrency:
  group: appstroy-supabase-proxy
  cancel-in-progress: true

env:
  PROXY_DOMAIN: api.appstroy-web.ru

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Check required secrets
        shell: bash
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          for name in VPS_HOST VPS_USER VPS_SSH_KEY; do
            if [ -z "${!name}" ]; then
              echo "::error::Не найден secret $name"
              exit 1
            fi
          done

      - name: Checkout proxy source
        uses: actions/checkout@v4
        with:
          path: skbs_app

      - name: Checkout latest web build
        uses: actions/checkout@v4
        with:
          repository: 13off/appstroy-web
          path: web-build

      - name: Prepare SSH
        shell: bash
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/appstroy_proxy
          chmod 600 ~/.ssh/appstroy_proxy
          ssh-keyscan -H "$VPS_HOST" >> ~/.ssh/known_hosts

      - name: Upload proxy and web files
        shell: bash
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          tar -C skbs_app/infra/supabase-proxy -czf /tmp/appstroy-proxy.tar.gz .
          tar -C web-build \
            --exclude=.git \
            --exclude=downloads \
            -czf /tmp/appstroy-web.tar.gz .
          scp -i ~/.ssh/appstroy_proxy \
            /tmp/appstroy-proxy.tar.gz \
            /tmp/appstroy-web.tar.gz \
            "$VPS_USER@$VPS_HOST:/tmp/"

      - name: Install proxy and Russian web
        shell: bash
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          ssh -i ~/.ssh/appstroy_proxy "$VPS_USER@$VPS_HOST" \
            "PROXY_DOMAIN='$PROXY_DOMAIN' bash -s" <<'REMOTE'
          set -euo pipefail

          SUDO=""
          if [ "$(id -u)" -ne 0 ]; then
            SUDO="sudo"
          fi

          if ! command -v docker >/dev/null 2>&1; then
            $SUDO apt-get update
            $SUDO DEBIAN_FRONTEND=noninteractive apt-get install -y docker.io docker-compose-v2 curl
            $SUDO systemctl enable --now docker
          fi

          $SUDO mkdir -p /opt/appstroy-proxy/site
          $SUDO tar -xzf /tmp/appstroy-proxy.tar.gz -C /opt/appstroy-proxy
          $SUDO find /opt/appstroy-proxy/site -mindepth 1 -maxdepth 1 -exec rm -rf {} +
          $SUDO tar -xzf /tmp/appstroy-web.tar.gz -C /opt/appstroy-proxy/site
          $SUDO rm -f /tmp/appstroy-proxy.tar.gz /tmp/appstroy-web.tar.gz

          $SUDO sed -i 's#<base href="/appstroy-web/">#<base href="/app/">#' \
            /opt/appstroy-proxy/site/index.html
          if [ -f /opt/appstroy-proxy/site/404.html ]; then
            $SUDO sed -i 's#<base href="/appstroy-web/">#<base href="/app/">#' \
              /opt/appstroy-proxy/site/404.html
          fi

          printf 'PROXY_DOMAIN=%s\nSUPABASE_UPSTREAM=dxbrhsefgxcaxzmrbfrb.supabase.co\n' \
            "$PROXY_DOMAIN" | $SUDO tee /opt/appstroy-proxy/.env >/dev/null

          cd /opt/appstroy-proxy
          $SUDO docker compose pull
          $SUDO docker compose up -d --force-recreate --remove-orphans
          $SUDO docker compose exec -T caddy caddy validate --config /etc/caddy/Caddyfile
          REMOTE

      - name: Verify Russian route
        shell: bash
        run: |
          for attempt in $(seq 1 24); do
            HEALTH="$(curl --fail --silent --show-error "https://$PROXY_DOMAIN/proxy-health" || true)"
            HEADERS="$(curl --fail --silent --show-error --head "https://$PROXY_DOMAIN/functions/v1/invite-landing/invite.html?verify=1" || true)"
            if [ "$HEALTH" = "ok" ] && printf '%s' "$HEADERS" | grep -qi '^content-type: text/html; charset=utf-8'; then
              echo "Russian invite route is ready"
              exit 0
            fi
            sleep 5
          done

          echo "::error::Российский маршрут приглашения не прошёл проверку HTTPS и Content-Type"
          exit 1
