name: Apply HR recruitment MVP

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  patch-and-check:
    if: github.head_ref == 'feature/hr-recruitment-mvp' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Apply HR patch
        run: python3 tool/apply_hr_recruitment_mvp.py

      - uses: subosito/flutter-action@v2
        with:
          flutter-version-file: .fvmrc
          cache: true

      - name: Format and verify
        shell: bash
        run: |
          dart format \
            lib/features/recruitment \
            lib/features/auth/models/app_user_profile.dart \
            lib/features/role_preview/role_preview_controller.dart \
            lib/features/role_preview/role_preview_screen.dart \
            lib/screens/main_screen.dart \
            lib/data/app_data_sync.dart \
            lib/features/company/data/company_repository.dart \
            lib/features/company/data/company_invitation_repository.dart \
            lib/features/company/presentation/desktop_company_user_dialogs.dart \
            lib/features/company/presentation/mobile_company_management_screen.dart \
            lib/features/company/presentation/desktop_company_management_screen.dart \
            test/admin_role_preview_contract_test.dart \
            test/recruitment_mvp_contract_test.dart
          flutter pub get --enforce-lockfile
          flutter test
          flutter analyze --no-fatal-infos --no-fatal-warnings
          flutter build web --release --base-href /appstroy-web/

      - name: Commit checked changes
        shell: bash
        run: |
          rm tool/apply_hr_recruitment_mvp.py
          rm .github/workflows/apply-hr-recruitment-mvp.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Добавить HR-менеджера и заявки кандидатов"
          git push origin HEAD:feature/hr-recruitment-mvp
