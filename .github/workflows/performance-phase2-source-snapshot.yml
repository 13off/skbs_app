name: Performance phase2 source snapshot

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/performance-phase2-source-snapshot.yml
      - tool/performance_phase2_snapshot.trigger

permissions:
  contents: read

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout pull request branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - name: Create clean source archive
        run: |
          tar \
            --exclude=.git \
            --exclude=.dart_tool \
            --exclude=build \
            --exclude='**/build' \
            --exclude='**/.gradle' \
            --exclude='**/Pods' \
            -czf /tmp/skbs-phase2-source.tar.gz .

      - name: Upload source snapshot
        uses: actions/upload-artifact@v4
        with:
          name: skbs-phase2-source
          path: /tmp/skbs-phase2-source.tar.gz
          if-no-files-found: error
          retention-days: 1
