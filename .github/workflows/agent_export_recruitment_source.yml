name: Agent apply recruitment CRM

on:
  pull_request:
    branches:
      - main
    types:
      - reopened
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'agent/recruitment-crm-full' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/recruitment-crm-full
          fetch-depth: 0
          show-progress: false

      - name: Verify and extract CRM package
        shell: bash
        run: |
          set -euo pipefail
          cat \
            .agent/crm_small_00 \
            .agent/crm_small_01 \
            .agent/crm_small_02 \
            .agent/crm_small_03 \
            .agent/crm_small_04 \
            .agent/crm_small_05 \
            .agent/crm_small_06 \
            .agent/crm_small_07 \
            .agent/crm_small_08 \
            .agent/crm_rem_00 \
            .agent/crm_rem_01 \
            .agent/crm_rem_02 \
            .agent/crm_rem_03_0 \
            .agent/crm_rem_03_1 \
            .agent/crm_rem_03_2 > /tmp/recruitment_crm_full.tar.gz.b64

          actual_size="$(wc -c < /tmp/recruitment_crm_full.tar.gz.b64 | tr -d ' ')"
          test "$actual_size" = "86632"
          base64 --decode /tmp/recruitment_crm_full.tar.gz.b64 > /tmp/recruitment_crm_full.tar.gz
          echo "f6cd9d517d94788fc5fbf15e9373ccd0b271709d87ba64e43250754c6ad7096d  /tmp/recruitment_crm_full.tar.gz" | sha256sum --check
          tar -tzf /tmp/recruitment_crm_full.tar.gz >/dev/null
          tar -xzf /tmp/recruitment_crm_full.tar.gz
          rm -rf .agent
          rm -f .github/workflows/agent_export_recruitment_source.yml
          git diff --check

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version-file: .fvmrc
          cache: true

      - name: Install locked dependencies
        run: flutter pub get --enforce-lockfile >/dev/null

      - name: Format changed Dart files
        shell: bash
        run: |
          dart format \
            lib/features/recruitment/data/recruitment_crm_workspace_repository.dart \
            lib/features/recruitment/models/recruitment_crm_workspace_models.dart \
            lib/features/recruitment/models/recruitment_models.dart \
            lib/features/recruitment/presentation/recruitment_application_detail_screen.dart \
            lib/features/recruitment/presentation/recruitment_applications_screen.dart \
            lib/features/recruitment/presentation/recruitment_automation_settings_panel.dart \
            lib/features/recruitment/presentation/recruitment_candidate_crm_section.dart \
            lib/features/recruitment/presentation/recruitment_crm_settings_screen.dart \
            lib/features/recruitment/presentation/recruitment_import_screen.dart \
            lib/screens/pwa_install_screen.dart \
            lib/services/pwa_install_service.dart \
            lib/services/pwa_install_service_stub.dart \
            lib/services/pwa_install_service_web.dart \
            test/pwa_install_honest_contract_test.dart \
            test/recruitment_automation_contract_test.dart \
            test/recruitment_crm_workspace_contract_test.dart \
            test/recruitment_excel_import_contract_test.dart
          git diff --check

      - name: Commit source changes
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "appstroy-agent"
          git config user.email "appstroy-agent@users.noreply.github.com"
          git add -A
          git commit -m "Доделать CRM кандидатов и установку PWA [agent-crm-full]"
          git push origin HEAD:agent/recruitment-crm-full
