name: Harden role notifications and task photos

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  harden-and-check:
    if: github.head_ref == 'feature/role-notifications-task-photos' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Apply hardening
        shell: bash
        run: |
          python3 tool/harden_role_notifications_task_photos.py
          python3 tool/fix_hardening_contract_test.py

      - uses: subosito/flutter-action@v2
        with:
          flutter-version-file: .fvmrc
          cache: true

      - name: Capture final verification
        shell: bash
        run: |
          set +e
          {
            dart format \
              lib/data/task_repository.dart \
              lib/screens/task_details_legacy_screen.dart \
              test/role_notifications_task_photos_contract_test.dart
            flutter pub get --enforce-lockfile
            flutter analyze --no-fatal-infos --no-fatal-warnings
            flutter test --reporter compact
            flutter build web --release --base-href /appstroy-web/
          } > role-task-hardening.log 2>&1
          status=$?
          echo "$status" > role-task-hardening.status
          exit 0

      - name: Commit transformed hardening and result
        shell: bash
        run: |
          rm tool/harden_role_notifications_task_photos.py
          rm tool/fix_hardening_contract_test.py
          rm .github/workflows/harden-role-notifications-task-photos.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ "$(cat role-task-hardening.status)" = "0" ]; then
            rm role-task-hardening.log role-task-hardening.status
            message="Усилить ролевые уведомления и черновики задач"
          else
            message="Сохранить ошибку защиты ролевых задач"
          fi
          git add -A
          git commit -m "$message"
          git push origin HEAD:feature/role-notifications-task-photos
