name: Validate UI v2 branch

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - .github/workflows/build-android-apk.yml

permissions:
  contents: write

concurrency:
  group: ui-v2-branch-only
  cancel-in-progress: true

jobs:
  validate-ui-v2-branch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout UI branch
        uses: actions/checkout@v4
        with:
          ref: ui/unified-motion-nav-v2
          persist-credentials: true

      - name: Apply and commit UI draft
        id: apply_ui
        shell: bash
        run: |
          set +e
          set -o pipefail
          python3 tool/apply_unified_ui_v2.py 2>&1 | tee /tmp/ui-v2-apply.log
          EXIT_CODE=${PIPESTATUS[0]}
          echo "exit_code=${EXIT_CODE}" >> "$GITHUB_OUTPUT"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if [ "$EXIT_CODE" -ne 0 ]; then
            cp /tmp/ui-v2-apply.log tool/ui_v2_apply_failure.log
            git add tool/ui_v2_apply_failure.log
            git commit -m "сохранена ошибка применения нового интерфейса"
            git push origin HEAD:ui/unified-motion-nav-v2
            exit 0
          fi

          rm -f tool/apply_unified_ui_v2.py
          rm -f tool/apply_unified_ui_v2.marker
          rm -f tool/ui_v2_validation_started.txt
          rm -f tool/ui_v2_validation_failure.log
          rm -f tool/ui_v2_apply_failure.log
          rm -f .github/workflows/apply-unified-ui-v2.yml
          git add -A
          git commit -m "применён безопасный черновик единого интерфейса"
          git push origin HEAD:ui/unified-motion-nav-v2

      - name: Stop after apply failure
        if: steps.apply_ui.outputs.exit_code != '0'
        run: exit 1

      - name: Setup Flutter
        if: steps.apply_ui.outputs.exit_code == '0'
        uses: subosito/flutter-action@v2
        with:
          flutter-version-file: .fvmrc
          cache: true

      - name: Validate committed UI draft
        if: steps.apply_ui.outputs.exit_code == '0'
        id: ui_validation
        shell: bash
        run: |
          set +e
          set -o pipefail
          {
            dart format --output=none --set-exit-if-changed \
              lib/widgets/premium_ui_v2.dart \
              lib/widgets/premium_pressable_v3.dart \
              lib/widgets/professional_bottom_navigation.dart \
              lib/widgets/premium_ui.dart \
              lib/features/shell/presentation/premium_main_screen.dart \
              test/ui_motion_contract_test.dart \
              test/professional_bottom_navigation_test.dart
            flutter pub get --enforce-lockfile
            flutter test
            flutter analyze --no-fatal-infos --no-fatal-warnings
            flutter build web --release --base-href /appstroy-web/
          } 2>&1 | tee /tmp/ui-v2-validation.log
          EXIT_CODE=${PIPESTATUS[0]}
          echo "exit_code=${EXIT_CODE}" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Save UI validation success
        if: steps.apply_ui.outputs.exit_code == '0' && steps.ui_validation.outputs.exit_code == '0'
        shell: bash
        run: |
          printf 'success\n' > tool/ui_v2_validation_status.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tool/ui_v2_validation_status.txt
          git commit -m "подтверждена проверка новой навигации"
          git push origin HEAD:ui/unified-motion-nav-v2

      - name: Save UI validation failure
        if: steps.apply_ui.outputs.exit_code == '0' && steps.ui_validation.outputs.exit_code != '0'
        shell: bash
        run: |
          cp /tmp/ui-v2-validation.log tool/ui_v2_validation_failure.log
          printf 'failure\n' > tool/ui_v2_validation_status.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tool/ui_v2_validation_failure.log tool/ui_v2_validation_status.txt
          git commit -m "сохранена ошибка проверки новой навигации"
          git push origin HEAD:ui/unified-motion-nav-v2
          exit 1
