name: Build Android APK

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: appstroy-android-apk
  cancel-in-progress: true

env:
  FIREBASE_API_KEY: ${{ vars.FIREBASE_API_KEY }}
  FIREBASE_PROJECT_ID: ${{ vars.FIREBASE_PROJECT_ID }}
  FIREBASE_MESSAGING_SENDER_ID: ${{ vars.FIREBASE_MESSAGING_SENDER_ID }}
  FIREBASE_AUTH_DOMAIN: ${{ vars.FIREBASE_AUTH_DOMAIN }}
  FIREBASE_STORAGE_BUCKET: ${{ vars.FIREBASE_STORAGE_BUCKET }}
  FIREBASE_WEB_APP_ID: ${{ vars.FIREBASE_WEB_APP_ID }}
  FIREBASE_ANDROID_APP_ID: ${{ vars.FIREBASE_ANDROID_APP_ID }}
  FIREBASE_IOS_APP_ID: ${{ vars.FIREBASE_IOS_APP_ID }}
  FIREBASE_VAPID_KEY: ${{ vars.FIREBASE_VAPID_KEY }}

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Check publish token
        shell: bash
        run: |
          if [ -z "${{ secrets.WEB_DEPLOY_TOKEN }}" ]; then
            echo "::error::Не найден secret WEB_DEPLOY_TOKEN"
            exit 1
          fi

      - name: Checkout source
        uses: actions/checkout@v4

      - name: Checkout download repository
        uses: actions/checkout@v4
        with:
          repository: 13off/appstroy-web
          token: ${{ secrets.WEB_DEPLOY_TOKEN }}
          path: appstroy-web

      - name: Publish building status
        shell: bash
        run: |
          mkdir -p appstroy-web/downloads
          printf 'building\n' > appstroy-web/downloads/apk-build-status.txt
          printf '%s\n' "$(git rev-parse HEAD)" > appstroy-web/downloads/source-commit.txt
          cd appstroy-web
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add downloads/apk-build-status.txt downloads/source-commit.txt
          if ! git diff --cached --quiet; then
            git commit -m "запущена сборка APK через российский прокси"
            git push
          fi

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version-file: .fvmrc
          cache: true

      - name: Install locked dependencies
        run: flutter pub get --enforce-lockfile

      - name: Run regression tests
        run: flutter test

      - name: Analyze source
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Build release APK through proxy
        id: apk_build
        shell: bash
        run: |
          set +e
          flutter build apk --release \
            --dart-define=SUPABASE_URL=https://api.appstroy-web.ru \
            --dart-define=FIREBASE_API_KEY="$FIREBASE_API_KEY" \
            --dart-define=FIREBASE_PROJECT_ID="$FIREBASE_PROJECT_ID" \
            --dart-define=FIREBASE_MESSAGING_SENDER_ID="$FIREBASE_MESSAGING_SENDER_ID" \
            --dart-define=FIREBASE_AUTH_DOMAIN="$FIREBASE_AUTH_DOMAIN" \
            --dart-define=FIREBASE_STORAGE_BUCKET="$FIREBASE_STORAGE_BUCKET" \
            --dart-define=FIREBASE_WEB_APP_ID="$FIREBASE_WEB_APP_ID" \
            --dart-define=FIREBASE_ANDROID_APP_ID="$FIREBASE_ANDROID_APP_ID" \
            --dart-define=FIREBASE_IOS_APP_ID="$FIREBASE_IOS_APP_ID" \
            --dart-define=FIREBASE_VAPID_KEY="$FIREBASE_VAPID_KEY" \
            2>&1 | tee apk-build.log
          BUILD_EXIT_CODE=${PIPESTATUS[0]}
          echo "exit_code=${BUILD_EXIT_CODE}" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Prepare APK files
        if: steps.apk_build.outputs.exit_code == '0'
        shell: bash
        run: |
          SOURCE_SHA="$(git rev-parse HEAD)"
          SHORT_SHA="$(git rev-parse --short=12 HEAD)"
          mkdir -p apk-output
          cp build/app/outputs/flutter-apk/app-release.apk "apk-output/AppStroy-${SHORT_SHA}.apk"
          cp build/app/outputs/flutter-apk/app-release.apk apk-output/AppStroy-latest.apk
          printf '%s\n' "$SOURCE_SHA" > apk-output/source-commit.txt
          sha256sum apk-output/AppStroy-latest.apk > apk-output/AppStroy-latest.sha256

      - name: Upload APK artifact
        if: steps.apk_build.outputs.exit_code == '0'
        uses: actions/upload-artifact@v4
        with:
          name: AppStroy-Android-APK
          path: apk-output/
          retention-days: 30
          if-no-files-found: error

      - name: Publish final build result
        if: always()
        shell: bash
        run: |
          cd appstroy-web
          git pull --rebase
          cd ..

          SOURCE_SHA="$(git rev-parse HEAD)"
          mkdir -p appstroy-web/downloads
          cp apk-build.log appstroy-web/downloads/apk-build.log || true
          printf '%s\n' "$SOURCE_SHA" > appstroy-web/downloads/source-commit.txt

          if [ "${{ steps.apk_build.outputs.exit_code }}" = "0" ]; then
            rm -f appstroy-web/downloads/AppStroy-*.apk
            cp apk-output/AppStroy-*.apk appstroy-web/downloads/
            cp apk-output/AppStroy-latest.sha256 appstroy-web/downloads/
            printf 'success\n' > appstroy-web/downloads/apk-build-status.txt
          else
            printf 'failure\n' > appstroy-web/downloads/apk-build-status.txt
          fi

          cd appstroy-web
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add downloads
          if ! git diff --cached --quiet; then
            if [ "${{ steps.apk_build.outputs.exit_code }}" = "0" ]; then
              git commit -m "опубликован APK через российский прокси"
            else
              git commit -m "сохранена ошибка сборки APK"
            fi
            git push
          fi

      - name: Fail workflow when APK build failed
        if: steps.apk_build.outputs.exit_code != '0'
        run: exit 1
