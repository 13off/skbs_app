name: Android Theme Check

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches:
      - main
    paths:
      - android/**
      - lib/app/theme_controller.dart
      - lib/app/theme_platform_sync*.dart
      - test/theme_aware_splash_icon_contract_test.dart
      - .github/workflows/android-theme-check.yml
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: appstroy-android-theme-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  android-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          show-progress: false

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version-file: .fvmrc
          cache: true

      - name: Install locked dependencies
        run: flutter pub get --enforce-lockfile >/dev/null

      - name: Build Android debug
        run: flutter build apk --debug
