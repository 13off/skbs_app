name: Build and publish web

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: appstroy-web
  cancel-in-progress: false

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Check deploy token
        shell: bash
        run: |
          if [ -z "${{ secrets.WEB_DEPLOY_TOKEN }}" ]; then
            echo "::error::Не найден secret WEB_DEPLOY_TOKEN"
            exit 1
          fi

      - name: Checkout source app
        uses: actions/checkout@v4
        with:
          path: skbs_app
          persist-credentials: true

      - name: Finalize and audit recent changes
        working-directory: skbs_app
        shell: bash
        run: python tool/finalize_recent_changes.py

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install icon renderer
        run: sudo apt-get update && sudo apt-get install -y librsvg2-bin

      - name: Generate web icons
        shell: bash
        run: |
          mkdir -p skbs_app/web/icons
          rsvg-convert -w 192 -h 192 skbs_app/web/icons/app_icon_matte_v2.svg -o skbs_app/web/icons/AppStroy-192-v2.png
          rsvg-convert -w 512 -h 512 skbs_app/web/icons/app_icon_matte_v2.svg -o skbs_app/web/icons/AppStroy-512-v2.png
          rsvg-convert -w 64 -h 64 skbs_app/web/icons/app_icon_matte_v2.svg -o skbs_app/web/favicon-v2.png

      - name: Flutter pub get
        working-directory: skbs_app
        run: flutter pub get

      - name: Format changed source
        working-directory: skbs_app
        run: |
          dart format \
            lib/data/employee_repository.dart \
            lib/data/employee_archive_repository.dart \
            lib/features/archive/presentation/archive_management_screen_v3.dart \
            lib/screens/employee_details_screen.dart \
            lib/screens/employees_screen.dart \
            lib/screens/task_details_screen.dart

      - name: Analyze source
        working-directory: skbs_app
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Build Flutter Web
        working-directory: skbs_app
        run: flutter build web --release --base-href /appstroy-web/

      - name: Commit verified source changes
        working-directory: skbs_app
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No source changes to commit"
            exit 0
          fi
          git commit -m "перепроверены и завершены последние изменения"
          git push

      - name: Keep brick loader and bust cache
        shell: bash
        run: |
          BUILD_ID="$(git -C skbs_app rev-parse --short=12 HEAD)"
          sed -i "s/manifest\.json/manifest.json?v=${BUILD_ID}/g" skbs_app/build/web/index.html
          sed -i "s/flutter_bootstrap\.js/flutter_bootstrap.js?v=${BUILD_ID}/g" skbs_app/build/web/index.html
          sed -i "s/main\.dart\.js/main.dart.js?v=${BUILD_ID}/g" skbs_app/build/web/flutter_bootstrap.js
          sed -i "/window.addEventListener('flutter-first-frame', hideLoader);/d" skbs_app/build/web/index.html
          sed -i "s/window.setTimeout(hideLoader, 9000);/window.setTimeout(hideLoader, 7000);/" skbs_app/build/web/index.html
          cp skbs_app/build/web/index.html skbs_app/build/web/404.html

      - name: Checkout web repository
        uses: actions/checkout@v4
        with:
          repository: 13off/appstroy-web
          token: ${{ secrets.WEB_DEPLOY_TOKEN }}
          path: appstroy-web

      - name: Replace web files
        shell: bash
        run: |
          find appstroy-web -mindepth 1 -maxdepth 1 ! -name '.git' -exec rm -rf {} +
          cp -R skbs_app/build/web/. appstroy-web/
          touch appstroy-web/.nojekyll

      - name: Commit and push web build
        working-directory: appstroy-web
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No web changes to publish"
            exit 0
          fi
          git commit -m "обновлена веб версия"
          git push
