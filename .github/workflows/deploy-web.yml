name: Build and publish web

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: appstroy-web
  cancel-in-progress: true

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Check deploy token
        shell: bash
        run: |
          if [ -z "${{ secrets.WEB_DEPLOY_TOKEN }}" ]; then
            echo "::error::Не найден secret WEB_DEPLOY_TOKEN"
            exit 1
          fi

      - name: Checkout source app
        uses: actions/checkout@v4
        with:
          path: skbs_app
          persist-credentials: true

      - name: Apply premium panel hover polish
        shell: bash
        run: |
          if [ ! -f skbs_app/tool/premium_hover_polish.marker ]; then
            echo "No pending hover polish"
            exit 0
          fi

          python - <<'PY'
          from pathlib import Path

          path = Path('skbs_app/lib/widgets/premium_ui_v2.dart')
          text = path.read_text(encoding='utf-8')

          old = """    final scale = isPressed
        ? widget.pressedScale
        : isHovered && isEnabled
        ? 1.003
        : 1.0;

    final hoverShadow = isHovered && isEnabled && !isPressed
        ? <BoxShadow>[
            BoxShadow(
              color: const Color(0xFF17191C).withValues(alpha: 0.14),
              blurRadius: 20,
              offset: const Offset(0, 9),
            ),
          ]
        : const <BoxShadow>[];
"""

          new = """    final scale = isPressed
        ? widget.pressedScale
        : isHovered && isEnabled
        ? 1.0015
        : 1.0;

    final hoverShadow = isHovered && isEnabled && !isPressed
        ? <BoxShadow>[
            BoxShadow(
              color: const Color(0xFF17191C).withValues(alpha: 0.055),
              blurRadius: 18,
              spreadRadius: -4,
              offset: const Offset(0, 6),
            ),
            BoxShadow(
              color: Colors.white.withValues(alpha: 0.78),
              blurRadius: 0,
              spreadRadius: 0.7,
              offset: const Offset(0, -0.4),
            ),
          ]
        : const <BoxShadow>[];
"""

          if old not in text:
              raise RuntimeError('Не найден старый hover-эффект PremiumPressable')

          path.write_text(text.replace(old, new, 1), encoding='utf-8')
          Path('skbs_app/tool/premium_hover_polish.marker').unlink()
          PY

          echo "SOURCE_PATCH_APPLIED=1" >> "$GITHUB_ENV"
          echo "SOURCE_COMMIT_MESSAGE=сделано премиальное наведение нижней панели" >> "$GITHUB_ENV"

      - name: Apply iOS Telegram navigation fix
        shell: bash
        run: |
          if [ ! -f skbs_app/tool/fix_ios_swipe_loading.marker ]; then
            echo "No pending navigation fix"
            exit 0
          fi

          python - <<'PY'
          from pathlib import Path

          root = Path('skbs_app')
          route_file = root / 'lib/navigation/app_page_route.dart'
          route_file.parent.mkdir(parents=True, exist_ok=True)
          route_file.write_text("""import 'package:flutter/cupertino.dart';

class AppPageRoute<T> extends CupertinoPageRoute<T> {
  AppPageRoute({
    required super.builder,
    super.settings,
    super.title,
    super.fullscreenDialog = false,
    super.maintainState = true,
  });

  @override
  Duration get transitionDuration => const Duration(milliseconds: 270);

  @override
  Duration get reverseTransitionDuration => const Duration(milliseconds: 230);
}
""", encoding='utf-8')

          package_import = "import 'package:skbs_app/navigation/app_page_route.dart';\n"
          changed = [route_file]

          for path in (root / 'lib').rglob('*.dart'):
              if path == route_file:
                  continue
              text = path.read_text(encoding='utf-8')
              if 'CupertinoPageRoute' not in text and 'MaterialPageRoute' not in text:
                  continue

              updated = text.replace(
                  "import 'package:flutter/cupertino.dart' show CupertinoPageRoute;\n",
                  '',
              )
              updated = updated.replace('CupertinoPageRoute', 'AppPageRoute')
              updated = updated.replace('MaterialPageRoute', 'AppPageRoute')

              if package_import not in updated:
                  material_import = "import 'package:flutter/material.dart';\n"
                  if material_import in updated:
                      updated = updated.replace(
                          material_import,
                          material_import + package_import,
                          1,
                      )
                  else:
                      updated = package_import + updated

              if updated != text:
                  path.write_text(updated, encoding='utf-8')
                  changed.append(path)

          employees = root / 'lib/screens/employees_screen.dart'
          text = employees.read_text(encoding='utf-8')
          updated = text.replace(
              'if (showLoading || employees.isEmpty) {',
              'if (showLoading && employees.isEmpty) {',
          )
          if updated != text:
              employees.write_text(updated, encoding='utf-8')
              changed.append(employees)

          for marker_name in (
              'fix_ios_swipe_loading.marker',
              'apply_ios_telegram_motion.marker',
              'enable_interactive_back_routes.marker',
          ):
              marker = root / 'tool' / marker_name
              if marker.exists():
                  marker.unlink()

          trigger = root / 'tool/trigger_ios_navigation_build.txt'
          if trigger.exists():
              trigger.unlink()

          print(f'Updated files: {len(set(changed))}')
          PY

          echo "SOURCE_PATCH_APPLIED=1" >> "$GITHUB_ENV"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter pub get
        working-directory: skbs_app
        run: flutter pub get

      - name: Format source
        if: env.SOURCE_PATCH_APPLIED == '1'
        working-directory: skbs_app
        run: dart format lib

      - name: Analyze source
        if: env.SOURCE_PATCH_APPLIED == '1'
        working-directory: skbs_app
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Build Flutter Web
        working-directory: skbs_app
        run: flutter build web --release --base-href /appstroy-web/

      - name: Commit checked source changes
        if: env.SOURCE_PATCH_APPLIED == '1'
        working-directory: skbs_app
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "${SOURCE_COMMIT_MESSAGE:-обновлен интерфейс приложения}"
          git push

      - name: Add cache busting
        shell: bash
        run: |
          BUILD_ID="$(git -C skbs_app rev-parse --short=12 HEAD)"
          sed -i "s/manifest\.json/manifest.json?v=${BUILD_ID}/g" skbs_app/build/web/index.html
          sed -i "s/flutter_bootstrap\.js/flutter_bootstrap.js?v=${BUILD_ID}/g" skbs_app/build/web/index.html
          sed -i "s/main\.dart\.js/main.dart.js?v=${BUILD_ID}/g" skbs_app/build/web/flutter_bootstrap.js
          cp skbs_app/build/web/index.html skbs_app/build/web/404.html

      - name: Checkout web repository
        uses: actions/checkout@v4
        with:
          repository: 13off/appstroy-web
          token: ${{ secrets.WEB_DEPLOY_TOKEN }}
          path: appstroy-web
          persist-credentials: true

      - name: Replace web files
        shell: bash
        run: |
          find appstroy-web -mindepth 1 -maxdepth 1 ! -name '.git' -exec rm -rf {} +
          cp -R skbs_app/build/web/. appstroy-web/
          touch appstroy-web/.nojekyll

      - name: Commit and push web build
        working-directory: appstroy-web
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "обновлена веб версия"
          git push
