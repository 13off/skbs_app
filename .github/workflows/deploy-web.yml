name: Build and publish web

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: appstroy-web
  cancel-in-progress: true

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Check deploy token
        shell: bash
        run: |
          if [ -z "${{ secrets.WEB_DEPLOY_TOKEN }}" ]; then
            echo "::error::Не найден secret WEB_DEPLOY_TOKEN"
            exit 1
          fi

      - name: Checkout source app
        uses: actions/checkout@v4
        with:
          path: skbs_app
          persist-credentials: true

      - name: Apply employee archive flow once
        shell: bash
        run: |
          if [ ! -f skbs_app/tool/apply_employee_archive_flow.marker ]; then
            echo "No pending employee archive patch"
            exit 0
          fi

          python - <<'PY'
          from pathlib import Path

          root = Path('skbs_app')

          details = root / 'lib/screens/employee_details_screen.dart'
          text = details.read_text(encoding='utf-8')

          archive_import = "import '../data/employee_archive_repository.dart';\n"
          employee_import = "import '../data/employee_repository.dart';\n"
          if archive_import not in text:
              text = text.replace(employee_import, archive_import + employee_import, 1)

          text = text.replace(
              "  bool isChangingStatus = false;\n  bool isCopyingEmployee = false;\n",
              "  bool isChangingStatus = false;\n  bool isCopyingEmployee = false;\n  bool isArchivingEmployee = false;\n",
              1,
          )

          start = text.index('  Future<void> toggleFiredStatus() async {')
          end = text.index('  Widget buildActionTile({', start)
          new_block = '''  Future<void> archiveCurrentEmployee() async {
    final employeeId = employee.id?.trim() ?? '';
    if (employeeId.isEmpty || isArchivingEmployee) return;

    final confirmed = await showDialog<bool>(
      context: context,
      builder: (context) => AlertDialog(
        title: const Text('Архивировать сотрудника?'),
        content: Text(
          '${employee.name} исчезнет из рабочего списка. Табель, выплаты, документы и личные данные сохранятся.',
        ),
        actions: [
          TextButton(
            onPressed: () => Navigator.pop(context, false),
            child: const Text('Отмена'),
          ),
          FilledButton.icon(
            onPressed: () => Navigator.pop(context, true),
            icon: const Icon(Icons.archive_outlined),
            label: const Text('В архив'),
          ),
        ],
      ),
    );

    if (confirmed != true || !mounted) return;

    setState(() => isArchivingEmployee = true);
    try {
      await EmployeeArchiveRepository.archiveEmployee(employeeId);
      if (!mounted) return;
      Navigator.pop(context);
    } catch (error) {
      if (!mounted) return;
      ScaffoldMessenger.of(context).showSnackBar(
        SnackBar(content: Text('Ошибка архивирования: $error')),
      );
    } finally {
      if (mounted) setState(() => isArchivingEmployee = false);
    }
  }

  Future<void> toggleFiredStatus() async {
    final employeeId = employee.id;

    if (employeeId == null || employeeId.isEmpty) {
      ScaffoldMessenger.of(
        context,
      ).showSnackBar(const SnackBar(content: Text('Не найден ID сотрудника')));
      return;
    }

    final willFire = employee.isActive;

    final action = await showDialog<String>(
      context: context,
      builder: (context) {
        return AlertDialog(
          title: Text(willFire ? 'Отметить уволенным?' : 'Вернуть сотрудника?'),
          content: Text(
            willFire
                ? '${employee.name} будет перенесён вниз списка в раздел «Уволенные». Можно сразу убрать его в архив.'
                : '${employee.name} снова появится в активных сотрудниках.',
          ),
          actions: [
            TextButton(
              onPressed: () => Navigator.pop(context),
              child: const Text('Отмена'),
            ),
            if (willFire)
              OutlinedButton.icon(
                onPressed: () => Navigator.pop(context, 'archive'),
                icon: const Icon(Icons.archive_outlined),
                label: const Text('Уволить и архивировать'),
              ),
            FilledButton(
              onPressed: () => Navigator.pop(
                context,
                willFire ? 'fire' : 'restore',
              ),
              child: Text(willFire ? 'Уволить' : 'Вернуть'),
            ),
          ],
        );
      },
    );

    if (action == null) return;

    if (action == 'archive') {
      setState(() => isArchivingEmployee = true);
      try {
        await EmployeeArchiveRepository.archiveEmployee(employeeId);
        if (!mounted) return;
        Navigator.pop(context);
      } catch (error) {
        if (!mounted) return;
        ScaffoldMessenger.of(context).showSnackBar(
          SnackBar(content: Text('Ошибка архивирования: $error')),
        );
      } finally {
        if (mounted) setState(() => isArchivingEmployee = false);
      }
      return;
    }

    setState(() {
      isChangingStatus = true;
    });

    try {
      await EmployeeRepository.setEmployeeActive(
        employeeId: employeeId,
        isActive: action == 'restore',
      );

      if (!mounted) return;

      setState(() {
        employee = Employee(
          employee.name,
          employee.position,
          employee.status,
          id: employee.id,
          phone: employee.phone,
          objectName: employee.objectName,
          dailyRate: employee.dailyRate,
          isActive: action == 'restore',
          comment: employee.comment,
        );
      });

      ScaffoldMessenger.of(context).showSnackBar(
        SnackBar(
          content: Text(
            action == 'fire'
                ? 'Сотрудник отмечен как уволенный'
                : 'Сотрудник возвращён в активные',
          ),
        ),
      );
    } catch (e) {
      if (!mounted) return;

      ScaffoldMessenger.of(
        context,
      ).showSnackBar(SnackBar(content: Text('Ошибка изменения статуса: $e')));
    } finally {
      if (mounted) {
        setState(() {
          isChangingStatus = false;
        });
      }
    }
  }

'''
          text = text[:start] + new_block + text[end:]

          old_actions = '''            _roundHeaderButton(
              tooltip: isFired ? 'Вернуть в активные' : 'Уволить',
              icon: isFired ? Icons.undo : Icons.person_off_outlined,
              onPressed: isChangingStatus || isCopyingEmployee
                  ? null
                  : toggleFiredStatus,
              child: isChangingStatus
                  ? const SizedBox(
                      width: 18,
                      height: 18,
                      child: CircularProgressIndicator(strokeWidth: 2),
                    )
                  : null,
            ),
'''
          new_actions = '''            _roundHeaderButton(
              tooltip: isFired ? 'Вернуть в активные' : 'Уволить',
              icon: isFired ? Icons.undo : Icons.person_off_outlined,
              onPressed:
                  isChangingStatus || isCopyingEmployee || isArchivingEmployee
                  ? null
                  : toggleFiredStatus,
              child: isChangingStatus
                  ? const SizedBox(
                      width: 18,
                      height: 18,
                      child: CircularProgressIndicator(strokeWidth: 2),
                    )
                  : null,
            ),
            if (widget.profile.isAdmin && isFired)
              _roundHeaderButton(
                tooltip: 'Архивировать',
                icon: Icons.archive_outlined,
                onPressed:
                    isChangingStatus || isCopyingEmployee || isArchivingEmployee
                    ? null
                    : archiveCurrentEmployee,
                child: isArchivingEmployee
                    ? const SizedBox(
                        width: 18,
                        height: 18,
                        child: CircularProgressIndicator(strokeWidth: 2),
                      )
                    : null,
              ),
'''
          if old_actions not in text:
              raise RuntimeError('Не найден блок кнопок статуса сотрудника')
          text = text.replace(old_actions, new_actions, 1)
          details.write_text(text, encoding='utf-8')

          employees = root / 'lib/screens/employees_screen.dart'
          text = employees.read_text(encoding='utf-8')
          archive_import = "import '../data/employee_archive_repository.dart';\n"
          private_import = "import '../data/employee_private_data_repository.dart';\n"
          if archive_import not in text:
              text = text.replace(private_import, archive_import + private_import, 1)

          old_load = '''      final loadedEmployees = await EmployeeRepository.fetchEmployees(
        objectName: widget.selectedObjectName,
        includeFired: true,
      );

      if (!mounted || currentGeneration != loadGeneration) return;

      setState(() {
        employees = loadedEmployees;
'''
          new_load = '''      final result = await Future.wait<dynamic>([
        EmployeeRepository.fetchEmployees(
          objectName: widget.selectedObjectName,
          includeFired: true,
        ),
        EmployeeArchiveRepository.fetchArchivedEmployeeIds(),
      ]);
      final loadedEmployees = result[0] as List<Employee>;
      final archivedIds = result[1] as Set<String>;
      final visibleEmployees = loadedEmployees.where((employee) {
        final id = employee.id?.trim() ?? '';
        return id.isEmpty || !archivedIds.contains(id);
      }).toList();

      if (!mounted || currentGeneration != loadGeneration) return;

      setState(() {
        employees = visibleEmployees;
'''
          if old_load not in text:
              raise RuntimeError('Не найдено получение списка сотрудников')
          text = text.replace(old_load, new_load, 1)
          employees.write_text(text, encoding='utf-8')

          (root / 'tool/apply_employee_archive_flow.marker').unlink()
          PY

          echo "SOURCE_PATCH_APPLIED=1" >> "$GITHUB_ENV"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install icon renderer
        run: sudo apt-get update && sudo apt-get install -y librsvg2-bin

      - name: Generate web icons
        shell: bash
        run: |
          mkdir -p skbs_app/web/icons
          rsvg-convert -w 192 -h 192 skbs_app/web/icons/app_icon_matte_v2.svg -o skbs_app/web/icons/AppStroy-192-v2.png
          rsvg-convert -w 512 -h 512 skbs_app/web/icons/app_icon_matte_v2.svg -o skbs_app/web/icons/AppStroy-512-v2.png
          rsvg-convert -w 64 -h 64 skbs_app/web/icons/app_icon_matte_v2.svg -o skbs_app/web/favicon-v2.png

      - name: Flutter pub get
        working-directory: skbs_app
        run: flutter pub get

      - name: Format patched source
        if: env.SOURCE_PATCH_APPLIED == '1'
        working-directory: skbs_app
        run: dart format lib/screens/employee_details_screen.dart lib/screens/employees_screen.dart

      - name: Analyze source
        working-directory: skbs_app
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Commit source patch
        if: env.SOURCE_PATCH_APPLIED == '1'
        working-directory: skbs_app
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "архив сотрудника отделен от увольнения"
          git push

      - name: Build Flutter Web
        working-directory: skbs_app
        run: flutter build web --release --base-href /appstroy-web/

      - name: Keep loader and bust cache
        shell: bash
        run: |
          BUILD_ID="$(git -C skbs_app rev-parse --short=12 HEAD)"
          sed -i "s/manifest\.json/manifest.json?v=${BUILD_ID}/g" skbs_app/build/web/index.html
          sed -i "s/flutter_bootstrap\.js/flutter_bootstrap.js?v=${BUILD_ID}/g" skbs_app/build/web/index.html
          sed -i "s/main\.dart\.js/main.dart.js?v=${BUILD_ID}/g" skbs_app/build/web/flutter_bootstrap.js
          sed -i "/window.addEventListener('flutter-first-frame', hideLoader);/d" skbs_app/build/web/index.html
          sed -i "s/window.setTimeout(hideLoader, 9000);/window.setTimeout(hideLoader, 7000);/" skbs_app/build/web/index.html
          cp skbs_app/build/web/index.html skbs_app/build/web/404.html

      - name: Checkout web repository
        uses: actions/checkout@v4
        with:
          repository: 13off/appstroy-web
          token: ${{ secrets.WEB_DEPLOY_TOKEN }}
          path: appstroy-web

      - name: Replace web files
        shell: bash
        run: |
          find appstroy-web -mindepth 1 -maxdepth 1 ! -name '.git' -exec rm -rf {} +
          cp -R skbs_app/build/web/. appstroy-web/
          touch appstroy-web/.nojekyll

      - name: Commit and push web build
        working-directory: appstroy-web
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No web changes to publish"
            exit 0
          fi
          git commit -m "обновлена веб версия"
          git push
