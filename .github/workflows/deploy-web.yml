name: Build and publish web

on:
  push:
    branches:
      - main
    paths:
      - lib/**
      - test/**
      - assets/**
      - web/**
      - pubspec.yaml
      - pubspec.lock
      - .fvmrc
      - .github/workflows/deploy-web.yml
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: appstroy-web
  cancel-in-progress: true

env:
  APP_PUBLIC_URL: https://13off.github.io/appstroy-web/
  FIREBASE_API_KEY: ${{ vars.FIREBASE_API_KEY }}
  FIREBASE_PROJECT_ID: ${{ vars.FIREBASE_PROJECT_ID }}
  FIREBASE_MESSAGING_SENDER_ID: ${{ vars.FIREBASE_MESSAGING_SENDER_ID }}
  FIREBASE_AUTH_DOMAIN: ${{ vars.FIREBASE_AUTH_DOMAIN }}
  FIREBASE_STORAGE_BUCKET: ${{ vars.FIREBASE_STORAGE_BUCKET }}
  FIREBASE_WEB_APP_ID: ${{ vars.FIREBASE_WEB_APP_ID }}
  FIREBASE_ANDROID_APP_ID: ${{ vars.FIREBASE_ANDROID_APP_ID }}
  FIREBASE_IOS_APP_ID: ${{ vars.FIREBASE_IOS_APP_ID }}
  FIREBASE_VAPID_KEY: ${{ vars.FIREBASE_VAPID_KEY }}

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Check deploy token
        shell: bash
        run: |
          if [ -z "${{ secrets.WEB_DEPLOY_TOKEN }}" ]; then
            echo "::error::Не найден secret WEB_DEPLOY_TOKEN"
            exit 1
          fi

      - name: Checkout source app
        uses: actions/checkout@v4
        with:
          path: skbs_app
          fetch-depth: 2
          show-progress: false

      - name: Patch developer panel scrolling
        working-directory: skbs_app
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('lib/features/developer/presentation/developer_panel_screen.dart')
          text = path.read_text(encoding='utf-8')

          replacements = [
              (
                  """                  final selector = _buildSelector();
                  final editor = _buildEditor();""",
                  """                  final selector = _buildSelector(scrollable: desktop);
                  final editor = _buildEditor(scrollable: desktop);""",
              ),
              (
                  """  Widget _buildSelector() {
    final value = center!;
    return ListView(
      shrinkWrap: true,
      physics: const NeverScrollableScrollPhysics(),""",
                  """  Widget _buildSelector({required bool scrollable}) {
    final value = center!;
    return ListView(
      primary: false,
      shrinkWrap: !scrollable,
      physics: scrollable
          ? const AlwaysScrollableScrollPhysics()
          : const NeverScrollableScrollPhysics(),""",
              ),
              (
                  """  Widget _buildEditor() {
    final object = selectedObject;
    return ListView(
      shrinkWrap: true,
      physics: const NeverScrollableScrollPhysics(),""",
                  """  Widget _buildEditor({required bool scrollable}) {
    final object = selectedObject;
    return ListView(
      primary: false,
      shrinkWrap: !scrollable,
      physics: scrollable
          ? const AlwaysScrollableScrollPhysics()
          : const NeverScrollableScrollPhysics(),""",
              ),
          ]

          for old, new in replacements:
              count = text.count(old)
              if count != 1:
                  raise RuntimeError(f'Expected exactly one match, found {count}: {old[:80]!r}')
              text = text.replace(old, new)

          path.write_text(text, encoding='utf-8')

          test = Path('test/developer_panel_scroll_contract_test.dart')
          test.write_text(
              """import 'dart:io';

import 'package:flutter_test/flutter_test.dart';

void main() {
  test('developer panel scrolls independently on desktop', () {
    final source = File(
      'lib/features/developer/presentation/developer_panel_screen.dart',
    ).readAsStringSync();

    expect(source, contains('_buildSelector(scrollable: desktop)'));
    expect(source, contains('_buildEditor(scrollable: desktop)'));
    expect(source, contains('primary: false'));
    expect(source, contains('shrinkWrap: !scrollable'));
    expect(source, contains('AlwaysScrollableScrollPhysics'));
    expect(
      RegExp(r'NeverScrollableScrollPhysics').allMatches(source).length,
      greaterThanOrEqualTo(2),
    );
  });
}
""",
              encoding='utf-8',
          )
          PY

      - name: Checkout web repository
        uses: actions/checkout@v4
        with:
          repository: 13off/appstroy-web
          token: ${{ secrets.WEB_DEPLOY_TOKEN }}
          path: appstroy-web
          show-progress: false

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version-file: skbs_app/.fvmrc
          cache: true

      - name: Format scroll fix
        working-directory: skbs_app
        run: dart format lib/features/developer/presentation/developer_panel_screen.dart test/developer_panel_scroll_contract_test.dart

      - name: Install icon renderer
        run: |
          sudo apt-get update >/dev/null
          sudo apt-get install -y librsvg2-bin >/dev/null

      - name: Generate web icons
        shell: bash
        run: |
          mkdir -p skbs_app/web/icons
          rsvg-convert -w 192 -h 192 skbs_app/web/icons/app_icon_matte_v2.svg -o skbs_app/web/icons/AppStroy-192-v2.png
          rsvg-convert -w 512 -h 512 skbs_app/web/icons/app_icon_matte_v2.svg -o skbs_app/web/icons/AppStroy-512-v2.png
          rsvg-convert -w 64 -h 64 skbs_app/web/icons/app_icon_matte_v2.svg -o skbs_app/web/favicon-v2.png

      - name: Install locked dependencies
        working-directory: skbs_app
        run: flutter pub get --enforce-lockfile >/dev/null

      - name: Run regression tests
        working-directory: skbs_app
        shell: bash
        run: flutter test --reporter compact 2>&1 | tee ../flutter-test.log

      - name: Analyze source
        working-directory: skbs_app
        shell: bash
        run: flutter analyze --no-fatal-infos --no-fatal-warnings 2>&1 | tee ../flutter-analyze.log

      - name: Configure public Firebase web values
        working-directory: skbs_app
        shell: bash
        run: |
          python3 - <<'PY'
          import os
          from pathlib import Path

          path = Path('web/firebase-messaging-sw.js')
          text = path.read_text(encoding='utf-8')
          replacements = {
              '__FIREBASE_API_KEY__': os.environ.get('FIREBASE_API_KEY', ''),
              '__FIREBASE_AUTH_DOMAIN__': os.environ.get('FIREBASE_AUTH_DOMAIN', ''),
              '__FIREBASE_PROJECT_ID__': os.environ.get('FIREBASE_PROJECT_ID', ''),
              '__FIREBASE_STORAGE_BUCKET__': os.environ.get('FIREBASE_STORAGE_BUCKET', ''),
              '__FIREBASE_MESSAGING_SENDER_ID__': os.environ.get('FIREBASE_MESSAGING_SENDER_ID', ''),
              '__FIREBASE_WEB_APP_ID__': os.environ.get('FIREBASE_WEB_APP_ID', ''),
              '__APP_PUBLIC_URL__': os.environ.get('APP_PUBLIC_URL', ''),
          }
          for marker, value in replacements.items():
              text = text.replace(marker, value)
          path.write_text(text, encoding='utf-8')
          PY

      - name: Build Flutter Web through proxy
        working-directory: skbs_app
        run: |
          flutter build web --release \
            --base-href /appstroy-web/ \
            --dart-define=SUPABASE_URL=https://api.appstroy-web.ru \
            --dart-define=FIREBASE_API_KEY="$FIREBASE_API_KEY" \
            --dart-define=FIREBASE_PROJECT_ID="$FIREBASE_PROJECT_ID" \
            --dart-define=FIREBASE_MESSAGING_SENDER_ID="$FIREBASE_MESSAGING_SENDER_ID" \
            --dart-define=FIREBASE_AUTH_DOMAIN="$FIREBASE_AUTH_DOMAIN" \
            --dart-define=FIREBASE_STORAGE_BUCKET="$FIREBASE_STORAGE_BUCKET" \
            --dart-define=FIREBASE_WEB_APP_ID="$FIREBASE_WEB_APP_ID" \
            --dart-define=FIREBASE_ANDROID_APP_ID="$FIREBASE_ANDROID_APP_ID" \
            --dart-define=FIREBASE_IOS_APP_ID="$FIREBASE_IOS_APP_ID" \
            --dart-define=FIREBASE_VAPID_KEY="$FIREBASE_VAPID_KEY" \
            2>&1 | tee ../flutter-web-build.log

      - name: Bust cache
        shell: bash
        run: |
          BUILD_ID="$(git -C skbs_app rev-parse --short=12 HEAD)"
          sed -i "s/manifest\.json/manifest.json?v=${BUILD_ID}/g" skbs_app/build/web/index.html
          sed -i "s/flutter_bootstrap\.js/flutter_bootstrap.js?v=${BUILD_ID}/g" skbs_app/build/web/index.html
          sed -i "s/main\.dart\.js/main.dart.js?v=${BUILD_ID}/g" skbs_app/build/web/flutter_bootstrap.js
          cp skbs_app/build/web/index.html skbs_app/build/web/404.html

      - name: Publish web files with conflict-safe retries
        working-directory: appstroy-web
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          for attempt in 1 2 3 4 5; do
            echo "Publish attempt ${attempt}/5"
            git fetch origin main
            git reset --hard origin/main

            find . -mindepth 1 -maxdepth 1 ! -name '.git' ! -name 'downloads' -exec rm -rf {} +
            cp -R ../skbs_app/build/web/. ./
            touch .nojekyll

            git add -A
            if git diff --cached --quiet; then
              echo "No web changes to publish"
              exit 0
            fi

            git commit -m "обновлена веб версия через российский прокси"
            if git push origin HEAD:main; then
              echo "Web files published successfully"
              exit 0
            fi

            echo "Remote changed during publish; rebuilding commit on latest main"
            sleep $((attempt * 3))
          done

          echo "::error::Не удалось опубликовать веб-файлы после 5 попыток"
          exit 1

      - name: Publish web build status
        if: always()
        working-directory: appstroy-web
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          BUILD_ID="$(git -C ../skbs_app rev-parse --short=12 HEAD)"

          for attempt in 1 2 3 4 5; do
            echo "Status attempt ${attempt}/5"
            git fetch origin main
            git reset --hard origin/main
            mkdir -p downloads

            if grep -q "flutter_bootstrap.js?v=${BUILD_ID}" index.html 2>/dev/null; then
              BUILD_STATUS="success"
            else
              BUILD_STATUS="failure"
            fi

            printf '%s\n' "${BUILD_STATUS}" > downloads/web-build-status.txt
            printf '%s\n' "${{ github.sha }}" > downloads/web-source-commit.txt
            {
              test -f ../flutter-test.log && cat ../flutter-test.log
              test -f ../flutter-analyze.log && cat ../flutter-analyze.log
              test -f ../flutter-web-build.log && cat ../flutter-web-build.log
            } > downloads/web-build.log || true

            git add downloads/web-build-status.txt downloads/web-source-commit.txt downloads/web-build.log
            if git diff --cached --quiet; then
              echo "Web build status is already current"
              exit 0
            fi

            git commit -m "сохранён статус веб-сборки"
            if git push origin HEAD:main; then
              echo "Web build status published"
              exit 0
            fi

            echo "Remote changed during status publish; retrying"
            sleep $((attempt * 2))
          done

          echo "::error::Не удалось сохранить статус веб-сборки"
          exit 1

      - name: Persist scroll fix and restore workflow
        working-directory: skbs_app
        shell: bash
        run: |
          git show HEAD^:.github/workflows/deploy-web.yml > .github/workflows/deploy-web.yml
          git config user.name "AppStroy Automation"
          git config user.email "actions@users.noreply.github.com"
          git add lib/features/developer/presentation/developer_panel_screen.dart test/developer_panel_scroll_contract_test.dart .github/workflows/deploy-web.yml
          git commit -m "Исправить прокрутку панели разработчика"
          git push origin HEAD:main
