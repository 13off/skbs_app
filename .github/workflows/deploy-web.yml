name: Build and publish web

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: appstroy-web
  cancel-in-progress: true

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Check deploy token
        shell: bash
        run: |
          if [ -z "${{ secrets.WEB_DEPLOY_TOKEN }}" ]; then
            echo "::error::Не найден secret WEB_DEPLOY_TOKEN. Добавь его в skbs_app -> Settings -> Secrets and variables -> Actions."
            exit 1
          fi

      - name: Checkout source app
        uses: actions/checkout@v4
        with:
          path: skbs_app
          persist-credentials: true

      - name: Apply pending interface optimization
        shell: bash
        run: |
          if [ ! -f skbs_app/tool/one_time_natural_motion.part1 ]; then
            echo "No pending source patch"
            exit 0
          fi

          cat skbs_app/tool/one_time_natural_motion.part1 \
              skbs_app/tool/one_time_natural_motion.part2 \
              skbs_app/tool/one_time_natural_motion.part3 \
              skbs_app/tool/one_time_natural_motion.part4 \
              skbs_app/tool/one_time_natural_motion.part5 \
              > skbs_app/tool/one_time_natural_motion.py

          python skbs_app/tool/one_time_natural_motion.py

          rm -f skbs_app/tool/one_time_natural_motion.part1 \
                skbs_app/tool/one_time_natural_motion.part2 \
                skbs_app/tool/one_time_natural_motion.part3 \
                skbs_app/tool/one_time_natural_motion.part4 \
                skbs_app/tool/one_time_natural_motion.part5

          echo "SOURCE_PATCH_APPLIED=1" >> "$GITHUB_ENV"

      - name: Enable interactive back routes
        shell: bash
        run: |
          if [ ! -f skbs_app/tool/enable_interactive_back_routes.marker ]; then
            echo "No pending route patch"
            exit 0
          fi

          python - <<'PY'
          from pathlib import Path

          root = Path('skbs_app')
          import_line = "import 'package:flutter/cupertino.dart' show CupertinoPageRoute;\n"
          changed = []

          for path in (root / 'lib').rglob('*.dart'):
              text = path.read_text(encoding='utf-8')
              if 'MaterialPageRoute' not in text:
                  continue

              updated = text.replace('MaterialPageRoute', 'CupertinoPageRoute')

              if 'package:flutter/cupertino.dart' not in updated:
                  material_import = "import 'package:flutter/material.dart';\n"
                  if material_import in updated:
                      updated = updated.replace(
                          material_import,
                          material_import + import_line,
                          1,
                      )
                  else:
                      updated = import_line + updated

              if updated != text:
                  path.write_text(updated, encoding='utf-8')
                  changed.append(path.as_posix())

          if not changed:
              raise RuntimeError('MaterialPageRoute не найден ни в одном файле')

          (root / 'tool/enable_interactive_back_routes.marker').unlink()
          print(f'Updated route files: {len(changed)}')
          PY

          echo "SOURCE_PATCH_APPLIED=1" >> "$GITHUB_ENV"

      - name: Apply iOS and Telegram navigation polish
        shell: bash
        run: |
          if [ ! -f skbs_app/tool/apply_ios_telegram_motion.marker ]; then
            echo "No pending iOS route patch"
            exit 0
          fi

          python - <<'PY'
          from pathlib import Path

          root = Path('skbs_app')
          route_file = root / 'lib/navigation/app_page_route.dart'
          route_file.parent.mkdir(parents=True, exist_ok=True)
          route_file.write_text(
              """import 'package:flutter/cupertino.dart';
import 'package:flutter/widgets.dart';

class AppPageRoute<T> extends CupertinoPageRoute<T> {
  AppPageRoute({
    required super.builder,
    super.settings,
    super.title,
    super.fullscreenDialog = false,
    super.maintainState = true,
  });

  @override
  Duration get transitionDuration => const Duration(milliseconds: 270);

  @override
  Duration get reverseTransitionDuration => const Duration(milliseconds: 230);
}
""",
              encoding='utf-8',
          )

          package_import = "import 'package:skbs_app/navigation/app_page_route.dart';\n"
          changed = [route_file.as_posix()]

          for path in (root / 'lib').rglob('*.dart'):
              if path == route_file:
                  continue

              text = path.read_text(encoding='utf-8')
              if 'CupertinoPageRoute' not in text and 'MaterialPageRoute' not in text:
                  continue

              updated = text.replace(
                  "import 'package:flutter/cupertino.dart' show CupertinoPageRoute;\n",
                  '',
              )
              updated = updated.replace('CupertinoPageRoute', 'AppPageRoute')
              updated = updated.replace('MaterialPageRoute', 'AppPageRoute')

              if package_import not in updated:
                  material_import = "import 'package:flutter/material.dart';\n"
                  if material_import in updated:
                      updated = updated.replace(
                          material_import,
                          material_import + package_import,
                          1,
                      )
                  else:
                      updated = package_import + updated

              if updated != text:
                  path.write_text(updated, encoding='utf-8')
                  changed.append(path.as_posix())

          employees_file = root / 'lib/screens/employees_screen.dart'
          employees_text = employees_file.read_text(encoding='utf-8')
          employees_updated = employees_text.replace(
              'if (showLoading || employees.isEmpty) {',
              'if (showLoading) {',
          )
          if employees_updated != employees_text:
              employees_file.write_text(employees_updated, encoding='utf-8')
              changed.append(employees_file.as_posix())

          marker = root / 'tool/apply_ios_telegram_motion.marker'
          marker.unlink()

          print(f'Updated iOS navigation files: {len(set(changed))}')
          PY

          echo "SOURCE_PATCH_APPLIED=1" >> "$GITHUB_ENV"
          echo "SOURCE_COMMIT_MESSAGE=добавлена единая iOS навигация без повторной загрузки" >> "$GITHUB_ENV"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter pub get
        working-directory: skbs_app
        run: flutter pub get

      - name: Format optimized source
        if: env.SOURCE_PATCH_APPLIED == '1'
        working-directory: skbs_app
        run: dart format lib

      - name: Analyze optimized source
        if: env.SOURCE_PATCH_APPLIED == '1'
        working-directory: skbs_app
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Build Flutter Web
        working-directory: skbs_app
        run: flutter build web --release --base-href /appstroy-web/

      - name: Commit checked source optimization
        if: env.SOURCE_PATCH_APPLIED == '1'
        working-directory: skbs_app
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A

          if git diff --cached --quiet; then
            echo "No source changes to commit"
            exit 0
          fi

          git commit -m "${SOURCE_COMMIT_MESSAGE:-добавлен интерактивный свайп назад}"
          git push

      - name: Add web cache busting and GitHub Pages fallback
        shell: bash
        run: |
          BUILD_ID="$(git -C skbs_app rev-parse --short=12 HEAD)"
          sed -i "s/manifest\.json/manifest.json?v=${BUILD_ID}/g" skbs_app/build/web/index.html
          sed -i "s/flutter_bootstrap\.js/flutter_bootstrap.js?v=${BUILD_ID}/g" skbs_app/build/web/index.html
          sed -i "s/main\.dart\.js/main.dart.js?v=${BUILD_ID}/g" skbs_app/build/web/flutter_bootstrap.js
          cp skbs_app/build/web/index.html skbs_app/build/web/404.html

      - name: Checkout web repository
        uses: actions/checkout@v4
        with:
          repository: 13off/appstroy-web
          token: ${{ secrets.WEB_DEPLOY_TOKEN }}
          path: appstroy-web
          persist-credentials: true

      - name: Replace web files
        shell: bash
        run: |
          find appstroy-web -mindepth 1 -maxdepth 1 ! -name '.git' -exec rm -rf {} +
          cp -R skbs_app/build/web/. appstroy-web/
          touch appstroy-web/.nojekyll

      - name: Commit and push web build
        working-directory: appstroy-web
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A

          if git diff --cached --quiet; then
            echo "No web changes to publish"
            exit 0
          fi

          git commit -m "обновлена веб версия"
          git push
