name: Build and publish web

on:
  push:
    branches:
      - main
    paths:
      - lib/**
      - test/**
      - assets/**
      - web/**
      - pubspec.yaml
      - pubspec.lock
      - .fvmrc
      - .github/workflows/deploy-web.yml
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: appstroy-web
  cancel-in-progress: true

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Check deploy token
        shell: bash
        run: |
          if [ -z "${{ secrets.WEB_DEPLOY_TOKEN }}" ]; then
            echo "::error::Не найден secret WEB_DEPLOY_TOKEN"
            exit 1
          fi

      - name: Checkout source app
        uses: actions/checkout@v4
        with:
          path: skbs_app

      - name: Checkout web repository
        uses: actions/checkout@v4
        with:
          repository: 13off/appstroy-web
          token: ${{ secrets.WEB_DEPLOY_TOKEN }}
          path: appstroy-web

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version-file: skbs_app/.fvmrc
          cache: true

      - name: Install icon renderer
        run: sudo apt-get update && sudo apt-get install -y librsvg2-bin

      - name: Generate web icons
        shell: bash
        run: |
          mkdir -p skbs_app/web/icons
          rsvg-convert -w 192 -h 192 skbs_app/web/icons/app_icon_matte_v2.svg -o skbs_app/web/icons/AppStroy-192-v2.png
          rsvg-convert -w 512 -h 512 skbs_app/web/icons/app_icon_matte_v2.svg -o skbs_app/web/icons/AppStroy-512-v2.png
          rsvg-convert -w 64 -h 64 skbs_app/web/icons/app_icon_matte_v2.svg -o skbs_app/web/favicon-v2.png

      - name: Install locked dependencies
        working-directory: skbs_app
        run: flutter pub get --enforce-lockfile

      - name: Run regression tests
        working-directory: skbs_app
        shell: bash
        run: flutter test 2>&1 | tee ../flutter-test.log

      - name: Analyze source
        working-directory: skbs_app
        shell: bash
        run: flutter analyze --no-fatal-infos --no-fatal-warnings 2>&1 | tee ../flutter-analyze.log

      - name: Build Flutter Web through proxy
        working-directory: skbs_app
        run: |
          flutter build web --release \
            --base-href /appstroy-web/ \
            --dart-define=SUPABASE_URL=https://api.appstroy-web.ru \
            2>&1 | tee ../flutter-web-build.log

      - name: Bust cache
        shell: bash
        run: |
          BUILD_ID="$(git -C skbs_app rev-parse --short=12 HEAD)"
          sed -i "s/manifest\.json/manifest.json?v=${BUILD_ID}/g" skbs_app/build/web/index.html
          sed -i "s/flutter_bootstrap\.js/flutter_bootstrap.js?v=${BUILD_ID}/g" skbs_app/build/web/index.html
          sed -i "s/main\.dart\.js/main.dart.js?v=${BUILD_ID}/g" skbs_app/build/web/flutter_bootstrap.js
          cp skbs_app/build/web/index.html skbs_app/build/web/404.html

      - name: Replace web files
        shell: bash
        run: |
          find appstroy-web -mindepth 1 -maxdepth 1 ! -name '.git' ! -name 'downloads' -exec rm -rf {} +
          cp -R skbs_app/build/web/. appstroy-web/
          touch appstroy-web/.nojekyll

      - name: Commit and push web build
        working-directory: appstroy-web
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No web changes to publish"
            exit 0
          fi
          git commit -m "обновлена веб версия через российский прокси"
          git pull --rebase
          git push

      - name: Publish web build status
        if: always()
        working-directory: appstroy-web
        shell: bash
        run: |
          git pull --rebase
          mkdir -p downloads
          printf '%s\n' "${{ job.status }}" > downloads/web-build-status.txt
          printf '%s\n' "${{ github.sha }}" > downloads/web-source-commit.txt
          {
            test -f ../flutter-test.log && cat ../flutter-test.log
            test -f ../flutter-analyze.log && cat ../flutter-analyze.log
            test -f ../flutter-web-build.log && cat ../flutter-web-build.log
          } > downloads/web-build.log || true
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add downloads/web-build-status.txt downloads/web-source-commit.txt downloads/web-build.log
          if ! git diff --cached --quiet; then
            git commit -m "сохранён статус веб-сборки"
            git push
          fi
