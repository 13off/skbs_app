name: Build and publish web

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: appstroy-web
  cancel-in-progress: true

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Check deploy token
        shell: bash
        run: |
          if [ -z "${{ secrets.WEB_DEPLOY_TOKEN }}" ]; then
            echo "::error::Не найден secret WEB_DEPLOY_TOKEN"
            exit 1
          fi

      - name: Checkout source app
        uses: actions/checkout@v4
        with:
          path: skbs_app

      - name: Apply employee scroll position once
        shell: bash
        run: |
          if [ ! -f skbs_app/tool/apply_employee_scroll_position.marker ]; then
            echo "No pending employee scroll patch"
            exit 0
          fi

          python - <<'PY'
          from pathlib import Path

          path = Path('skbs_app/lib/screens/employees_screen.dart')
          text = path.read_text(encoding='utf-8')

          replacements = [
              (
                  "  final TextEditingController searchController = TextEditingController();\n",
                  "  final TextEditingController searchController = TextEditingController();\n"
                  "  final ScrollController employeesScrollController = ScrollController();\n",
                  'search controller',
              ),
              (
                  """  @override
  void dispose() {
    searchController.dispose();
    super.dispose();
  }
""",
                  """  @override
  void dispose() {
    searchController.dispose();
    employeesScrollController.dispose();
    super.dispose();
  }
""",
                  'dispose',
              ),
              (
                  """  Future<void> openEmployeeDetails(
    BuildContext context,
    Employee employee,
  ) async {
    await Navigator.push<void>(
      context,
      CupertinoPageRoute<void>(
        builder: (_) =>
            EmployeeDetailsScreen(profile: widget.profile, employee: employee),
      ),
    );

    if (!mounted) return;
    loadEmployees();
  }
""",
                  """  Future<void> openEmployeeDetails(
    BuildContext context,
    Employee employee,
  ) async {
    final savedScrollOffset = employeesScrollController.hasClients
        ? employeesScrollController.offset
        : 0.0;

    await Navigator.push<void>(
      context,
      CupertinoPageRoute<void>(
        builder: (_) =>
            EmployeeDetailsScreen(profile: widget.profile, employee: employee),
      ),
    );

    if (!mounted) return;

    await loadEmployees();

    if (!mounted) return;

    WidgetsBinding.instance.addPostFrameCallback((_) {
      if (!mounted || !employeesScrollController.hasClients) return;

      final position = employeesScrollController.position;
      final targetOffset = savedScrollOffset
          .clamp(position.minScrollExtent, position.maxScrollExtent)
          .toDouble();

      if ((position.pixels - targetOffset).abs() > 0.5) {
        employeesScrollController.jumpTo(targetOffset);
      }
    });
  }
""",
                  'employee details method',
              ),
              (
                  """        child: ListView(
          padding: const EdgeInsets.fromLTRB(18, 18, 18, 120),
          children: content,
        ),
""",
                  """        child: ListView(
          key: PageStorageKey<String>(
            'employees-list-${widget.selectedObjectName ?? 'all'}',
          ),
          controller: employeesScrollController,
          padding: const EdgeInsets.fromLTRB(18, 18, 18, 120),
          children: content,
        ),
""",
                  'employees list',
              ),
          ]

          for old, new, label in replacements:
              if old not in text:
                  raise SystemExit(f'Employee scroll patch anchor not found: {label}')
              text = text.replace(old, new, 1)

          path.write_text(text, encoding='utf-8')
          Path('skbs_app/tool/apply_employee_scroll_position.marker').unlink()
          PY

          echo "SOURCE_PATCH_APPLIED=1" >> "$GITHUB_ENV"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install icon renderer
        run: sudo apt-get update && sudo apt-get install -y librsvg2-bin

      - name: Generate web icons
        shell: bash
        run: |
          mkdir -p skbs_app/web/icons
          rsvg-convert -w 192 -h 192 skbs_app/web/icons/app_icon_matte_v2.svg -o skbs_app/web/icons/AppStroy-192-v2.png
          rsvg-convert -w 512 -h 512 skbs_app/web/icons/app_icon_matte_v2.svg -o skbs_app/web/icons/AppStroy-512-v2.png
          rsvg-convert -w 64 -h 64 skbs_app/web/icons/app_icon_matte_v2.svg -o skbs_app/web/favicon-v2.png

      - name: Flutter pub get
        working-directory: skbs_app
        run: flutter pub get

      - name: Format patched source
        if: env.SOURCE_PATCH_APPLIED == '1'
        working-directory: skbs_app
        run: dart format lib/screens/employees_screen.dart

      - name: Analyze source
        working-directory: skbs_app
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Commit source patch
        if: env.SOURCE_PATCH_APPLIED == '1'
        working-directory: skbs_app
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add lib/screens/employees_screen.dart tool/apply_employee_scroll_position.marker
          git commit -m "позиция списка сотрудников сохраняется после возврата"
          git push

      - name: Build Flutter Web
        working-directory: skbs_app
        run: flutter build web --release --base-href /appstroy-web/

      - name: Bust cache
        shell: bash
        run: |
          BUILD_ID="$(git -C skbs_app rev-parse --short=12 HEAD)"
          sed -i "s/manifest\.json/manifest.json?v=${BUILD_ID}/g" skbs_app/build/web/index.html
          sed -i "s/flutter_bootstrap\.js/flutter_bootstrap.js?v=${BUILD_ID}/g" skbs_app/build/web/index.html
          sed -i "s/main\.dart\.js/main.dart.js?v=${BUILD_ID}/g" skbs_app/build/web/flutter_bootstrap.js
          cp skbs_app/build/web/index.html skbs_app/build/web/404.html

      - name: Checkout web repository
        uses: actions/checkout@v4
        with:
          repository: 13off/appstroy-web
          token: ${{ secrets.WEB_DEPLOY_TOKEN }}
          path: appstroy-web

      - name: Replace web files
        shell: bash
        run: |
          find appstroy-web -mindepth 1 -maxdepth 1 ! -name '.git' -exec rm -rf {} +
          cp -R skbs_app/build/web/. appstroy-web/
          touch appstroy-web/.nojekyll

      - name: Commit and push web build
        working-directory: appstroy-web
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No web changes to publish"
            exit 0
          fi
          git commit -m "обновлена веб версия"
          git push
