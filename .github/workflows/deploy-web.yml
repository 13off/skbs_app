name: Build and publish web

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: appstroy-web
  cancel-in-progress: true

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Check deploy token
        shell: bash
        run: |
          if [ -z "${{ secrets.WEB_DEPLOY_TOKEN }}" ]; then
            echo "::error::Не найден secret WEB_DEPLOY_TOKEN. Добавь его в skbs_app -> Settings -> Secrets and variables -> Actions."
            exit 1
          fi

      - name: Checkout source app
        uses: actions/checkout@v4
        with:
          path: skbs_app
          fetch-depth: 0

      - name: Add private data import button
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('skbs_app/lib/screens/employees_screen.dart')
          text = path.read_text(encoding='utf-8')

          import_line = "import '../data/employee_private_data_repository.dart';\n"
          importer_line = "import '../data/employee_private_data_importer.dart';\n"
          if importer_line not in text:
              text = text.replace(import_line, import_line + importer_line, 1)

          state_marker = "  int loadGeneration = 0;\n"
          state_line = "  bool isImportingPrivateData = false;\n"
          if state_line not in text:
              text = text.replace(state_marker, state_marker + state_line, 1)

          method_marker = "  String firstLetter(String text) {\n"
          method = '''  Future<void> importPrivateData() async {
            if (!widget.profile.isAdmin || isImportingPrivateData) return;

            setState(() {
              isImportingPrivateData = true;
            });

            try {
              final result = await EmployeePrivateDataImporter.pickAndImport(
                objectName: concreteObjectName,
              );

              if (!mounted || result == null) return;

              await loadEmployees();

              if (!mounted) return;

              final missingPart = result.notFoundNames.isEmpty
                  ? ''
                  : ' • Не найдено: ${result.notFoundNames.length}';

              ScaffoldMessenger.of(context).showSnackBar(
                SnackBar(
                  content: Text(
                    'Личные данные загружены: ${result.updatedEmployees}$missingPart',
                  ),
                ),
              );
            } catch (e) {
              if (!mounted) return;

              ScaffoldMessenger.of(context).showSnackBar(
                SnackBar(content: Text('Ошибка импорта личных данных: $e')),
              );
            } finally {
              if (mounted) {
                setState(() {
                  isImportingPrivateData = false;
                });
              }
            }
          }

'''
          if 'Future<void> importPrivateData() async {' not in text:
              text = text.replace(method_marker, method + method_marker, 1)

          button_marker = '''              _HeaderActionButton(
                icon: Icons.person_add_alt_1,
                label: 'Добавить',
'''
          button = '''              if (widget.profile.isAdmin)
                _HeaderActionButton(
                  icon: Icons.upload_file_outlined,
                  label: isImportingPrivateData ? 'Загрузка...' : 'Импорт данных',
                  onTap: importPrivateData,
                ),
'''
          if "label: isImportingPrivateData ? 'Загрузка...' : 'Импорт данных'" not in text:
              text = text.replace(button_marker, button + button_marker, 1)

          path.write_text(text, encoding='utf-8')
          PY

          cd skbs_app
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add lib/screens/employees_screen.dart
          if ! git diff --cached --quiet; then
            git commit -m "добавлен импорт личных данных сотрудников"
            git push origin main
          fi

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter pub get
        working-directory: skbs_app
        run: flutter pub get

      - name: Build Flutter Web
        working-directory: skbs_app
        run: flutter build web --release --base-href /appstroy-web/

      - name: Add web cache busting and GitHub Pages fallback
        shell: bash
        run: |
          BUILD_ID="${GITHUB_SHA::12}"
          sed -i "s/manifest\.json/manifest.json?v=${BUILD_ID}/g" skbs_app/build/web/index.html
          sed -i "s/flutter_bootstrap\.js/flutter_bootstrap.js?v=${BUILD_ID}/g" skbs_app/build/web/index.html
          sed -i "s/main\.dart\.js/main.dart.js?v=${BUILD_ID}/g" skbs_app/build/web/flutter_bootstrap.js
          cp skbs_app/build/web/index.html skbs_app/build/web/404.html

      - name: Checkout web repository
        uses: actions/checkout@v4
        with:
          repository: 13off/appstroy-web
          token: ${{ secrets.WEB_DEPLOY_TOKEN }}
          path: appstroy-web
          persist-credentials: true

      - name: Replace web files
        shell: bash
        run: |
          find appstroy-web -mindepth 1 -maxdepth 1 ! -name '.git' -exec rm -rf {} +
          cp -R skbs_app/build/web/. appstroy-web/
          touch appstroy-web/.nojekyll

      - name: Commit and push web build
        working-directory: appstroy-web
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -A

          if git diff --cached --quiet; then
            echo "No web changes to publish"
            exit 0
          fi

          git commit -m "обновлена веб версия"
          git push
