name: Build and publish web

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: appstroy-web
  cancel-in-progress: true

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Check deploy token
        shell: bash
        run: |
          if [ -z "${{ secrets.WEB_DEPLOY_TOKEN }}" ]; then
            echo "::error::Не найден secret WEB_DEPLOY_TOKEN"
            exit 1
          fi

      - name: Checkout source app
        uses: actions/checkout@v4
        with:
          path: skbs_app
          persist-credentials: true

      - name: Apply task layout and employee close fix
        shell: bash
        run: |
          if [ ! -f skbs_app/tool/fix_task_layout_and_employee_close.marker ]; then
            echo "No pending UI fix"
            exit 0
          fi

          python - <<'PY'
          from pathlib import Path

          root = Path('skbs_app')

          task_path = root / 'lib/screens/task_details_screen.dart'
          task_text = task_path.read_text(encoding='utf-8')

          old_axes = """          TextField(
            controller: axesController,
            enabled: !isSaving,
            decoration: InputDecoration(
              labelText: 'Оси',
              border: OutlineInputBorder(
                borderRadius: BorderRadius.circular(16),
              ),
            ),
          ),
"""
          new_axes = """          const Padding(
            padding: EdgeInsets.only(left: 4, bottom: 8),
            child: Text(
              'Оси',
              style: TextStyle(
                fontSize: 14,
                fontWeight: FontWeight.w700,
                color: Color(0xFF6B7075),
              ),
            ),
          ),
          TextField(
            controller: axesController,
            enabled: !isSaving,
            decoration: InputDecoration(
              hintText: 'Укажи оси',
              border: OutlineInputBorder(
                borderRadius: BorderRadius.circular(16),
              ),
            ),
          ),
"""

          old_work = """          TextField(
            controller: workController,
            enabled: !isSaving,
            minLines: 3,
            maxLines: 7,
            decoration: InputDecoration(
              labelText: 'Вид работ',
              border: OutlineInputBorder(
                borderRadius: BorderRadius.circular(16),
              ),
            ),
          ),
"""
          new_work = """          const Padding(
            padding: EdgeInsets.only(left: 4, bottom: 8),
            child: Text(
              'Вид работ',
              style: TextStyle(
                fontSize: 14,
                fontWeight: FontWeight.w700,
                color: Color(0xFF6B7075),
              ),
            ),
          ),
          TextField(
            controller: workController,
            enabled: !isSaving,
            minLines: 3,
            maxLines: 7,
            decoration: InputDecoration(
              hintText: 'Опиши выполненные работы',
              alignLabelWithHint: true,
              border: OutlineInputBorder(
                borderRadius: BorderRadius.circular(16),
              ),
            ),
          ),
"""

          if old_axes not in task_text or old_work not in task_text:
              raise RuntimeError('Не найдены поля задачи для исправления')

          task_text = task_text.replace(old_axes, new_axes, 1)
          task_text = task_text.replace(old_work, new_work, 1)
          task_path.write_text(task_text, encoding='utf-8')

          employee_path = root / 'lib/screens/employees_screen.dart'
          employee_text = employee_path.read_text(encoding='utf-8')
          old_delay = """    Future<void>.delayed(const Duration(milliseconds: 235), () {
      if (!mounted) return;
      widget.onClosed();
    });
"""
          new_delay = """    widget.onClosed();
"""

          if old_delay not in employee_text:
              raise RuntimeError('Не найдена задержка возврата сотрудника')

          employee_path.write_text(
              employee_text.replace(old_delay, new_delay, 1),
              encoding='utf-8',
          )

          (root / 'tool/fix_task_layout_and_employee_close.marker').unlink()
          PY

          echo "SOURCE_PATCH_APPLIED=1" >> "$GITHUB_ENV"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install icon renderer
        run: sudo apt-get update && sudo apt-get install -y librsvg2-bin

      - name: Generate web icons from matte logo
        shell: bash
        run: |
          mkdir -p skbs_app/web/icons
          rsvg-convert -w 192 -h 192 skbs_app/web/icons/app_icon_matte_v2.svg -o skbs_app/web/icons/AppStroy-192-v2.png
          rsvg-convert -w 512 -h 512 skbs_app/web/icons/app_icon_matte_v2.svg -o skbs_app/web/icons/AppStroy-512-v2.png
          rsvg-convert -w 64 -h 64 skbs_app/web/icons/app_icon_matte_v2.svg -o skbs_app/web/favicon-v2.png

      - name: Flutter pub get
        working-directory: skbs_app
        run: flutter pub get

      - name: Format patched source
        if: env.SOURCE_PATCH_APPLIED == '1'
        working-directory: skbs_app
        run: dart format lib/screens/task_details_screen.dart lib/screens/employees_screen.dart

      - name: Analyze source
        working-directory: skbs_app
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Commit checked source changes
        if: env.SOURCE_PATCH_APPLIED == '1'
        working-directory: skbs_app
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "исправлена форма задачи и возврат из сотрудника"
          git push

      - name: Build Flutter Web
        working-directory: skbs_app
        run: flutter build web --release --base-href /appstroy-web/

      - name: Keep brick loader during warmup and bust cache
        shell: bash
        run: |
          BUILD_ID="$(git -C skbs_app rev-parse --short=12 HEAD)"
          sed -i "s/manifest\.json/manifest.json?v=${BUILD_ID}/g" skbs_app/build/web/index.html
          sed -i "s/flutter_bootstrap\.js/flutter_bootstrap.js?v=${BUILD_ID}/g" skbs_app/build/web/index.html
          sed -i "s/main\.dart\.js/main.dart.js?v=${BUILD_ID}/g" skbs_app/build/web/flutter_bootstrap.js
          sed -i "/window.addEventListener('flutter-first-frame', hideLoader);/d" skbs_app/build/web/index.html
          sed -i "s/window.setTimeout(hideLoader, 9000);/window.setTimeout(hideLoader, 7000);/" skbs_app/build/web/index.html
          cp skbs_app/build/web/index.html skbs_app/build/web/404.html

      - name: Checkout web repository
        uses: actions/checkout@v4
        with:
          repository: 13off/appstroy-web
          token: ${{ secrets.WEB_DEPLOY_TOKEN }}
          path: appstroy-web

      - name: Replace web files
        shell: bash
        run: |
          find appstroy-web -mindepth 1 -maxdepth 1 ! -name '.git' -exec rm -rf {} +
          cp -R skbs_app/build/web/. appstroy-web/
          touch appstroy-web/.nojekyll

      - name: Commit and push web build
        working-directory: appstroy-web
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No web changes to publish"
            exit 0
          fi
          git commit -m "обновлена веб версия"
          git push
