name: Build and publish web

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: app-stroy-web
  cancel-in-progress: true

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source app
        uses: actions/checkout@v4
        with:
          path: skbs_app

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter pub get
        working-directory: skbs_app
        run: flutter pub get

      - name: Build Flutter Web
        working-directory: skbs_app
        run: flutter build web --release --base-href /app-stroy_web/

      - name: Checkout web repository
        uses: actions/checkout@v4
        with:
          repository: 13off/app-stroy_web
          token: ${{ secrets.WEB_DEPLOY_TOKEN }}
          path: app-stroy_web

      - name: Replace web files
        shell: bash
        run: |
          find app-stroy_web -mindepth 1 -maxdepth 1 ! -name '.git' -exec rm -rf {} +
          cp -R skbs_app/build/web/. app-stroy_web/
          touch app-stroy_web/.nojekyll

      - name: Commit and push web build
        working-directory: app-stroy_web
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git diff --quiet && git diff --cached --quiet; then
            echo "No web changes to publish"
            exit 0
          fi

          git add -A
          git commit -m "обновлена веб версия"
          git push
