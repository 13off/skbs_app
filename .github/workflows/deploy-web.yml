name: Build and publish web

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: appstroy-web
  cancel-in-progress: true

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Check deploy token
        shell: bash
        run: |
          if [ -z "${{ secrets.WEB_DEPLOY_TOKEN }}" ]; then
            echo "::error::Не найден secret WEB_DEPLOY_TOKEN"
            exit 1
          fi

      - name: Checkout source app
        uses: actions/checkout@v4
        with:
          path: skbs_app
          persist-credentials: true

      - name: Match employee card animation to timesheet
        shell: bash
        run: |
          if [ ! -f skbs_app/tool/match_employee_close_to_timesheet.marker ]; then
            echo "No pending employee animation fix"
            exit 0
          fi

          python - <<'PY'
          from pathlib import Path

          path = Path('skbs_app/lib/screens/employees_screen.dart')
          text = path.read_text(encoding='utf-8')

          import_line = "import 'package:flutter/cupertino.dart' show CupertinoPageRoute;\n"
          material_line = "import 'package:flutter/material.dart';\n"
          if import_line not in text:
              text = text.replace(material_line, material_line + import_line, 1)

          old = """  void openEmployeeDetails(BuildContext context, Employee employee) {
    if (openedEmployee != null) return;

    setState(() {
      openedEmployee = employee;
    });
  }
"""
          new = """  Future<void> openEmployeeDetails(
    BuildContext context,
    Employee employee,
  ) async {
    await Navigator.push<void>(
      context,
      CupertinoPageRoute<void>(
        builder: (_) => EmployeeDetailsScreen(
          profile: widget.profile,
          employee: employee,
        ),
      ),
    );

    if (!mounted) return;
    loadEmployees();
  }
"""

          if old not in text:
              raise RuntimeError('Не найдено открытие карточки сотрудника')

          path.write_text(text.replace(old, new, 1), encoding='utf-8')
          Path('skbs_app/tool/match_employee_close_to_timesheet.marker').unlink()
          PY

          echo "SOURCE_PATCH_APPLIED=1" >> "$GITHUB_ENV"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install icon renderer
        run: sudo apt-get update && sudo apt-get install -y librsvg2-bin

      - name: Generate web icons from matte logo
        shell: bash
        run: |
          mkdir -p skbs_app/web/icons
          rsvg-convert -w 192 -h 192 skbs_app/web/icons/app_icon_matte_v2.svg -o skbs_app/web/icons/AppStroy-192-v2.png
          rsvg-convert -w 512 -h 512 skbs_app/web/icons/app_icon_matte_v2.svg -o skbs_app/web/icons/AppStroy-512-v2.png
          rsvg-convert -w 64 -h 64 skbs_app/web/icons/app_icon_matte_v2.svg -o skbs_app/web/favicon-v2.png

      - name: Flutter pub get
        working-directory: skbs_app
        run: flutter pub get

      - name: Format patched source
        if: env.SOURCE_PATCH_APPLIED == '1'
        working-directory: skbs_app
        run: dart format lib/screens/employees_screen.dart

      - name: Analyze source
        working-directory: skbs_app
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Commit checked source changes
        if: env.SOURCE_PATCH_APPLIED == '1'
        working-directory: skbs_app
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "анимация карточки сотрудника сделана как у табеля"
          git push

      - name: Build Flutter Web
        working-directory: skbs_app
        run: flutter build web --release --base-href /appstroy-web/

      - name: Keep brick loader during warmup and bust cache
        shell: bash
        run: |
          BUILD_ID="$(git -C skbs_app rev-parse --short=12 HEAD)"
          sed -i "s/manifest\.json/manifest.json?v=${BUILD_ID}/g" skbs_app/build/web/index.html
          sed -i "s/flutter_bootstrap\.js/flutter_bootstrap.js?v=${BUILD_ID}/g" skbs_app/build/web/index.html
          sed -i "s/main\.dart\.js/main.dart.js?v=${BUILD_ID}/g" skbs_app/build/web/flutter_bootstrap.js
          sed -i "/window.addEventListener('flutter-first-frame', hideLoader);/d" skbs_app/build/web/index.html
          sed -i "s/window.setTimeout(hideLoader, 9000);/window.setTimeout(hideLoader, 7000);/" skbs_app/build/web/index.html
          cp skbs_app/build/web/index.html skbs_app/build/web/404.html

      - name: Checkout web repository
        uses: actions/checkout@v4
        with:
          repository: 13off/appstroy-web
          token: ${{ secrets.WEB_DEPLOY_TOKEN }}
          path: appstroy-web

      - name: Replace web files
        shell: bash
        run: |
          find appstroy-web -mindepth 1 -maxdepth 1 ! -name '.git' -exec rm -rf {} +
          cp -R skbs_app/build/web/. appstroy-web/
          touch appstroy-web/.nojekyll

      - name: Commit and push web build
        working-directory: appstroy-web
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No web changes to publish"
            exit 0
          fi
          git commit -m "обновлена веб версия"
          git push
