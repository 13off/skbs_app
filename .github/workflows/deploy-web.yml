name: Build and publish web

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: appstroy-web
  cancel-in-progress: true

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Check deploy token
        shell: bash
        run: |
          if [ -z "${{ secrets.WEB_DEPLOY_TOKEN }}" ]; then
            echo "::error::Не найден secret WEB_DEPLOY_TOKEN. Добавь его в skbs_app -> Settings -> Secrets and variables -> Actions."
            exit 1
          fi

      - name: Checkout source app
        uses: actions/checkout@v4
        with:
          path: skbs_app
          fetch-depth: 0

      - name: Hide employees without shifts in monthly timesheet
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          period_path = Path('skbs_app/lib/screens/period_timesheet_screen.dart')
          text = period_path.read_text(encoding='utf-8')

          old_filter = '''  List<MonthlyTimesheetRow> buildFilteredRows() {
    final query = searchController.text.trim().toLowerCase();

    if (query.isEmpty) return rows;

    return rows.where((row) {
      final employee = row.employee;

      return employee.name.toLowerCase().contains(query) ||
          employee.position.toLowerCase().contains(query) ||
          employee.objectName.toLowerCase().contains(query);
    }).toList(growable: false);
  }
'''
          new_filter = '''  List<MonthlyTimesheetRow> buildFilteredRows() {
    final query = searchController.text.trim().toLowerCase();
    final workedRows = rows
        .where((row) => row.totalShifts > 0)
        .toList(growable: false);

    if (query.isEmpty) return workedRows;

    return workedRows.where((row) {
      final employee = row.employee;

      return employee.name.toLowerCase().contains(query) ||
          employee.position.toLowerCase().contains(query) ||
          employee.objectName.toLowerCase().contains(query);
    }).toList(growable: false);
  }
'''
          if old_filter in text:
              text = text.replace(old_filter, new_filter, 1)

          old_return = '''    return collapseDuplicateRows(sourceRows);
'''
          new_return = '''    return collapseDuplicateRows(sourceRows)
        .where((row) => row.totalShifts > 0)
        .toList(growable: false);
'''
          if old_return in text:
              text = text.replace(old_return, new_return, 1)

          period_path.write_text(text, encoding='utf-8')

          exporter_path = Path('skbs_app/lib/data/timesheet_excel_exporter.dart')
          exporter = exporter_path.read_text(encoding='utf-8')
          old_rows = '''          rows: rowsByMonth[index],
'''
          new_rows = '''          rows: rowsByMonth[index]
              .where((row) => row.totalShifts > 0)
              .toList(growable: false),
'''
          if old_rows in exporter:
              exporter = exporter.replace(old_rows, new_rows, 1)
          exporter_path.write_text(exporter, encoding='utf-8')
          PY

          cd skbs_app
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add lib/screens/period_timesheet_screen.dart lib/data/timesheet_excel_exporter.dart
          if ! git diff --cached --quiet; then
            git commit -m "скрыты сотрудники без смен в месячном табеле"
            git push origin main
          fi

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter pub get
        working-directory: skbs_app
        run: flutter pub get

      - name: Build Flutter Web
        working-directory: skbs_app
        run: flutter build web --release --base-href /appstroy-web/

      - name: Add web cache busting and GitHub Pages fallback
        shell: bash
        run: |
          BUILD_ID="${GITHUB_SHA::12}"
          sed -i "s/manifest\.json/manifest.json?v=${BUILD_ID}/g" skbs_app/build/web/index.html
          sed -i "s/flutter_bootstrap\.js/flutter_bootstrap.js?v=${BUILD_ID}/g" skbs_app/build/web/index.html
          sed -i "s/main\.dart\.js/main.dart.js?v=${BUILD_ID}/g" skbs_app/build/web/flutter_bootstrap.js
          cp skbs_app/build/web/index.html skbs_app/build/web/404.html

      - name: Checkout web repository
        uses: actions/checkout@v4
        with:
          repository: 13off/appstroy-web
          token: ${{ secrets.WEB_DEPLOY_TOKEN }}
          path: appstroy-web
          persist-credentials: true

      - name: Replace web files
        shell: bash
        run: |
          find appstroy-web -mindepth 1 -maxdepth 1 ! -name '.git' -exec rm -rf {} +
          cp -R skbs_app/build/web/. appstroy-web/
          touch appstroy-web/.nojekyll

      - name: Commit and push web build
        working-directory: appstroy-web
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -A

          if git diff --cached --quiet; then
            echo "No web changes to publish"
            exit 0
          fi

          git commit -m "обновлена веб версия"
          git push
