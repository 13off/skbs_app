name: Verify PWA Flutter 3.44 fix

on:
  push:
    branches:
      - fix/pwa-flutter-344

permissions:
  contents: write

concurrency:
  group: pwa-flutter-344-fix
  cancel-in-progress: true

jobs:
  apply-and-check:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          show-progress: false

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version-file: .fvmrc
          cache: true

      - name: Apply guarded compatibility fix
        run: python3 tool/apply_pwa_flutter_344_fix.py

      - name: Format changed Dart files
        run: |
          dart format \
            lib/screens/pwa_install_screen.dart \
            lib/services/pwa_install_service_web.dart \
            test/pwa_flutter_344_compat_contract_test.dart

      - name: Install locked dependencies
        run: flutter pub get --enforce-lockfile >/dev/null

      - name: Analyze source
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Run regression tests
        run: flutter test --reporter compact

      - name: Build web release
        run: flutter build web --release --base-href /appstroy-web/

      - name: Remove temporary automation
        run: |
          rm -f tool/apply_pwa_flutter_344_fix.py
          rm -f .github/workflows/pwa-flutter-344-fix.yml

      - name: Commit verified compatibility fix
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Исправить PWA-мост для Flutter 3.44"
          git push origin HEAD:fix/pwa-flutter-344
