name: One-time natural motion patch

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/one-time-natural-motion.yml

permissions:
  contents: write

concurrency:
  group: one-time-natural-motion
  cancel-in-progress: false

jobs:
  apply-and-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Assemble and apply patch
        shell: bash
        run: |
          cat tool/one_time_natural_motion.part1 \
              tool/one_time_natural_motion.part2 \
              tool/one_time_natural_motion.part3 \
              tool/one_time_natural_motion.part4 \
              tool/one_time_natural_motion.part5 \
              > tool/one_time_natural_motion.py
          python tool/one_time_natural_motion.py
          rm -f tool/one_time_natural_motion.part1 \
                tool/one_time_natural_motion.part2 \
                tool/one_time_natural_motion.part3 \
                tool/one_time_natural_motion.part4 \
                tool/one_time_natural_motion.part5

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Format
        run: dart format lib/app/app_theme.dart lib/widgets/premium_ui_v2.dart lib/features/shell/presentation/premium_main_screen.dart lib/screens/timesheet_screen.dart

      - name: Dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Build web
        run: flutter build web --release --base-href /appstroy-web/

      - name: Commit checked changes
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "исправлены нажатия, свайпы и плавность интерфейса"
          git push
