name: Fix task goal mode

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  fix:
    if: github.head_ref == 'feature/simple-task-goal-flow' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Preserve goal mode separately from selected goal
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          def replace_once(path: str, old: str, new: str, label: str) -> None:
              file = Path(path)
              text = file.read_text(encoding='utf-8')
              if old not in text:
                  raise SystemExit(f'Pattern not found: {label}')
              file.write_text(text.replace(old, new, 1), encoding='utf-8')

          picker = 'lib/features/milestones/presentation/task_milestone_picker.dart'
          replace_once(
              picker,
              "  final String? checklistTitle;\n\n  const TaskMilestoneSelection({",
              "  final String? checklistTitle;\n  final bool goalMode;\n\n  const TaskMilestoneSelection({",
              'picker goal mode field',
          )
          replace_once(
              picker,
              "    required this.checklistItemId,\n    this.checklistTitle,",
              "    required this.checklistItemId,\n    required this.goalMode,\n    this.checklistTitle,",
              'picker goal mode constructor',
          )
          replace_once(
              picker,
              "        checklistItemId: linkedToGoal ? selectedChecklistItemId : null,\n        checklistTitle: selectedItem?.title,",
              "        checklistItemId: linkedToGoal ? selectedChecklistItemId : null,\n        goalMode: linkedToGoal,\n        checklistTitle: selectedItem?.title,",
              'picker goal mode notification',
          )

          add = 'lib/screens/add_task_screen.dart'
          replace_once(
              add,
              "  String? selectedChecklistTitle;\n\n  bool isLoadingEmployees = false;",
              "  String? selectedChecklistTitle;\n  bool isGoalTask = false;\n\n  bool isLoadingEmployees = false;",
              'add goal mode state',
          )
          replace_once(
              add,
              "    selectedChecklistItemId = widget.initialChecklistItemId;\n    loadEmployees();",
              "    selectedChecklistItemId = widget.initialChecklistItemId;\n    isGoalTask = selectedMilestoneId?.trim().isNotEmpty == true;\n    loadEmployees();",
              'add goal mode init',
          )
          replace_once(
              add,
              "    final linkedToGoal = selectedMilestoneId?.trim().isNotEmpty == true;",
              "    final linkedToGoal = isGoalTask;",
              'add goal mode save',
          )
          replace_once(
              add,
              "                selectedMilestoneId = selection.milestoneId;\n                selectedChecklistItemId = selection.checklistItemId;",
              "                isGoalTask = selection.goalMode;\n                selectedMilestoneId = selection.milestoneId;\n                selectedChecklistItemId = selection.checklistItemId;",
              'add goal mode callback',
          )
          replace_once(
              add,
              "          if (selectedMilestoneId == null) ...[",
              "          if (!isGoalTask) ...[",
              'add work visibility',
          )

          details = 'lib/screens/task_details_legacy_screen.dart'
          replace_once(
              details,
              "  String? selectedChecklistTitle;\n\n  List<Employee> employees = [];",
              "  String? selectedChecklistTitle;\n  bool isGoalTask = false;\n\n  List<Employee> employees = [];",
              'details goal mode state',
          )
          replace_once(
              details,
              "        selectedChecklistItemId = loadedMilestoneLink?.checklistItemId;\n        signedUrlFutures.clear();",
              "        selectedChecklistItemId = loadedMilestoneLink?.checklistItemId;\n        isGoalTask = loadedMilestoneLink != null;\n        signedUrlFutures.clear();",
              'details goal mode load',
          )
          replace_once(
              details,
              "    final linkedToGoal = selectedMilestoneId?.trim().isNotEmpty == true;",
              "    final linkedToGoal = isGoalTask;",
              'details goal mode save',
          )
          replace_once(
              details,
              "                  selectedMilestoneId = selection.milestoneId;\n                  selectedChecklistItemId = selection.checklistItemId;",
              "                  isGoalTask = selection.goalMode;\n                  selectedMilestoneId = selection.milestoneId;\n                  selectedChecklistItemId = selection.checklistItemId;",
              'details goal mode callback',
          )
          replace_once(
              details,
              "          if (selectedMilestoneId == null) ...[",
              "          if (!isGoalTask) ...[",
              'details work visibility',
          )

          test = 'test/task_goal_linking_contract_test.dart'
          replace_once(
              test,
              "    expect(picker, contains(\"child: Text('По цели')\"));",
              "    expect(picker, contains(\"child: Text('По цели')\"));\n    expect(picker, contains('final bool goalMode;'));",
              'contract goal mode field',
          )
          replace_once(
              test,
              "    expect(create, contains('selection.checklistTitle'));\n    expect(create, contains('savedWork'));",
              "    expect(create, contains('selection.checklistTitle'));\n    expect(create, contains('selection.goalMode'));\n    expect(create, contains('final linkedToGoal = isGoalTask;'));\n    expect(create, contains('savedWork'));",
              'contract create mode',
          )
          replace_once(
              test,
              "    expect(details, contains('selection.checklistTitle'));\n    expect(details, contains('if (selectedMilestoneId == null)'));",
              "    expect(details, contains('selection.checklistTitle'));\n    expect(details, contains('selection.goalMode'));\n    expect(details, contains('if (!isGoalTask)'));",
              'contract details mode',
          )
          PY

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Format and test
        shell: bash
        run: |
          dart format \
            lib/features/milestones/presentation/task_milestone_picker.dart \
            lib/screens/add_task_screen.dart \
            lib/screens/task_details_legacy_screen.dart \
            test/task_goal_linking_contract_test.dart
          flutter pub get
          flutter test test/task_goal_linking_contract_test.dart test/cumulative_task_progress_contract_test.dart
          flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Commit fix
        shell: bash
        run: |
          rm .github/workflows/fix-task-goal-mode.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Зафиксировать режим задачи по цели"
          git push origin HEAD:feature/simple-task-goal-flow
