name: Build desktop PWA shell

on:
  push:
    branches:
      - feature/desktop-pwa-shell

permissions:
  contents: write

concurrency:
  group: desktop-pwa-shell
  cancel-in-progress: true

jobs:
  apply-and-check:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          show-progress: false

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version-file: .fvmrc
          cache: true

      - name: Apply guarded desktop patch
        run: python3 tool/apply_desktop_pwa_shell.py

      - name: Format changed Dart files
        run: |
          dart format \
            lib/widgets/professional_adaptive_navigation.dart \
            lib/widgets/premium_ui.dart \
            lib/features/shell/presentation/premium_main_screen.dart \
            lib/features/legal/presentation/legal_main_screen.dart \
            lib/features/accounting/presentation/accounting_main_screen.dart \
            test/desktop_pwa_shell_contract_test.dart

      - name: Install locked dependencies
        run: flutter pub get --enforce-lockfile >/dev/null

      - name: Analyze source
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Run regression tests
        run: flutter test --reporter compact

      - name: Build web release
        run: flutter build web --release --base-href /appstroy-web/

      - name: Remove temporary automation
        run: |
          rm -f tool/apply_desktop_pwa_shell.py
          rm -f .github/workflows/desktop-pwa-shell.yml

      - name: Commit verified desktop shell
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Добавить адаптивную ПК-оболочку PWA"
          git push origin HEAD:feature/desktop-pwa-shell
