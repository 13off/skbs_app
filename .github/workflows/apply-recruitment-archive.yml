name: Apply recruitment archive

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  archive-and-check:
    if: github.head_ref == 'feature/recruitment-archive' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Apply recruitment archive patch
        run: python3 tool/apply_recruitment_archive.py

      - uses: subosito/flutter-action@v2
        with:
          flutter-version-file: .fvmrc
          cache: true

      - name: Format and verify
        shell: bash
        run: |
          dart format \
            lib/features/recruitment \
            test/recruitment_archive_contract_test.dart
          flutter pub get --enforce-lockfile
          flutter test
          flutter analyze --no-fatal-infos --no-fatal-warnings
          flutter build web --release --base-href /appstroy-web/

      - name: Commit checked changes
        shell: bash
        run: |
          rm tool/apply_recruitment_archive.py
          rm .github/workflows/apply-recruitment-archive.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Добавить архив заявок кандидатов"
          git push origin HEAD:feature/recruitment-archive
