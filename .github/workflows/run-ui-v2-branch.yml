name: Run UI v2 branch validation

on:
  push:
    branches:
      - main
    paths:
      - tool/run_ui_v2_branch.marker
      - .github/workflows/run-ui-v2-branch.yml
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: run-ui-v2-branch-validation
  cancel-in-progress: false

jobs:
  apply-test-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout UI branch
        uses: actions/checkout@v4
        with:
          ref: ui/unified-motion-nav-v2
          persist-credentials: true

      - name: Apply UI changes
        run: python3 tool/apply_unified_ui_v2.py

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version-file: .fvmrc
          cache: true

      - name: Install locked dependencies
        run: flutter pub get --enforce-lockfile

      - name: Format changed files
        run: |
          dart format \
            lib/widgets/premium_ui_v2.dart \
            lib/widgets/premium_pressable_v3.dart \
            lib/widgets/professional_bottom_navigation.dart \
            lib/widgets/premium_ui.dart \
            lib/features/shell/presentation/premium_main_screen.dart \
            test/ui_motion_contract_test.dart \
            test/professional_bottom_navigation_test.dart

      - name: Run all tests
        run: flutter test

      - name: Analyze
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Build web release
        run: flutter build web --release --base-href /appstroy-web/

      - name: Commit verified branch
        shell: bash
        run: |
          rm -f tool/apply_unified_ui_v2.py
          rm -f tool/apply_unified_ui_v2.marker
          rm -f .github/workflows/apply-unified-ui-v2.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "унифицирован интерфейс без изменения рабочих экранов"
          git push origin ui/unified-motion-nav-v2
