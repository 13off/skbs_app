name: Apply unified UI v2

on:
  push:
    branches:
      - ui/unified-motion-nav-v2
    paths:
      - tool/apply_unified_ui_v2.marker
      - .github/workflows/apply-unified-ui-v2.yml
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: apply-unified-ui-v2
  cancel-in-progress: true

jobs:
  apply-test-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: ui/unified-motion-nav-v2
          persist-credentials: true

      - name: Apply compact layout fix
        run: python3 tool/fix_ui_v2_layout.py

      - name: Apply UI changes
        run: python3 tool/apply_unified_ui_v2.py

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version-file: .fvmrc
          cache: true

      - name: Install locked dependencies
        run: flutter pub get --enforce-lockfile

      - name: Format changed files
        run: |
          dart format \
            lib/widgets/premium_ui_v2.dart \
            lib/widgets/premium_pressable_v3.dart \
            lib/widgets/professional_bottom_navigation.dart \
            lib/widgets/premium_ui.dart \
            lib/features/shell/presentation/premium_main_screen.dart \
            test/ui_motion_contract_test.dart \
            test/professional_bottom_navigation_test.dart

      - name: Commit generated UI draft before validation
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            lib/widgets/premium_ui_v2.dart \
            lib/widgets/premium_pressable_v3.dart \
            lib/widgets/professional_bottom_navigation.dart \
            lib/widgets/premium_ui.dart \
            lib/features/shell/presentation/premium_main_screen.dart \
            test/ui_motion_contract_test.dart \
            test/professional_bottom_navigation_test.dart
          git commit -m "применён проверяемый черновик единого интерфейса" || true
          git push origin HEAD:ui/unified-motion-nav-v2

      - name: Run all tests with diagnostics
        id: tests
        shell: bash
        run: |
          set +e
          set -o pipefail
          flutter test -r expanded 2>&1 | tee tool/ui_v2_test_failure.log
          status=${PIPESTATUS[0]}
          echo "exit_code=${status}" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Save failed test diagnostics
        if: steps.tests.outputs.exit_code != '0'
        shell: bash
        run: |
          git pull --rebase origin ui/unified-motion-nav-v2
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f tool/ui_v2_test_failure.log
          git commit -m "сохранена диагностика UI-тестов" || true
          git push origin HEAD:ui/unified-motion-nav-v2
          exit 1

      - name: Analyze
        if: steps.tests.outputs.exit_code == '0'
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Build web release
        if: steps.tests.outputs.exit_code == '0'
        run: flutter build web --release --base-href /appstroy-web/

      - name: Commit verified UI branch
        if: steps.tests.outputs.exit_code == '0'
        shell: bash
        run: |
          git pull --rebase origin ui/unified-motion-nav-v2
          rm -f tool/apply_unified_ui_v2.py
          rm -f tool/apply_unified_ui_v2.marker
          rm -f tool/fix_ui_v2_layout.py
          rm -f tool/ui_v2_test_failure.log
          rm -f tool/ui_v2_validation_started.txt
          rm -f .github/workflows/apply-unified-ui-v2.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "унифицирован интерфейс без изменения рабочих экранов"
          git push origin HEAD:ui/unified-motion-nav-v2
