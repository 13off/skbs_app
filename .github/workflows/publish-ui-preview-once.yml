name: Publish UI preview once

# Trigger registered preview workflow.
on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/publish-ui-preview-once.yml
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: appstroy-ui-preview-once
  cancel-in-progress: true

jobs:
  publish-preview:
    runs-on: ubuntu-latest
    steps:
      - name: Check deploy token
        shell: bash
        run: |
          test -n "${{ secrets.WEB_DEPLOY_TOKEN }}" || exit 1

      - name: Checkout UI branch
        uses: actions/checkout@v4
        with:
          ref: ui/unified-motion-nav-v2
          path: skbs_app

      - name: Checkout web repository
        uses: actions/checkout@v4
        with:
          repository: 13off/appstroy-web
          token: ${{ secrets.WEB_DEPLOY_TOKEN }}
          path: appstroy-web

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version-file: skbs_app/.fvmrc
          cache: true

      - name: Install dependencies
        working-directory: skbs_app
        run: flutter pub get --enforce-lockfile

      - name: Run tests
        working-directory: skbs_app
        run: flutter test

      - name: Build preview
        working-directory: skbs_app
        run: |
          flutter build web --release \
            --base-href /appstroy-web/preview-ui-v2/ \
            --dart-define=SUPABASE_URL=https://api.appstroy-web.ru

      - name: Add preview cache version
        shell: bash
        run: |
          BUILD_ID="$(git -C skbs_app rev-parse --short=12 HEAD)"
          sed -i "s/manifest\.json/manifest.json?v=${BUILD_ID}/g" skbs_app/build/web/index.html
          sed -i "s/flutter_bootstrap\.js/flutter_bootstrap.js?v=${BUILD_ID}/g" skbs_app/build/web/index.html
          sed -i "s/main\.dart\.js/main.dart.js?v=${BUILD_ID}/g" skbs_app/build/web/flutter_bootstrap.js
          git -C skbs_app rev-parse HEAD > skbs_app/build/web/source-commit.txt

      - name: Publish isolated preview
        working-directory: appstroy-web
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          for attempt in 1 2 3 4 5; do
            git fetch origin main
            git reset --hard origin/main
            rm -rf preview-ui-v2
            mkdir -p preview-ui-v2
            cp -R ../skbs_app/build/web/. preview-ui-v2/
            git add preview-ui-v2
            git commit -m "повторно опубликована UI-preview" || exit 0
            if git push origin HEAD:main; then
              exit 0
            fi
            sleep $((attempt * 3))
          done
          exit 1
