name: Apply role notifications and task photos

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  patch-and-check:
    if: github.head_ref == 'feature/role-notifications-task-photos' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Apply implementation
        run: python3 tool/apply_role_notifications_task_photos.py

      - uses: subosito/flutter-action@v2
        with:
          flutter-version-file: .fvmrc
          cache: true

      - name: Capture verification result
        shell: bash
        run: |
          set +e
          {
            dart format \
              lib/data/task_repository.dart \
              lib/screens/add_task_screen.dart \
              lib/screens/task_details_legacy_screen.dart \
              lib/data/notification_repository.dart \
              lib/screens/push_notification_settings_screen.dart \
              test/role_notifications_task_photos_contract_test.dart
            flutter pub get --enforce-lockfile
            flutter analyze --no-fatal-infos --no-fatal-warnings
            flutter test --reporter compact
            flutter build web --release --base-href /appstroy-web/
          } > role-notifications-check.log 2>&1
          status=$?
          echo "$status" > role-notifications-check.status
          exit 0

      - name: Commit transformed files and result
        shell: bash
        run: |
          rm tool/apply_role_notifications_task_photos.py
          rm .github/workflows/apply-role-notifications-task-photos.yml
          rm -f docs/.keep-role-notifications-trigger
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ "$(cat role-notifications-check.status)" = "0" ]; then
            rm role-notifications-check.log role-notifications-check.status
            message="Добавить ролевые уведомления и фото До/После"
          else
            message="Сохранить ошибку ролевых уведомлений и фото задач"
          fi
          git add -A
          git commit -m "$message"
          git push origin HEAD:feature/role-notifications-task-photos
