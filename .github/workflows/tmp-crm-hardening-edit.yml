name: Temporary CRM hardening edit

on:
  push:
    branches:
      - agent/harden-recruitment-crm

permissions:
  contents: write

jobs:
  edit:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/harden-recruitment-crm
          fetch-depth: 0
      - name: Apply verified source edits
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re

          def replace_once(path, old, new):
              p = Path(path)
              text = p.read_text()
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f'{path}: expected one literal match, found {count}')
              p.write_text(text.replace(old, new, 1))

          def regex_once(path, pattern, replacement):
              p = Path(path)
              text = p.read_text()
              next_text, count = re.subn(pattern, replacement, text, count=1, flags=re.S)
              if count != 1:
                  raise SystemExit(f'{path}: expected one regex match, found {count}')
              p.write_text(next_text)

          repo = 'lib/features/recruitment/data/recruitment_repository.dart'
          save_function = '''  static Future<RecruitmentApplication> saveApplication({
            String? id,
            required String companyId,
            required String fullName,
            required String phone,
            required String citizenship,
            required String vacancy,
            String vacancyId = '',
            required String objectName,
            String objectId = '',
            required String experience,
            DateTime? departureDate,
            required String status,
            String stageId = '',
            required String comment,
            Map<String, dynamic> customValues = const <String, dynamic>{},
            String source = 'manual',
            String sourceUserId = '',
            String sourceChatId = '',
          }) async {
            final cleanId = id?.trim() ?? '';
            final cleanCompanyId = companyId.trim();
            final cleanName = fullName.trim();
            final cleanPhone = phone.trim();
            final cleanVacancy = vacancy.trim();
            final cleanStageId = stageId.trim();
            if (cleanName.length < 2 || cleanPhone.isEmpty || cleanVacancy.isEmpty) {
              throw Exception('Укажите ФИО, телефон и вакансию');
            }
            final resolvedObjectId = await _resolveObjectId(
              companyId: cleanCompanyId,
              objectId: objectId,
              objectName: objectName,
            );

            if (cleanStageId.isNotEmpty) {
              final dynamic saved = await _client.rpc(
                'save_recruitment_application_from_crm',
                params: <String, dynamic>{
                  'p_application_id': cleanId.isEmpty ? null : cleanId,
                  'p_full_name': cleanName,
                  'p_phone': cleanPhone,
                  'p_citizenship': citizenship.trim(),
                  'p_vacancy_id': vacancyId.trim().isEmpty ? null : vacancyId.trim(),
                  'p_position_title': cleanVacancy,
                  'p_object_id': resolvedObjectId,
                  'p_experience_text': experience.trim(),
                  'p_ready_date': departureDate == null ? null : _dateOnly(departureDate),
                  'p_stage_id': cleanStageId,
                  'p_hr_comment': comment.trim(),
                  'p_custom_values': Map<String, dynamic>.from(customValues),
                  'p_source': source.trim().isEmpty ? 'manual' : source.trim(),
                  'p_external_user_id': sourceUserId.trim(),
                  'p_external_chat_id': sourceChatId.trim(),
                },
              );
              final savedId = _map(saved)['id']?.toString() ?? cleanId;
              if (savedId.isEmpty) throw Exception('CRM не вернула кандидата');
              final dynamic row = await _client
                  .from('recruitment_applications')
                  .select('*, objects(name), recruitment_vacancies(title)')
                  .eq('company_id', cleanCompanyId)
                  .eq('id', savedId)
                  .single();
              final result = RecruitmentApplication.fromMap(_map(row));
              _notify(result.id);
              return result;
            }

            final now = DateTime.now().toUtc().toIso8601String();
            final payload = <String, dynamic>{
              'company_id': cleanCompanyId,
              'source': source.trim().isEmpty ? 'manual' : source.trim(),
              'external_user_id': sourceUserId.trim(),
              'external_chat_id': sourceChatId.trim(),
              'full_name': cleanName,
              'phone': cleanPhone,
              'citizenship': citizenship.trim(),
              'object_id': resolvedObjectId,
              'vacancy_id': vacancyId.trim().isEmpty ? null : vacancyId.trim(),
              'position_title': cleanVacancy,
              'experience_text': experience.trim(),
              'ready_date': departureDate == null ? null : _dateOnly(departureDate),
              'status': recruitmentStatuses.contains(status) ? status : 'new',
              'hr_comment': comment.trim(),
              'custom_values': Map<String, dynamic>.from(customValues),
              'updated_at': now,
            };

            final dynamic row;
            if (cleanId.isEmpty) {
              payload['submitted_at'] = now;
              row = await _client
                  .from('recruitment_applications')
                  .insert(payload)
                  .select('*, objects(name), recruitment_vacancies(title)')
                  .single();
            } else {
              row = await _client
                  .from('recruitment_applications')
                  .update(payload)
                  .eq('company_id', cleanCompanyId)
                  .eq('id', cleanId)
                  .select('*, objects(name), recruitment_vacancies(title)')
                  .single();
            }

            final result = RecruitmentApplication.fromMap(_map(row));
            _notify(result.id);
            return result;
          }

          static Future<RecruitmentPipelineStage> savePipelineStage({'''
          regex_once(
              repo,
              r"  static Future<RecruitmentApplication> saveApplication\(\{.*?\n  \}\n\n  static Future<RecruitmentPipelineStage> savePipelineStage\(\{",
              save_function,
          )

          regex_once(
              repo,
              r"  static Future<void> reorderPipelineStages\(\{.*?\n  \}\n\n  static Future<void> setPipelineStageActive",
              '''  static Future<void> reorderPipelineStages({
            required String companyId,
            required List<String> orderedIds,
          }) async {
            if (companyId.trim().isEmpty || orderedIds.isEmpty) return;
            await _client.rpc(
              'reorder_recruitment_pipeline_stages',
              params: <String, dynamic>{'p_stage_ids': orderedIds},
            );
            _notifyConfiguration('recruitment_pipeline_stages', 'order');
          }

          static Future<void> setPipelineStageActive''',
          )
          regex_once(
              repo,
              r"  static Future<void> reorderCustomFields\(\{.*?\n  \}\n\n  static Future<void> setCustomFieldActive",
              '''  static Future<void> reorderCustomFields({
            required String companyId,
            required List<String> orderedIds,
          }) async {
            if (companyId.trim().isEmpty || orderedIds.isEmpty) return;
            await _client.rpc(
              'reorder_recruitment_custom_fields',
              params: <String, dynamic>{'p_field_ids': orderedIds},
            );
            _notifyConfiguration('recruitment_custom_fields', 'order');
          }

          static Future<void> setCustomFieldActive''',
          )
          replace_once(
              repo,
              "    required String title,\n    required String fieldType,",
              "    required String title,\n    String description = '',\n    required String fieldType,",
          )
          replace_once(
              repo,
              "      'title': title.trim(),\n      'field_type': recruitmentCustomFieldTypes.contains(fieldType)",
              "      'title': title.trim(),\n      'description': description.trim(),\n      'field_type': recruitmentCustomFieldTypes.contains(fieldType)",
          )

          model = 'lib/features/recruitment/models/recruitment_models.dart'
          replace_once(model, "  final String title;\n  final String fieldType;", "  final String title;\n  final String description;\n  final String fieldType;")
          replace_once(model, "    required this.title,\n    required this.fieldType,", "    required this.title,\n    this.description = '',\n    required this.fieldType,")
          replace_once(model, "      title: map['title']?.toString() ?? '',\n      fieldType:", "      title: map['title']?.toString() ?? '',\n      description: map['description']?.toString() ?? '',\n      fieldType:")

          settings = 'lib/features/recruitment/presentation/recruitment_crm_settings_screen.dart'
          replace_once(settings, "        title: result.title,\n        fieldType: result.fieldType,", "        title: result.title,\n        description: result.description,\n        fieldType: result.fieldType,")
          replace_once(settings, "  late final TextEditingController titleController;\n  late final TextEditingController optionsController;", "  late final TextEditingController titleController;\n  late final TextEditingController descriptionController;\n  late final TextEditingController optionsController;")
          replace_once(settings, "    titleController = TextEditingController(text: widget.field?.title ?? '');\n    optionsController =", "    titleController = TextEditingController(text: widget.field?.title ?? '');\n    descriptionController =\n        TextEditingController(text: widget.field?.description ?? '');\n    optionsController =")
          replace_once(settings, "    titleController.dispose();\n    optionsController.dispose();", "    titleController.dispose();\n    descriptionController.dispose();\n    optionsController.dispose();")
          replace_once(settings, "        title: title,\n        fieldType: fieldType,", "        title: title,\n        description: descriptionController.text.trim(),\n        fieldType: fieldType,")
          replace_once(
              settings,
              "          const SizedBox(height: AppUi.gap12),\n          DropdownButtonFormField<String>(\n            initialValue: fieldType,",
              "          const SizedBox(height: AppUi.gap12),\n          TextField(\n            controller: descriptionController,\n            minLines: 2,\n            maxLines: 4,\n            decoration: const InputDecoration(\n              labelText: 'Описание / подсказка',\n              hintText: 'Что именно HR должен указать в этом поле',\n              prefixIcon: Icon(Icons.info_outline_rounded),\n            ),\n          ),\n          const SizedBox(height: AppUi.gap12),\n          DropdownButtonFormField<String>(\n            initialValue: fieldType,",
          )
          replace_once(
              settings,
              "                  Text(\n                    field.typeTitle,\n                    style: TextStyle(",
              "                  Text(\n                    field.typeTitle,\n                    style: TextStyle(",
          )
          replace_once(
              settings,
              "                  if (field.options.isNotEmpty) ...[",
              "                  if (field.description.isNotEmpty) ...[\n                    const SizedBox(height: AppUi.gap4),\n                    Text(\n                      field.description,\n                      maxLines: 2,\n                      overflow: TextOverflow.ellipsis,\n                      style: TextStyle(\n                        color: AppAdaptivePalette.textMuted,\n                        fontSize: 12,\n                        height: 1.3,\n                      ),\n                    ),\n                  ],\n                  if (field.options.isNotEmpty) ...[",
          )
          replace_once(settings, "class _FieldDraft {\n  final String title;\n  final String fieldType;", "class _FieldDraft {\n  final String title;\n  final String description;\n  final String fieldType;")
          replace_once(settings, "    required this.title,\n    required this.fieldType,", "    required this.title,\n    required this.description,\n    required this.fieldType,")

          applications = 'lib/features/recruitment/presentation/recruitment_applications_screen.dart'
          replace_once(
              applications,
              "          title: Text('${field.title}$requiredSuffix'),\n          value:",
              "          title: Text('${field.title}$requiredSuffix'),\n          subtitle: field.description.isEmpty ? null : Text(field.description),\n          value:",
          )
          replace_once(
              applications,
              "            prefixIcon: const Icon(Icons.format_list_bulleted_rounded),\n          ),",
              "            prefixIcon: const Icon(Icons.format_list_bulleted_rounded),\n            helperText: field.description.isEmpty ? null : field.description,\n          ),",
          )
          replace_once(
              applications,
              "            prefixIcon: const Icon(Icons.checklist_rounded),\n          ),",
              "            prefixIcon: const Icon(Icons.checklist_rounded),\n            helperText: field.description.isEmpty ? null : field.description,\n          ),",
          )
          replace_once(
              applications,
              "          subtitle: Text(dateText(value)),",
              "          subtitle: Text(\n            field.description.isEmpty\n                ? dateText(value)\n                : '${dateText(value)}\\n${field.description}',\n          ),",
          )
          replace_once(
              applications,
              "            helperText: numeric ? 'Только числовое значение' : null,",
              "            helperText: field.description.isNotEmpty\n                ? field.description\n                : (numeric ? 'Только числовое значение' : null),",
          )

          docs = Path('docs/recruitment-crm.md')
          docs.write_text(docs.read_text() + '''\n\n## Надёжность операций\n\n- Порядок колонок и полей сохраняется атомарными RPC: частично переставить элементы при обрыве связи невозможно.\n- Сохранение карточки кандидата и запись перехода между колонками выполняются одной транзакцией.\n- Пользовательское поле может содержать описание-подсказку, которое HR видит при заполнении карточки.\n''')

          Path('test/recruitment_crm_atomic_operations_contract_test.dart').write_text('''import 'dart:io';\n\nimport 'package:flutter_test/flutter_test.dart';\n\nvoid main() {\n  test('CRM reorder and candidate save use atomic RPCs', () {\n    final repository = File(\n      'lib/features/recruitment/data/recruitment_repository.dart',\n    ).readAsStringSync();\n    final migration = File(\n      'supabase/migrations/20260724010000_harden_recruitment_crm_operations.sql',\n    ).readAsStringSync();\n\n    expect(repository, contains("'reorder_recruitment_pipeline_stages'"));\n    expect(repository, contains("'reorder_recruitment_custom_fields'"));\n    expect(repository, contains("'save_recruitment_application_from_crm'"));\n    expect(repository, isNot(contains('Future.wait<void>(<Future<void>>[')));\n    expect(migration, contains('security invoker'));\n    expect(migration, contains('for update'));\n    expect(migration, contains('recruitment_status_history'));\n  });\n\n  test('custom CRM fields support HR descriptions', () {\n    final model = File(\n      'lib/features/recruitment/models/recruitment_models.dart',\n    ).readAsStringSync();\n    final settings = File(\n      'lib/features/recruitment/presentation/recruitment_crm_settings_screen.dart',\n    ).readAsStringSync();\n    final editor = File(\n      'lib/features/recruitment/presentation/recruitment_applications_screen.dart',\n    ).readAsStringSync();\n\n    expect(model, contains('final String description;'));\n    expect(settings, contains('Описание / подсказка'));\n    expect(settings, contains('description: result.description'));\n    expect(editor, contains('field.description'));\n  });\n}\n''')

          Path('.github/workflows/tmp-crm-hardening-edit.yml').unlink()
          PY
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "Усилить конструктор CRM атомарными операциями"
          git push origin HEAD:agent/harden-recruitment-crm
