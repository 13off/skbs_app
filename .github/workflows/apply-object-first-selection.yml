name: Apply object-first employee selection

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]

permissions:
  contents: write

concurrency:
  group: object-first-selection-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  apply:
    if: github.head_ref == 'agent/object-first-employee-selection'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: agent/object-first-employee-selection
          fetch-depth: 0

      - name: Apply object-first employee selection
        run: python3 tools/apply_object_first_selection.py

      - name: Commit generated changes
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add lib test
          if git diff --cached --quiet; then
            echo "No generated changes"
            exit 0
          fi
          git commit -m "Добавить выбор объекта перед сотрудником"
          git push origin HEAD:agent/object-first-employee-selection
