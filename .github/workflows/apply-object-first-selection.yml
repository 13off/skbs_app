          replace(path,
              "                child: Text(employee.name),\n",
              "                child: Text(\n                  isAllObjectsScope(selectedObjectName) &&\n                          employee.objectName.trim().isNotEmpty\n                      ? '${employee.name} — ${employee.objectName.trim()}'\n                      : employee.name,\n                  overflow: TextOverflow.ellipsis,\n                ),\n")

