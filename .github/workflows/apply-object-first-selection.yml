name: Apply object-first employee selection

on:
  pull_request:
    types: [opened]
    branches: [main]

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'agent/object-first-employee-selection'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: agent/object-first-employee-selection
          fetch-depth: 0

      - name: Apply scoped employee selection
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          def read(path):
              return Path(path).read_text(encoding='utf-8')

          def write(path, text):
              Path(path).parent.mkdir(parents=True, exist_ok=True)
              Path(path).write_text(text, encoding='utf-8')

          def replace(path, old, new, count=1):
              text = read(path)
              found = text.count(old)
              if found < count:
                  raise SystemExit(f'{path}: expected at least {count} occurrence(s), found {found}: {old[:100]!r}')
              text = text.replace(old, new, count)
              write(path, text)

          write('lib/widgets/object_employee_scope.dart', """const String allObjectsScopeValue = '__all_objects__';

bool isAllObjectsScope(String? value) => value == allObjectsScopeValue;

String? selectedObjectNameFromScope(String? value) {
  final clean = value?.trim();
  if (clean == null || clean.isEmpty || isAllObjectsScope(clean)) return null;
  return clean;
}

List<T> filterEmployeesByObject<T>({
  required List<T> employees,
  required String? selectedObject,
  required String Function(T employee) objectNameOf,
}) {
  final cleanScope = selectedObject?.trim();
  if (cleanScope == null || cleanScope.isEmpty) return <T>[];
  if (isAllObjectsScope(cleanScope)) return List<T>.from(employees);

  final normalizedScope = cleanScope.toLowerCase();
  return employees.where((employee) {
    return objectNameOf(employee).trim().toLowerCase() == normalizedScope;
  }).toList();
}
""")

          # Выплата: объект/все объекты всегда выбирается раньше сотрудника.
          path = 'lib/screens/add_payment_screen.dart'
          replace(path,
