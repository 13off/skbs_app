name: Validate AI universal search

on:
  push:
    branches:
      - feature/ai-universal-search
    paths:
      - .github/workflows/validate-ai-universal-search.yml

permissions:
  contents: read

jobs:
  test-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/ai-universal-search
      - uses: subosito/flutter-action@v2
        with:
          flutter-version-file: .fvmrc
          cache: true
      - run: flutter pub get --enforce-lockfile
      - run: flutter test
      - run: flutter analyze --no-fatal-infos --no-fatal-warnings
      - run: flutter build web --release --base-href /appstroy-web/ --dart-define=SUPABASE_URL=https://api.appstroy-web.ru
