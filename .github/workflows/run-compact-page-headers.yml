name: Run compact page headers patch

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  patch:
    if: github.head_ref == 'feature/compact-page-headers' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Apply compact page headers
        shell: bash
        run: python3 tool/compact_page_headers_patch.py

      - uses: subosito/flutter-action@v2
        with:
          flutter-version-file: .fvmrc
          cache: true

      - name: Format and verify
        shell: bash
        run: |
          dart format \
            lib/widgets/app_page.dart \
            lib/features/shared/presentation/specialist_desktop_ui.dart \
            lib/screens/home_screen.dart \
            test/compact_page_headers_contract_test.dart
          flutter pub get --enforce-lockfile
          flutter test
          flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Commit result
        shell: bash
        run: |
          rm .github/workflows/apply-compact-page-headers.yml
          rm .github/workflows/run-compact-page-headers.yml
          rm tool/compact_page_headers_patch.py
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Уменьшить заголовки во всех ролях"
          git push origin HEAD:feature/compact-page-headers
