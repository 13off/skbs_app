name: Agent export company chat source

on:
  push:
    branches:
      - agent/company-chat-ai
  workflow_dispatch:

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/company-chat-ai
          show-progress: false
      - name: Pack source
        run: |
          tar --exclude=.git --exclude=build --exclude=.dart_tool -czf /tmp/skbs_app_company_chat_source.tar.gz .
      - uses: actions/upload-artifact@v4
        with:
          name: skbs-app-company-chat-source
          path: /tmp/skbs_app_company_chat_source.tar.gz
          retention-days: 1
