name: Apply key milestones integration

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/apply-key-milestones.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: feature/key-milestones
          fetch-depth: 0

      - name: Patch adaptive home and restore PR check
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('lib/screens/adaptive_home_screen.dart')
          text = path.read_text(encoding='utf-8')

          anchor = "import '../features/ai/presentation/ai_assistant_screen.dart';"
          import_line = "import '../features/milestones/presentation/milestone_home_overlay.dart';"
          if import_line not in text:
              if text.count(anchor) != 1:
                  raise SystemExit('Import anchor mismatch')
              text = text.replace(anchor, anchor + '\n' + import_line)

          old = """        if (!useDesktopDashboard) {
          return HomeScreen(
            profile: profile,
            selectedObjectName: selectedObjectName,
            onObjectChanged: onObjectChanged,
          );
        }

        return _DesktopHomeDashboard(
          profile: profile,
          selectedObjectName: selectedObjectName,
          onObjectChanged: onObjectChanged,
          onOpenEmployees: onOpenEmployees,
          onOpenTimesheet: onOpenTimesheet,
          onOpenTasks: onOpenTasks,
          onOpenTask: onOpenTask,
          onOpenPayments: onOpenPayments,
        );"""
          new = """        if (!useDesktopDashboard) {
          return MilestoneHomeOverlay(
            profile: profile,
            selectedObjectName: selectedObjectName,
            child: HomeScreen(
              profile: profile,
              selectedObjectName: selectedObjectName,
              onObjectChanged: onObjectChanged,
            ),
          );
        }

        return MilestoneHomeOverlay(
          profile: profile,
          selectedObjectName: selectedObjectName,
          child: _DesktopHomeDashboard(
            profile: profile,
            selectedObjectName: selectedObjectName,
            onObjectChanged: onObjectChanged,
            onOpenEmployees: onOpenEmployees,
            onOpenTimesheet: onOpenTimesheet,
            onOpenTasks: onOpenTasks,
            onOpenTask: onOpenTask,
            onOpenPayments: onOpenPayments,
          ),
        );"""

          if 'return MilestoneHomeOverlay(' not in text:
              if text.count(old) != 1:
                  raise SystemExit('Adaptive home pattern mismatch')
              text = text.replace(old, new)

          path.write_text(text, encoding='utf-8')
          PY

          git show origin/main:.github/workflows/pr-check.yml > .github/workflows/pr-check.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add lib/screens/adaptive_home_screen.dart .github/workflows/pr-check.yml
          git commit -m "подключены ключевые этапы к общей главной"
          git push origin HEAD:feature/key-milestones

      - name: Remove temporary workflow from main
        shell: bash
        run: |
          git fetch origin main
          git checkout -B main origin/main
          git rm .github/workflows/apply-key-milestones.yml
          git commit -m "удалён временный патчер ключевых этапов"
          git push origin main
