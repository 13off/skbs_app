name: Restore visible application screens

on:
  push:
    branches:
      - main
    paths:
      - tool/fix_blank_shell.marker

permissions:
  contents: write
  actions: write

concurrency:
  group: restore-visible-application-screens
  cancel-in-progress: false

jobs:
  patch-test-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Restore stable nested routes
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          shell_path = Path('lib/features/shell/presentation/premium_main_screen.dart')
          source = shell_path.read_text(encoding='utf-8')

          material_import = "import 'package:flutter/material.dart';\n"
          cupertino_import = "import 'package:flutter/cupertino.dart' show CupertinoPageRoute;\n"
          if cupertino_import not in source:
              if material_import not in source:
                  raise RuntimeError('Не найден импорт Material')
              source = source.replace(
                  material_import,
                  material_import + cupertino_import,
                  1,
              )

          old_route = 'return MaterialPageRoute<void>('
          new_route = 'return CupertinoPageRoute<void>('
          if old_route not in source:
              raise RuntimeError('Не найден проблемный MaterialPageRoute')
          source = source.replace(old_route, new_route, 1)
          shell_path.write_text(source, encoding='utf-8')

          test_path = Path('test/ui_motion_contract_test.dart')
          test_source = test_path.read_text(encoding='utf-8')
          old_contract = """    expect(source, contains('MaterialPageRoute<void>'));
              expect(source, isNot(contains('CupertinoPageRoute')));
          """
          new_contract = """    expect(source, contains('CupertinoPageRoute<void>'));
          """
          if old_contract in test_source:
              test_source = test_source.replace(old_contract, new_contract, 1)
          else:
              test_source = test_source.replace(
                  "    expect(source, contains('MaterialPageRoute<void>'));\n",
                  "    expect(source, contains('CupertinoPageRoute<void>'));\n",
                  1,
              ).replace(
                  "    expect(source, isNot(contains('CupertinoPageRoute')));\n",
                  '',
                  1,
              )
          test_path.write_text(test_source, encoding='utf-8')
          PY

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version-file: .fvmrc
          cache: true

      - name: Install dependencies
        run: flutter pub get --enforce-lockfile

      - name: Format restored source
        run: dart format lib/features/shell/presentation/premium_main_screen.dart test/ui_motion_contract_test.dart

      - name: Run tests
        run: flutter test

      - name: Analyze source
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Build web release
        run: flutter build web --release --base-href /appstroy-web/

      - name: Commit verified restoration
        shell: bash
        run: |
          rm -f tool/fix_blank_shell.marker
          rm -f .github/workflows/fix-blank-shell.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "восстановлено отображение экранов приложения"
          git push

      - name: Start web deployment
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
        shell: bash
        run: |
          curl --fail-with-body --silent --show-error --location \
            --request POST \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer ${GH_TOKEN}" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${REPOSITORY}/actions/workflows/deploy-web.yml/dispatches" \
            --data '{"ref":"main"}'
