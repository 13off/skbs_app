name: Run simple task goal patch

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  patch:
    if: github.head_ref == 'feature/simple-task-goal-flow' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Apply patch stored in temporary workflow
        shell: bash
        run: |
          set +e
          python3 - <<'PY' > patch-error.log 2>&1
          from pathlib import Path
          import re

          workflow = Path('.github/workflows/apply-simple-task-goal-flow.yml').read_text(
              encoding='utf-8'
          )
          marker = "python3 - <<'PY'\n"
          raw_body = workflow.split(marker, 1)[1].split("\n          PY", 1)[0]
          body = '\n'.join(
              line[10:] if line.startswith('          ') else line
              for line in raw_body.splitlines()
          )

          strict_add_call = "add = replace_once(add, old_add_form, new_add_form, 'add form')"
          flexible_add_call = """add_form_start = add.index(
              \"          TextField(\\n            controller: axesController,\"
          )
          add_picker_start = add.index(
              \"          TaskMilestonePicker(\", add_form_start
          )
          add_form_end = add.index(
              \"\\n\\n          const SizedBox(height: 16),\\n\\n          buildAssigneesBlock(),\",
              add_picker_start,
          )
          add = add[:add_form_start] + new_add_form + add[add_form_end:]"""
          if strict_add_call not in body:
              raise SystemExit('Patch source does not contain add form call')
          body = body.replace(strict_add_call, flexible_add_call, 1)

          placement_pattern = re.compile(
              r"legacy = replace_once\(\n"
              r"\s+legacy,\n"
              r"\s+osi_marker,\n"
              r"\s+compact_picker \+ osi_marker,\n"
              r"\s+'legacy picker placement',\n"
              r"\s+\)"
          )
          flexible_placement = """legacy_osi_text = legacy.index(
              \"                'Оси',\"
          )
          legacy_osi_start = legacy.rfind(
              \"          const Padding(\", 0, legacy_osi_text
          )
          if legacy_osi_start < 0:
              raise SystemExit('Osi block not found')
          legacy = (
              legacy[:legacy_osi_start]
              + compact_picker
              + legacy[legacy_osi_start:]
          )"""
          body, count = placement_pattern.subn(flexible_placement, body, count=1)
          if count != 1:
              raise SystemExit('Patch source does not contain legacy placement call')

          strict_work_call = (
              "legacy = replace_once(legacy, old_work, new_work, "
              "'legacy conditional work')"
          )
          flexible_work_call = """legacy_work_text = legacy.index(
              \"                'Вид работ',\", legacy_osi_start
          )
          legacy_work_start = legacy.rfind(
              \"          const Padding(\", 0, legacy_work_text
          )
          legacy_old_picker_start = legacy.index(
              \"          if (isLoading)\\n"
              \"            const Center(child: CircularProgressIndicator())\\n"
              \"          else ...[\",
              legacy_work_text,
          )
          legacy = (
              legacy[:legacy_work_start]
              + new_work
              + legacy[legacy_old_picker_start:]
          )"""
          if strict_work_call not in body:
              raise SystemExit('Patch source does not contain legacy work call')
          body = body.replace(strict_work_call, flexible_work_call, 1)

          old_picker_pattern = re.compile(
              r"legacy = replace_once\(\n"
              r"\s+legacy,\n"
              r"\s+old_picker_block,\n"
              r"\s+\"          if \(!isLoading\) buildAssigneesBlock\(\),\\n\",\n"
              r"\s+'legacy remove large picker',\n"
              r"\s+\)"
          )
          flexible_picker_removal = """legacy_old_picker_start = legacy.index(
              \"          if (isLoading)\\n"
              \"            const Center(child: CircularProgressIndicator())\\n"
              \"          else ...[\",
              legacy_work_start + len(new_work),
          )
          legacy_picker_end_marker = (
              \"            buildAssigneesBlock(),\\n          ],\\n\"
          )
          legacy_old_picker_end = (
              legacy.index(legacy_picker_end_marker, legacy_old_picker_start)
              + len(legacy_picker_end_marker)
          )
          legacy = (
              legacy[:legacy_old_picker_start]
              + \"          if (!isLoading) buildAssigneesBlock(),\\n\"
              + legacy[legacy_old_picker_end:]
          )"""
          body, count = old_picker_pattern.subn(
              flexible_picker_removal, body, count=1
          )
          if count != 1:
              raise SystemExit('Patch source does not contain old picker removal call')

          exec(compile(body, 'simple_task_goal_patch.py', 'exec'))
          PY
          status=$?
          cat patch-error.log
          exit "$status"

      - name: Upload patch error
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: simple-task-goal-patch-error
          path: patch-error.log
          if-no-files-found: error

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Format and test
        shell: bash
        run: |
          dart format \
            lib/features/milestones/presentation/task_milestone_picker.dart \
            lib/screens/add_task_screen.dart \
            lib/screens/task_details_legacy_screen.dart \
            test/task_goal_linking_contract_test.dart
          flutter pub get
          flutter test test/task_goal_linking_contract_test.dart test/cumulative_task_progress_contract_test.dart
          flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Commit result and remove temporary files
        shell: bash
        run: |
          rm -f patch-error.log
          rm .github/workflows/apply-simple-task-goal-flow.yml
          rm .github/workflows/run-simple-task-goal-flow.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Упростить привязку задачи к цели"
          git push origin HEAD:feature/simple-task-goal-flow
