name: Apply lazy primary lists

on:
  pull_request:
    branches:
      - main
    paths:
      - tool/performance_phase2.trigger
      - .github/workflows/apply-lazy-primary-lists.yml

permissions:
  contents: write

concurrency:
  group: lazy-primary-lists-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  apply-and-validate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout pull request branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
          persist-credentials: true

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version-file: .fvmrc
          cache: true

      - name: Install dependencies
        run: flutter pub get --enforce-lockfile

      - name: Apply lazy-list patch
        shell: bash
        run: |
          echo '' | base64 -d | gzip -d > /tmp/performance_phase2.patch
          patch -p1 < /tmp/performance_phase2.patch

      - name: Format changed Dart files
        run: |
          dart format \
            lib/widgets/app_page.dart \
            lib/screens/mobile_tasks_screen.dart \
            lib/screens/timesheet/timesheet_view.dart \
            lib/features/payments/presentation/screens/payments_screen.dart \
            lib/screens/employees/employees_sections.dart \
            lib/screens/employees/employees_view.dart \
            test/employees_screen_structure_test.dart \
            test/functional_contract_test.dart \
            test/lazy_primary_lists_contract_test.dart

      - name: Analyze source
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Run focused list tests
        run: |
          flutter test test/lazy_primary_lists_contract_test.dart --reporter compact
          flutter test test/employees_screen_structure_test.dart --reporter compact
          flutter test test/functional_contract_test.dart --reporter compact
          flutter test test/performance_responsiveness_contract_test.dart --reporter compact

      - name: Remove temporary apply files
        run: |
          rm -f tool/performance_phase2.trigger
          rm -f .github/workflows/apply-lazy-primary-lists.yml

      - name: Commit validated lazy lists
        uses: stefanzweifel/git-auto-commit-action@v6
        with:
          branch: ${{ github.head_ref }}
          commit_message: длинные рабочие списки переведены на ленивую отрисовку
          file_pattern: .
