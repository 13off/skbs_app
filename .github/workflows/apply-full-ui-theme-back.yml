name: Apply full UI theme and back patch

on:
  push:
    branches:
      - agent/full-ui-theme-back-clean
    paths:
      - tool/apply_full_ui_theme_back.py
      - .github/workflows/apply-full-ui-theme-back.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/full-ui-theme-back-clean
          fetch-depth: 0

      - name: Apply targeted UI patch
        run: python3 tool/apply_full_ui_theme_back.py

      - name: Commit only targeted changes
        shell: bash
        run: |
          mapfile -t files < <(git diff --name-only --diff-filter=ACM)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No UI changes to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "${files[@]}"
          git commit -m "полностью исправлены тёмная тема и возврат назад"
          git push origin HEAD:agent/full-ui-theme-back-clean
