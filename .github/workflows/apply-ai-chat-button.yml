name: Apply AI chat button

on:
  push:
    branches:
      - feature/ai-chat-button
    paths:
      - .github/workflows/apply-ai-chat-button.yml

permissions:
  contents: write

concurrency:
  group: appstroy-ai-chat-button
  cancel-in-progress: true

jobs:
  apply-test-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: feature/ai-chat-button
          fetch-depth: 0
          persist-credentials: true

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version-file: .fvmrc
          cache: true

      - name: Install locked dependencies
        run: flutter pub get --enforce-lockfile

      - name: Apply UI patch
        run: python3 tool/apply_ai_chat_button.py

      - name: Format changed Dart files
        run: |
          dart format \
            lib/screens/home_screen.dart \
            lib/features/ai/presentation/ai_assistant_screen.dart \
            test/ai_assistant_contract_test.dart

      - name: Run regression tests
        run: flutter test

      - name: Analyze source
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Build Flutter Web
        run: |
          flutter build web --release \
            --base-href /appstroy-web/ \
            --dart-define=SUPABASE_URL=https://api.appstroy-web.ru

      - name: Commit validated implementation
        shell: bash
        run: |
          rm -f .github/workflows/apply-ai-chat-button.yml
          rm -f tool/apply_ai_chat_button.py
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "упрощён ИИ-помощник до чата"
          git push origin HEAD:feature/ai-chat-button
