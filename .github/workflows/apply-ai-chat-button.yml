name: Validate AI chat patch

on:
  pull_request:
    branches:
      - main
    paths:
      - tool/ai_chat_button.trigger

permissions:
  contents: read

concurrency:
  group: appstroy-ai-chat-button-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  patch-test-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout pull request
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version-file: .fvmrc
          cache: true

      - name: Install locked dependencies
        run: flutter pub get --enforce-lockfile

      - name: Apply UI patch
        run: python3 tool/apply_ai_chat_button.py

      - name: Fix generated contract
        run: python3 tool/fix_ai_chat_contract.py

      - name: Format changed Dart files
        run: |
          dart format \
            lib/screens/home_screen.dart \
            lib/features/ai/presentation/ai_assistant_screen.dart \
            test/ai_assistant_contract_test.dart

      - name: Run regression tests
        run: flutter test

      - name: Analyze source
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Build Flutter Web
        run: |
          flutter build web --release \
            --base-href /appstroy-web/ \
            --dart-define=SUPABASE_URL=https://api.appstroy-web.ru

      - name: Upload validated source files
        uses: actions/upload-artifact@v4
        with:
          name: ai-chat-patched-files
          if-no-files-found: error
          path: |
            lib/screens/home_screen.dart
            lib/features/ai/presentation/ai_assistant_screen.dart
            test/ai_assistant_contract_test.dart
