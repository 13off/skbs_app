name: Performance source snapshot PR v2

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/performance-source-snapshot-pr-v2.yml
      - tool/performance_snapshot_v2.trigger

permissions:
  contents: read

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Create clean source archive
        run: |
          tar \
            --exclude=.git \
            --exclude=.dart_tool \
            --exclude=build \
            --exclude='**/build' \
            --exclude='**/.gradle' \
            --exclude='**/Pods' \
            -czf /tmp/skbs-app-source.tar.gz .

      - name: Upload source snapshot
        uses: actions/upload-artifact@v4
        with:
          name: skbs-app-performance-source-v2
          path: /tmp/skbs-app-source.tar.gz
          if-no-files-found: error
          retention-days: 1
