name: Final invitation safety

on:
  pull_request:
    branches:
      - main
    types:
      - reopened
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: final-invitation-safety
  cancel-in-progress: true

jobs:
  patch-test-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: feature/invitation-links-session-restore
          persist-credentials: true

      - name: Apply final safety fixes
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('lib/features/auth/data/user_repository.dart')
          text = path.read_text(encoding='utf-8')
          old_future = '''    late final Future<bool> future;\n    future = _applyPendingInvitationCompany();\n    _pendingInvitationApplication = future;\n    future.whenComplete(() {\n      if (identical(_pendingInvitationApplication, future)) {\n        _pendingInvitationApplication = null;\n      }\n    });\n    return future;\n'''
          new_future = '''    late final Future<bool> future;\n    future = _applyPendingInvitationCompany().whenComplete(() {\n      if (identical(_pendingInvitationApplication, future)) {\n        _pendingInvitationApplication = null;\n      }\n    });\n    _pendingInvitationApplication = future;\n    return future;\n'''
          old_signout = '''  static Future<void> signOut() async {\n    await PushNotificationService.unregisterCurrentDevice();\n    clearProfileCache();\n    await _client.auth.signOut();\n  }\n'''
          new_signout = '''  static Future<void> signOut() async {\n    await PushNotificationService.unregisterCurrentDevice();\n    _consumedInvitationCompanyId = null;\n    _pendingInvitationApplication = null;\n    clearProfileCache();\n    await _client.auth.signOut();\n  }\n'''
          for old, new in ((old_future, new_future), (old_signout, new_signout)):
              if text.count(old) != 1:
                  raise RuntimeError('Не найден точный блок финальной защиты')
              text = text.replace(old, new, 1)
          path.write_text(text, encoding='utf-8')
          PY

      - name: Commit safety fixes
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add lib/features/auth/data/user_repository.dart
          git commit -m "усилена обработка invite-ссылки при ошибках и выходе"
          git push origin HEAD:feature/invitation-links-session-restore

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version-file: .fvmrc
          cache: true

      - name: Install locked dependencies
        run: flutter pub get --enforce-lockfile

      - name: Validate final branch
        run: |
          flutter test
          flutter analyze --no-fatal-infos --no-fatal-warnings
          flutter build web --release --base-href /appstroy-web/

      - name: Remove temporary workflow
        shell: bash
        run: |
          rm -f .github/workflows/final-invitation-safety.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "завершена проверка безопасности приглашений"
          git push origin HEAD:feature/invitation-links-session-restore
