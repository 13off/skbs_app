name: Apply foreman task edit patch

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'feature/foreman-task-edit-window'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          token: ${{ github.token }}
          fetch-depth: 0

      - name: Apply targeted source patch
        run: python3 tooling/apply_foreman_task_edit_patch.py

      - name: Remove temporary patch tooling
        run: |
          rm -f tooling/apply_foreman_task_edit_patch.py
          rm -f .github/workflows/apply-foreman-task-edit-patch.yml

      - name: Commit patched sources
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Добавить редактирование задач прорабом в день выполнения"
          git push origin HEAD:${{ github.head_ref }}
