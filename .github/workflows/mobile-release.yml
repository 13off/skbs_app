name: Mobile Release

on:
  push:
    branches:
      - main
    paths:
      - release/mobile-release.txt
  workflow_dispatch:

permissions:
  actions: write
  contents: read

jobs:
  dispatch-mobile-builds:
    runs-on: ubuntu-latest
    steps:
      - name: Start Android and iOS builds
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            for (const workflow_id of [
              'build-android-apk.yml',
              'build-ios-ipa.yml',
            ]) {
              await github.rest.actions.createWorkflowDispatch({
                owner,
                repo,
                workflow_id,
                ref: 'main',
              });
            }
