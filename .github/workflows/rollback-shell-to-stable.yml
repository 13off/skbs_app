name: Roll back shell to stable rendering

on:
  push:
    branches:
      - main
    paths:
      - tool/rollback_shell_to_stable.marker

permissions:
  contents: write
  actions: write

concurrency:
  group: rollback-shell-to-stable
  cancel-in-progress: false

jobs:
  restore-test-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout full source history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Restore last known-good application shell
        shell: bash
        run: |
          git checkout f49c4b1edf2beea436de3fbaeffe2951bcf137c9 -- \
            lib/features/shell/presentation/premium_main_screen.dart

          cat > test/ui_motion_contract_test.dart <<'DART'
          import 'dart:io';

          import 'package:flutter_test/flutter_test.dart';

          void main() {
            test('standard buttons use one motion surface', () {
              final source = File('lib/app/app_theme.dart').readAsStringSync();

              expect(source, contains('AppMotion.hoverScale'));
              expect(source, contains('backgroundBuilder: buttonSurface('));
              expect(source, contains('filledButtonStyle'));
              expect(source, contains('outlinedButtonStyle'));
              expect(source, contains('textButtonStyle'));
              expect(source, contains('iconButtonStyle'));
            });

            test('premium pressables use the same hover and press motion', () {
              final source = File(
                'lib/widgets/premium_pressable_v3.dart',
              ).readAsStringSync();

              expect(source, contains('this.hoverScale = AppMotion.hoverScale'));
              expect(source, contains('AppMotion.interactionCurve'));
              expect(source, contains('FocusableActionDetector'));
            });

            test('shell keeps the last known-good visible tab structure', () {
              final source = File(
                'lib/features/shell/presentation/premium_main_screen.dart',
              ).readAsStringSync();

              expect(source, contains('CupertinoPageRoute<void>'));
              expect(source, contains('PageView.builder'));
              expect(source, contains('return buildRootPage(index, selectedObjectName);'));
              expect(source, isNot(contains('final isDesktop = screenWidth >= 760')));
            });
          }
          DART

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version-file: .fvmrc
          cache: true

      - name: Install locked dependencies
        run: flutter pub get --enforce-lockfile

      - name: Format restored source
        run: dart format lib/features/shell/presentation/premium_main_screen.dart test/ui_motion_contract_test.dart

      - name: Run all tests
        run: flutter test

      - name: Analyze source
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Build release web
        run: flutter build web --release --base-href /appstroy-web/

      - name: Commit verified stable shell
        shell: bash
        run: |
          rm -f tool/rollback_shell_to_stable.marker
          rm -f .github/workflows/rollback-shell-to-stable.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "полностью восстановлена рабочая оболочка экранов"
          git push

      - name: Dispatch web deployment immediately
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
        shell: bash
        run: |
          curl --fail-with-body --silent --show-error --location \
            --request POST \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer ${GH_TOKEN}" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${REPOSITORY}/actions/workflows/deploy-web.yml/dispatches" \
            --data '{"ref":"main"}'
