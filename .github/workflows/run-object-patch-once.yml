name: Run object patch once

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch object patch
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run one-off-object-menu-fix.yml --ref main

      - name: Remove scheduler
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Commit scheduler removal
        shell: bash
        run: |
          rm -f .github/workflows/run-object-patch-once.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "удален одноразовый запуск патча объектов"
          git push
