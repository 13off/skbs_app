name: Debug performance phase3 analyzer

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/debug-performance-phase3-analyzer.yml

permissions:
  contents: read

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version-file: .fvmrc
          cache: true

      - name: Install dependencies
        run: flutter pub get --enforce-lockfile

      - name: Apply patch and analyze
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import base64, gzip, re
          text = Path('.github/workflows/apply-performance-photo-requests.yml').read_text()
          value = re.search(r"echo '([^']+)' \| base64", text).group(1)
          Path('/tmp/performance_phase3.patch').write_bytes(
              gzip.decompress(base64.b64decode(value)))
          PY
          patch -p1 < /tmp/performance_phase3.patch
          dart format \
            lib/data/image_compression_service.dart \
            lib/data/task_photo_repository.dart \
            lib/data/payment_receipt_repository.dart \
            lib/data/task_repository.dart \
            lib/data/attendance_repository.dart \
            lib/data/payment_repository.dart \
            test/performance_io_pipeline_contract_test.dart
          set +e
          flutter analyze --no-fatal-infos --no-fatal-warnings > /tmp/phase3-analyzer.log 2>&1
          code=$?
          echo "$code" > /tmp/phase3-analyzer-exit.txt
          cat /tmp/phase3-analyzer.log
          exit 0

      - name: Upload analyzer log
        uses: actions/upload-artifact@v4
        with:
          name: phase3-analyzer-log
          path: |
            /tmp/phase3-analyzer.log
            /tmp/phase3-analyzer-exit.txt
          retention-days: 1
