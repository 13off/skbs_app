name: Apply and validate invitation token link

on:
  push:
    branches:
      - fix/invitation-token-link

permissions:
  contents: write

concurrency:
  group: apply-invitation-token-link
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: fix/invitation-token-link
          fetch-depth: 0
          persist-credentials: true

      - name: Apply exact invitation fix
        run: python3 tool/apply_invitation_token_link_fix.py

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version-file: .fvmrc
          cache: true

      - name: Install locked dependencies
        run: flutter pub get --enforce-lockfile

      - name: Format changed Dart files
        run: |
          dart format \
            lib/features/auth/data/user_repository.dart \
            lib/features/auth/presentation/premium_auth_gate_v2.dart \
            test/invitation_token_link_contract_test.dart

      - name: Validate tests analysis and web build
        run: |
          flutter test
          flutter analyze --no-fatal-infos --no-fatal-warnings
          flutter build web --release --base-href /appstroy-web/

      - name: Commit validated feature and cleanup
        shell: bash
        run: |
          rm -f tool/apply_invitation_token_link_fix.py
          rm -f .github/workflows/run-invitation-token-link-fix.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "исправлена рабочая ссылка приглашения без localhost"
          git push origin HEAD:fix/invitation-token-link
