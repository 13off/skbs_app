name: Debug acceptance patch

on:
  pull_request:
    branches:
      - main
    paths:
      - tool/acceptance_patch_debug.trigger

permissions:
  contents: write

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          persist-credentials: true
      - name: Capture exact patch error
        run: |
          python3 tool/apply_acceptance_onboarding.py > tool/acceptance_patch_error.txt 2>&1 || true
      - name: Commit diagnostic log
        uses: stefanzweifel/git-auto-commit-action@v6
        with:
          branch: ${{ github.head_ref }}
          commit_message: сохранена диагностика патча приёмки
          file_pattern: tool/acceptance_patch_error.txt