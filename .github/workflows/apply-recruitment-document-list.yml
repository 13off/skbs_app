name: Apply recruitment document list

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  patch-and-check:
    if: github.head_ref == 'feature/recruitment-document-list' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Apply compact document list
        shell: bash
        run: |
          set +e
          python3 tool/apply_recruitment_document_list.py > /tmp/first-patch.log 2>&1
          first_status=$?
          set -e
          if [ "$first_status" -ne 0 ] && ! grep -q "server safe filename helper" /tmp/first-patch.log; then
            cat /tmp/first-patch.log
            exit "$first_status"
          fi
          python3 tool/finish_recruitment_document_list.py

      - uses: subosito/flutter-action@v2
        with:
          flutter-version-file: .fvmrc
          cache: true

      - name: Capture verification result
        shell: bash
        run: |
          set +e
          {
            dart format \
              lib/features/recruitment/presentation/recruitment_application_detail_screen.dart \
              test/recruitment_documents_chat_contract_test.dart
            flutter pub get --enforce-lockfile
            flutter test
            flutter analyze --no-fatal-infos --no-fatal-warnings
            flutter build web --release --base-href /appstroy-web/
          } > /tmp/document-list-check.log 2>&1
          status=$?
          tail -n 320 /tmp/document-list-check.log > ci-document-list-check.log
          echo "$status" > ci-document-list-check.status
          exit 0

      - name: Commit result
        shell: bash
        run: |
          rm -f tool/apply_recruitment_document_list.py
          rm -f tool/finish_recruitment_document_list.py
          rm -f .github/workflows/apply-recruitment-document-list.yml
          rm -f patch-error.log patch-error.status
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git add -f ci-document-list-check.log ci-document-list-check.status
          git commit -m "Проверить компактный список документов кандидата"
          git push origin HEAD:feature/recruitment-document-list
