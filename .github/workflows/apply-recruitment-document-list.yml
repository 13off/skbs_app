name: Apply recruitment document list

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  patch-and-check:
    if: github.head_ref == 'feature/recruitment-document-list' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Diagnose compact document list patch
        shell: bash
        run: |
          set +e
          python3 tool/apply_recruitment_document_list.py > patch-error.log 2>&1
          echo "$?" > patch-error.status
          exit 0

      - name: Commit diagnostic
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f patch-error.log patch-error.status
          git commit -m "Сохранить ошибку патча документов"
          git push origin HEAD:feature/recruitment-document-list
