name: Apply desktop company management

on:
  push:
    branches:
      - feature/desktop-company-users

permissions:
  contents: write

concurrency:
  group: appstroy-desktop-company-management
  cancel-in-progress: true

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: feature/desktop-company-users
          fetch-depth: 0

      - name: Wire desktop company center
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('lib/features/company/presentation/company_management_screen.dart')
          text = path.read_text(encoding='utf-8')

          import_anchor = "import 'package:flutter/material.dart';\n"
          import_replacement = "import 'package:flutter/foundation.dart';\nimport 'package:flutter/material.dart';\n"
          if "package:flutter/foundation.dart" not in text:
              if text.count(import_anchor) != 1:
                  raise SystemExit(f'foundation import anchor count: {text.count(import_anchor)}')
              text = text.replace(import_anchor, import_replacement)

          local_anchor = "import 'company_plans_screen.dart';\n"
          local_replacement = "import 'company_plans_screen.dart';\nimport 'desktop_company_management_screen.dart';\n"
          if "desktop_company_management_screen.dart" not in text:
              if text.count(local_anchor) != 1:
                  raise SystemExit(f'desktop import anchor count: {text.count(local_anchor)}')
              text = text.replace(local_anchor, local_replacement)

          build_anchor = """  @override
  Widget build(BuildContext context) {
    return Scaffold(
"""
          build_replacement = """  @override
  Widget build(BuildContext context) {
    if (kIsWeb && MediaQuery.sizeOf(context).width >= 1050) {
      return DesktopCompanyManagementScreen(companyId: widget.companyId);
    }

    return Scaffold(
"""
          if "return DesktopCompanyManagementScreen" not in text:
              if text.count(build_anchor) != 1:
                  raise SystemExit(f'build anchor count: {text.count(build_anchor)}')
              text = text.replace(build_anchor, build_replacement)

          path.write_text(text, encoding='utf-8')
          PY

          git rm .github/workflows/apply-desktop-company-management.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add lib/features/company/presentation/company_management_screen.dart
          git commit -m "подключён ПК-центр компании"
          git push origin HEAD:feature/desktop-company-users
