name: Apply recruitment combined PDF

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  patch-and-check:
    if: github.head_ref == 'feature/recruitment-combined-pdf' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Apply combined PDF
        run: python3 tool/apply_recruitment_combined_pdf.py

      - uses: subosito/flutter-action@v2
        with:
          flutter-version-file: .fvmrc
          cache: true

      - name: Capture verification result
        shell: bash
        run: |
          set +e
          {
            dart format \
              lib/features/recruitment/presentation/recruitment_application_detail_screen.dart \
              test/recruitment_documents_chat_contract_test.dart
            flutter pub get
            flutter test
            flutter analyze --no-fatal-infos --no-fatal-warnings
            flutter build web --release --base-href /appstroy-web/
          } > /tmp/combined-pdf-check.log 2>&1
          status=$?
          tail -n 260 /tmp/combined-pdf-check.log > ci-combined-pdf-check.log
          echo "$status" > ci-combined-pdf-check.status
          exit 0

      - name: Commit transformed changes and result
        shell: bash
        run: |
          rm tool/apply_recruitment_combined_pdf.py
          rm .github/workflows/apply-recruitment-combined-pdf.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Проверить общий PDF документов кандидата"
          git push origin HEAD:feature/recruitment-combined-pdf
