name: Apply recruitment detail dark theme patch

on:
  pull_request:
    branches:
      - main
    paths:
      - tool/recruitment_detail_dark_theme.trigger

permissions:
  contents: write

concurrency:
  group: appstroy-recruitment-detail-dark-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  patch-and-validate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Prepare pull request branch
        run: git switch -C "${GITHUB_HEAD_REF}"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version-file: .fvmrc
          cache: true

      - name: Install locked dependencies
        run: flutter pub get --enforce-lockfile

      - name: Apply candidate detail color patch
        run: python3 tool/apply_recruitment_detail_dark_theme.py

      - name: Format changed sources
        run: |
          dart format \
            lib/features/recruitment/presentation/recruitment_application_detail_screen.dart \
            test/recruitment_detail_dark_theme_contract_test.dart

      - name: Run targeted contract
        run: flutter test test/recruitment_detail_dark_theme_contract_test.dart

      - name: Analyze source
        id: analyzer
        shell: bash
        run: |
          set +e
          flutter analyze --no-fatal-infos --no-fatal-warnings > analyzer.log 2>&1
          status=$?
          cat analyzer.log
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload analyzer log
        if: steps.analyzer.outputs.status != '0'
        uses: actions/upload-artifact@v4
        with:
          name: recruitment-detail-dark-analyzer-log
          path: analyzer.log
          if-no-files-found: error
          retention-days: 3

      - name: Fail on analyzer errors
        if: steps.analyzer.outputs.status != '0'
        run: exit 1

      - name: Remove temporary patch files
        run: |
          rm -f .github/workflows/apply-recruitment-detail-dark-theme.yml
          rm -f tool/apply_recruitment_detail_dark_theme.py
          rm -f tool/recruitment_detail_dark_theme.trigger

      - name: Commit validated patch
        uses: stefanzweifel/git-auto-commit-action@v6
        with:
          branch: ${{ github.head_ref }}
          commit_message: исправлена тёмная тема карточки кандидата
          file_pattern: .
