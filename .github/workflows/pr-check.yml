name: PR Check

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches:
      - main
    paths:
      - lib/**
      - test/**
      - tools/**
      - .github/workflows/pr-check.yml
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: appstroy-pr-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  apply-final-crm-board-fix:
    if: github.head_ref == 'fix/recruitment-board-final'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
          show-progress: false

      - name: Apply patch or save diagnostic
        shell: bash
        run: |
          set -u
          if [ ! -f test/recruitment_board_final_trigger_test.dart ]; then
            echo "Patch trigger already consumed"
            exit 0
          fi

          set +e
          python3 tools/apply_recruitment_board_fix_v4.py > /tmp/crm-patch.log 2>&1
          status=$?
          set -e

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if [ "$status" -ne 0 ]; then
            mkdir -p .github
            cp /tmp/crm-patch.log .github/recruitment_board_patch_error.txt
            cat .github/recruitment_board_patch_error.txt
            rm -f test/recruitment_board_final_trigger_test.dart
            git add -A
            git commit -m "Сохранить диагностику патча канбана CRM"
            git push origin HEAD:${{ github.head_ref }}
            exit 0
          fi

          rm -f test/recruitment_board_final_trigger_test.dart
          rm -f tools/apply_recruitment_board_fix_v4.py
          rm -f .github/recruitment_board_patch_error.txt
          git add -A
          git commit -m "Разделить перенос кандидатов и порядок колонок CRM"
          git push origin HEAD:${{ github.head_ref }}
