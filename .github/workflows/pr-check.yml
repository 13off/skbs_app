name: Apply unified invitations once

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main
    paths:
      - .github/workflows/pr-check.yml

permissions:
  contents: write

concurrency:
  group: apply-unified-invitations-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  apply:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: fix/unify-company-invitations
          fetch-depth: 0

      - name: Apply and commit final source changes
        shell: bash
        run: |
          set -euo pipefail
          python3 tool/apply_unified_invitations.py
          git fetch origin main
          git checkout origin/main -- .github/workflows/pr-check.yml
          git rm -f .github/workflows/apply-unified-invitations.yml tool/apply_unified_invitations.py
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "объединены приглашения пользователей компании"
          git push origin HEAD:fix/unify-company-invitations
