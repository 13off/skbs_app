name: PR Check

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches:
      - main
    paths:
      - lib/**
      - test/**
      - pubspec.yaml
      - pubspec.lock
      - .fvmrc
      - .github/workflows/pr-check.yml
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: appstroy-pr-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  flutter-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
          persist-credentials: true
          show-progress: false

      - name: Apply developer panel scroll fix
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('lib/features/developer/presentation/developer_panel_screen.dart')
          text = path.read_text(encoding='utf-8')
          replacements = [
              (
                  """                  final selector = _buildSelector();
                  final editor = _buildEditor();""",
                  """                  final selector = _buildSelector(scrollable: desktop);
                  final editor = _buildEditor(scrollable: desktop);""",
              ),
              (
                  """  Widget _buildSelector() {
    final value = center!;
    return ListView(
      shrinkWrap: true,
      physics: const NeverScrollableScrollPhysics(),""",
                  """  Widget _buildSelector({required bool scrollable}) {
    final value = center!;
    return ListView(
      primary: false,
      shrinkWrap: !scrollable,
      physics: scrollable
          ? const AlwaysScrollableScrollPhysics()
          : const NeverScrollableScrollPhysics(),""",
              ),
              (
                  """  Widget _buildEditor() {
    final object = selectedObject;
    return ListView(
      shrinkWrap: true,
      physics: const NeverScrollableScrollPhysics(),""",
                  """  Widget _buildEditor({required bool scrollable}) {
    final object = selectedObject;
    return ListView(
      primary: false,
      shrinkWrap: !scrollable,
      physics: scrollable
          ? const AlwaysScrollableScrollPhysics()
          : const NeverScrollableScrollPhysics(),""",
              ),
          ]

          for old, new in replacements:
              count = text.count(old)
              if count != 1:
                  raise RuntimeError(f'Expected exactly one match, found {count}: {old[:80]!r}')
              text = text.replace(old, new)
          path.write_text(text, encoding='utf-8')
          PY

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version-file: .fvmrc
          cache: true

      - name: Format fix
        run: dart format lib/features/developer/presentation/developer_panel_screen.dart test/developer_panel_scroll_contract_test.dart

      - name: Install locked dependencies
        run: flutter pub get --enforce-lockfile >/dev/null

      - name: Analyze source
        id: analyze
        shell: bash
        run: |
          set +e
          flutter analyze --no-fatal-infos --no-fatal-warnings > /tmp/flutter-analyze.log 2>&1
          status=$?
          if [ "$status" -ne 0 ]; then
            echo "--- Flutter analyzer failure ---"
            tail -n 120 /tmp/flutter-analyze.log
            exit "$status"
          fi
          tail -n 20 /tmp/flutter-analyze.log

      - name: Run regression tests
        id: regression
        shell: bash
        run: |
          set +e
          flutter test --reporter compact > /tmp/flutter-test.log 2>&1
          status=$?
          if [ "$status" -ne 0 ]; then
            echo "--- Flutter test failure (last 180 lines) ---"
            tail -n 180 /tmp/flutter-test.log
            exit "$status"
          fi
          tail -n 20 /tmp/flutter-test.log

      - name: Build web release
        run: flutter build web --release --base-href /appstroy-web/

      - name: Restore workflows and commit fix
        shell: bash
        run: |
          git show aa5f10737dd2da26de4bfe44af7a40365fdf1cbf:.github/workflows/pr-check.yml > .github/workflows/pr-check.yml
          git show aa5f10737dd2da26de4bfe44af7a40365fdf1cbf:.github/workflows/deploy-web.yml > .github/workflows/deploy-web.yml
          rm -f test/developer_panel_scroll_fix_trigger_test.dart
          git config user.name "AppStroy Automation"
          git config user.email "actions@users.noreply.github.com"
          git add lib/features/developer/presentation/developer_panel_screen.dart test/developer_panel_scroll_contract_test.dart test/developer_panel_scroll_fix_trigger_test.dart .github/workflows/pr-check.yml .github/workflows/deploy-web.yml
          git commit -m "Исправить прокрутку панели разработчика"
          git push origin HEAD:${{ github.head_ref }}

      - name: Upload failing analyzer log
        if: failure() && steps.analyze.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: flutter-analyze-log
          path: /tmp/flutter-analyze.log
          if-no-files-found: error
          retention-days: 3

      - name: Upload failing test log
        if: failure() && steps.regression.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: flutter-test-log
          path: /tmp/flutter-test.log
          if-no-files-found: error
          retention-days: 3
