name: Apply specialist desktop fix

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main
    paths:
      - lib/**
      - test/**
      - .github/workflows/pr-check.yml

permissions:
  contents: write

concurrency:
  group: appstroy-specialist-fix-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  apply:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Apply exact legal status fix and restore CI
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('lib/features/legal/presentation/adaptive_legal_documents_screen.dart')
          text = path.read_text(encoding='utf-8')

          first = """if (document.status == LegalDocumentStatus.signed ||
                  document.status == LegalDocumentStatus.active) {"""
          first_replacement = """if (document.status == LegalDocumentStatus.signed) {"""
          second = """(item) =>
                      item.status == LegalDocumentStatus.signed ||
                      item.status == LegalDocumentStatus.active,"""
          second_replacement = """(item) => item.status == LegalDocumentStatus.signed,"""

          if text.count(first) != 1:
              raise SystemExit('Expected exactly one statusColor pattern')
          if text.count(second) != 1:
              raise SystemExit('Expected exactly one signed summary pattern')

          text = text.replace(first, first_replacement)
          text = text.replace(second, second_replacement)
          path.write_text(text, encoding='utf-8')
          PY

          git show origin/main:.github/workflows/pr-check.yml > .github/workflows/pr-check.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add lib/features/legal/presentation/adaptive_legal_documents_screen.dart .github/workflows/pr-check.yml
          git commit -m "исправлен статус юридических документов"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
