name: Apply desktop company fixes

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main
    paths:
      - lib/**
      - test/**
      - .github/workflows/pr-check.yml

permissions:
  contents: write

concurrency:
  group: appstroy-company-fix-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  apply:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Apply exact fixes and restore CI
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('lib/features/company/presentation/desktop_company_management_screen.dart')
          text = path.read_text(encoding='utf-8')

          import_anchor = "import '../../shared/presentation/specialist_desktop_ui.dart';\n"
          import_line = "import '../../../widgets/premium_ui.dart';\n"
          if import_line not in text:
              if text.count(import_anchor) != 1:
                  raise SystemExit(f'premium import anchor count: {text.count(import_anchor)}')
              text = text.replace(import_anchor, import_line + import_anchor)

          method_old = '  Widget invitationStatusFilter() {'
          method_new = '  Widget buildInvitationStatusFilter() {'
          if text.count(method_old) != 1:
              raise SystemExit(f'filter method count: {text.count(method_old)}')
          text = text.replace(method_old, method_new)

          call_old = '              trailing: invitationStatusFilter(),'
          call_new = '              trailing: buildInvitationStatusFilter(),'
          if text.count(call_old) != 1:
              raise SystemExit(f'filter call count: {text.count(call_old)}')
          text = text.replace(call_old, call_new)

          path.write_text(text, encoding='utf-8')
          PY

          git show origin/main:.github/workflows/pr-check.yml > .github/workflows/pr-check.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add lib/features/company/presentation/desktop_company_management_screen.dart .github/workflows/pr-check.yml
          git commit -m "исправлена сборка ПК-центра компании"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
