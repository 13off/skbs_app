name: PR Check

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches:
      - main
    paths:
      - lib/**
      - test/**
      - supabase/migrations/**
      - .github/workflows/pr-check.yml
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: appstroy-pr-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  patch-crm-column-order:
    if: github.event_name == 'pull_request' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Apply prepared patch
        id: apply
        continue-on-error: true
        shell: bash
        run: |
          touch /tmp/patch-error.txt
          set +e
          python3 - <<'PY' 2>/tmp/patch-error.txt
          from pathlib import Path

          workflow = Path('.github/workflows/apply-crm-column-order-fix.yml')
          source = workflow.read_text(encoding='utf-8')
          start = source.index('          from pathlib import Path')
          end = source.index('\n          PY', start)
          lines = source[start:end].splitlines()
          code = '\n'.join(
              line[10:] if line.startswith('          ') else line
              for line in lines
          )
          exec(compile(code, str(workflow), 'exec'))
          PY
          status=$?
          set -e

          if [ "$status" -ne 0 ]; then
            git reset --hard HEAD
            {
              echo "patch exit status: $status"
              cat /tmp/patch-error.txt
            } > .github/patch-error.txt
            cat .github/patch-error.txt
            exit 1
          fi

          git fetch origin main
          git checkout origin/main -- .github/workflows/pr-check.yml
          rm -f .github/crm-column-order-trigger.txt
          rm -f .github/crm-column-order-trigger-2.txt
          rm -f .github/patch-error.txt

      - name: Commit patch or diagnostic
        if: always()
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No diagnostic or patch changes"
            exit 0
          fi
          git commit -m "Сохранить результат исправления колонок CRM"
          git push origin HEAD:${{ github.head_ref }}
