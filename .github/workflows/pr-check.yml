name: Apply foreman desktop wiring

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main
    paths:
      - lib/**
      - test/**
      - .github/workflows/pr-check.yml

permissions:
  contents: write

concurrency:
  group: appstroy-foreman-wiring-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  apply:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Wire foreman desktop screens and restore CI
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          adaptive = Path('lib/screens/adaptive_home_screen.dart')
          text = adaptive.read_text(encoding='utf-8')

          replacements = [
              (
                  "import '../features/ai/presentation/ai_assistant_screen.dart';\n",
                  "import '../features/ai/presentation/ai_assistant_screen.dart';\nimport '../features/foreman/presentation/foreman_desktop_home_screen.dart';\n",
              ),
              (
                  "  final Future<void> Function() onOpenPayments;\n\n  const AdaptiveHomeScreen",
                  "  final Future<void> Function() onOpenPayments;\n  final Future<void> Function() onAddTask;\n\n  const AdaptiveHomeScreen",
              ),
              (
                  "    required this.onOpenTask,\n    required this.onOpenPayments,\n  });",
                  "    required this.onOpenTask,\n    required this.onOpenPayments,\n    required this.onAddTask,\n  });",
              ),
              (
                  "        return _DesktopHomeDashboard(\n",
                  "        if (profile.isForeman) {\n          return ForemanDesktopHomeScreen(\n            profile: profile,\n            selectedObjectName: selectedObjectName,\n            onOpenTimesheet: onOpenTimesheet,\n            onOpenTasks: onOpenTasks,\n            onOpenTask: onOpenTask,\n            onAddTask: onAddTask,\n          );\n        }\n\n        return _DesktopHomeDashboard(\n",
              ),
          ]

          for old, new in replacements:
              if text.count(old) != 1:
                  raise SystemExit(f'Adaptive home pattern count is {text.count(old)} for: {old[:60]}')
              text = text.replace(old, new)
          adaptive.write_text(text, encoding='utf-8')

          shell = Path('lib/features/shell/presentation/premium_main_screen.dart')
          text = shell.read_text(encoding='utf-8')

          imports = [
              (
                  "import '../../../data/task_repository.dart';\n",
                  "import '../../../data/task_repository.dart';\nimport '../../../features/tasks/task_edit_policy.dart';\n",
              ),
              (
                  "import '../../../screens/adaptive_employees_screen.dart';\n",
                  "import '../../../screens/adaptive_employees_screen.dart';\nimport '../../../screens/add_task_screen.dart';\n",
              ),
          ]
          for old, new in imports:
              if text.count(old) != 1:
                  raise SystemExit(f'Shell import pattern count is {text.count(old)}')
              text = text.replace(old, new)

          method_anchor = """  Future<void> openTasksFromHome() async {
    await selectTab(tasksTabIndex);
  }

"""
          method = method_anchor + """  Future<void> addTaskFromHome() async {
    final objectName = cleanObjectName(selectedObjectNameNotifier.value) ??
        cleanObjectName(widget.profile.objectName);
    if (objectName == null) {
      ScaffoldMessenger.of(context).showSnackBar(
        const SnackBar(content: Text('Прорабу не назначен объект')),
      );
      return;
    }

    final taskDate = AppState.today;
    if (!TaskEditPolicy.canCreateForDate(widget.profile, taskDate)) {
      ScaffoldMessenger.of(context).showSnackBar(
        const SnackBar(
          content: Text('Прораб может добавлять задачи только на текущий день'),
        ),
      );
      return;
    }

    final navigator = await selectTabNavigator(tasksTabIndex);
    if (navigator == null) return;

    final draft = await navigator.push<TaskCreateDraft>(
      CupertinoPageRoute<TaskCreateDraft>(
        builder: (_) => AddTaskScreen(
          initialDate: taskDate,
          objectName: objectName,
        ),
      ),
    );
    if (draft == null) return;

    await TaskRepository.addTaskWithDetails(
      draft.task,
      objectName: objectName,
      assigneeIds: draft.assigneeIds,
      photos: draft.photos,
    );
  }

"""
          if text.count(method_anchor) != 1:
              raise SystemExit(f'addTask method anchor count is {text.count(method_anchor)}')
          text = text.replace(method_anchor, method)

          callback = "            onOpenPayments: openPaymentsFromHome,\n"
          if text.count(callback) != 2:
              raise SystemExit(f'Home callback count is {text.count(callback)}')
          text = text.replace(
              callback,
              callback + "            onAddTask: addTaskFromHome,\n",
          )
          shell.write_text(text, encoding='utf-8')
          PY

          git show origin/main:.github/workflows/pr-check.yml > .github/workflows/pr-check.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add lib/screens/adaptive_home_screen.dart lib/features/shell/presentation/premium_main_screen.dart .github/workflows/pr-check.yml
          git commit -m "подключена ПК-платформа прораба"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
