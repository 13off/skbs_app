name: PR Check

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches:
      - main
    paths:
      - lib/**
      - test/**
      - supabase/functions/**
      - supabase/migrations/**
      - pubspec.yaml
      - pubspec.lock
      - .fvmrc
      - .github/workflows/pr-check.yml
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: appstroy-pr-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  flutter-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
          show-progress: false

      - name: Apply prepared CRM patch
        shell: bash
        run: |
          set -euo pipefail
          if [ ! -f .agent/crm_columns_patch_00 ]; then
            echo "Prepared package is already applied."
            exit 0
          fi
          cat .agent/crm_columns_patch_* | base64 --decode > /tmp/crm-columns.patch
          echo "3a5db40b30d84e32d49e83bb93736da11f79068a31bf571421ba91fff9d457f5  /tmp/crm-columns.patch" | sha256sum --check -
          git apply --index /tmp/crm-columns.patch
          rm -f .agent/crm_columns_patch_*
          rmdir .agent 2>/dev/null || true
          git show origin/main:.github/workflows/pr-check.yml > .github/workflows/pr-check.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Улучшить управление колонками CRM"
          git push origin HEAD:${{ github.head_ref }}

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version-file: .fvmrc
          cache: true

      - name: Install locked dependencies
        run: flutter pub get --enforce-lockfile >/dev/null

      - name: Analyze source
        id: analyze
        shell: bash
        run: |
          set +e
          flutter analyze --no-fatal-infos --no-fatal-warnings > /tmp/flutter-analyze.log 2>&1
          status=$?
          if [ "$status" -ne 0 ]; then
            echo "--- Flutter analyzer failure ---"
            tail -n 120 /tmp/flutter-analyze.log
            exit "$status"
          fi
          tail -n 20 /tmp/flutter-analyze.log

      - name: Run regression tests
        id: regression
        shell: bash
        run: |
          set +e
          flutter test --reporter compact > /tmp/flutter-test.log 2>&1
          status=$?
          if [ "$status" -ne 0 ]; then
            echo "--- Flutter test failure (last 180 lines) ---"
            tail -n 180 /tmp/flutter-test.log
            exit "$status"
          fi
          tail -n 20 /tmp/flutter-test.log

      - name: Build web release
        run: flutter build web --release --base-href /appstroy-web/

      - name: Upload failing analyzer log
        if: failure() && steps.analyze.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: flutter-analyze-log
          path: /tmp/flutter-analyze.log
          if-no-files-found: error
          retention-days: 3

      - name: Upload failing test log
        if: failure() && steps.regression.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: flutter-test-log
          path: /tmp/flutter-test.log
          if-no-files-found: error
          retention-days: 3

  backend-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source with history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          show-progress: false

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Check changed Edge Functions
        id: edge-check
        shell: bash
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          set -euo pipefail
          if [ -n "${BASE_SHA:-}" ]; then
            git diff --name-only "$BASE_SHA"...HEAD -- supabase/functions \
              | grep -E '\.tsx?$' > /tmp/edge-files.txt || true
          else
            find supabase/functions -type f -name '*.ts' -print \
              > /tmp/edge-files.txt
          fi

          if [ ! -s /tmp/edge-files.txt ]; then
            echo "Edge Functions were not changed."
            exit 0
          fi

          : > /tmp/deno-check.log
          while IFS= read -r file; do
            echo "deno check $file" | tee -a /tmp/deno-check.log
            set +e
            deno check "$file" >> /tmp/deno-check.log 2>&1
            status=$?
            set -e
            if [ "$status" -ne 0 ]; then
              echo "--- Deno check failure ---"
              tail -n 160 /tmp/deno-check.log
              exit "$status"
            fi
          done < /tmp/edge-files.txt
          tail -n 40 /tmp/deno-check.log

      - name: Guard changed SQL migrations
        shell: bash
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          set -euo pipefail
          if [ -n "${BASE_SHA:-}" ]; then
            git diff --name-only "$BASE_SHA"...HEAD -- supabase/migrations \
              | grep -E '\.sql$' > /tmp/migration-files.txt || true
          else
            find supabase/migrations -type f -name '*.sql' -print \
              > /tmp/migration-files.txt
          fi

          if [ ! -s /tmp/migration-files.txt ]; then
            echo "SQL migrations were not changed."
            exit 0
          fi

          while IFS= read -r file; do
            test -s "$file"
            if grep -nE '^(<<<<<<<|=======|>>>>>>>)' "$file"; then
              echo "Conflict marker found in $file"
              exit 1
            fi
          done < /tmp/migration-files.txt

      - name: Upload failing Deno log
        if: failure() && steps.edge-check.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: deno-check-log
          path: /tmp/deno-check.log
          if-no-files-found: error
          retention-days: 3
