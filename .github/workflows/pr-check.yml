name: PR Check

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches:
      - main
    paths:
      - lib/**
      - test/**
      - supabase/functions/**
      - supabase/migrations/**
      - pubspec.yaml
      - pubspec.lock
      - .fvmrc
      - .github/workflows/pr-check.yml
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: appstroy-pr-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  flutter-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          show-progress: false

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version-file: .fvmrc
          cache: true

      - name: Install locked dependencies
        run: flutter pub get --enforce-lockfile >/dev/null

      - name: Analyze source
        id: analyze
        shell: bash
        run: |
          set +e
          flutter analyze --no-fatal-infos --no-fatal-warnings > /tmp/flutter-analyze.log 2>&1
          status=$?
          if [ "$status" -ne 0 ]; then
            echo "--- Flutter analyzer failure ---"
            tail -n 120 /tmp/flutter-analyze.log
            exit "$status"
          fi
          tail -n 20 /tmp/flutter-analyze.log

      - name: Run regression tests
        id: regression
        shell: bash
        run: |
          set +e
          flutter test --reporter compact > /tmp/flutter-test.log 2>&1
          status=$?
          if [ "$status" -ne 0 ]; then
            echo "--- Flutter test failure (last 180 lines) ---"
            tail -n 180 /tmp/flutter-test.log
            exit "$status"
          fi
          tail -n 20 /tmp/flutter-test.log

      - name: Build web release
        run: flutter build web --release --base-href /appstroy-web/

      - name: Upload failing analyzer log
        if: failure() && steps.analyze.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: flutter-analyze-log
          path: /tmp/flutter-analyze.log
          if-no-files-found: error
          retention-days: 3

      - name: Upload failing test log
        if: failure() && steps.regression.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: flutter-test-log
          path: /tmp/flutter-test.log
          if-no-files-found: error
          retention-days: 3

  backend-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source with history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          show-progress: false

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Check changed Edge Functions
        shell: bash
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          set -euo pipefail
          if [ -n "${BASE_SHA:-}" ]; then
            git diff --name-only "$BASE_SHA"...HEAD -- supabase/functions \
              | grep -E '\.tsx?$' > /tmp/edge-files.txt || true
          else
            find supabase/functions -type f -name '*.ts' -print \
              > /tmp/edge-files.txt
          fi

          if [ ! -s /tmp/edge-files.txt ]; then
            echo "Edge Functions were not changed."
            exit 0
          fi

          while IFS= read -r file; do
            echo "deno check $file"
            deno check "$file"
          done < /tmp/edge-files.txt

      - name: Guard changed SQL migrations
        shell: bash
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          set -euo pipefail
          if [ -n "${BASE_SHA:-}" ]; then
            git diff --name-only "$BASE_SHA"...HEAD -- supabase/migrations \
              | grep -E '\.sql$' > /tmp/migration-files.txt || true
          else
            find supabase/migrations -type f -name '*.sql' -print \
              > /tmp/migration-files.txt
          fi

          if [ ! -s /tmp/migration-files.txt ]; then
            echo "SQL migrations were not changed."
            exit 0
          fi

          while IFS= read -r file; do
            test -s "$file"
            if grep -nE '^(<<<<<<<|=======|>>>>>>>)' "$file"; then
              echo "Conflict marker found in $file"
              exit 1
            fi
          done < /tmp/migration-files.txt
