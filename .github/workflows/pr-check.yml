name: Update company functional contracts

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main
    paths:
      - lib/**
      - test/**
      - .github/workflows/pr-check.yml

permissions:
  contents: write

concurrency:
  group: appstroy-company-contract-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  apply:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Move legacy checks to preserved mobile screen
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('test/functional_contract_test.dart')
          text = path.read_text(encoding='utf-8')
          old = 'lib/features/company/presentation/company_management_screen.dart'
          new = 'lib/features/company/presentation/mobile_company_management_screen.dart'
          count = text.count(old)
          if count != 3:
              raise SystemExit(f'Expected 3 company management contract paths, got {count}')
          path.write_text(text.replace(old, new), encoding='utf-8')
          PY

          git show origin/main:.github/workflows/pr-check.yml > .github/workflows/pr-check.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add test/functional_contract_test.dart .github/workflows/pr-check.yml
          git commit -m "обновлён функциональный контракт мобильного экрана компании"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
