name: Apply specialist desktop fix

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main
    paths:
      - lib/**
      - test/**
      - .github/workflows/pr-check.yml

permissions:
  contents: write

concurrency:
  group: appstroy-specialist-fix-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  apply:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Apply exact legal status fix and restore CI
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('lib/features/legal/presentation/adaptive_legal_documents_screen.dart')
          text = path.read_text(encoding='utf-8')

          active_token = 'LegalDocumentStatus.active'
          if text.count(active_token) != 2:
              raise SystemExit(f'Expected two active status references, got {text.count(active_token)}')

          text = text.replace(
              'LegalDocumentStatus.signed ||\n        document.status == LegalDocumentStatus.active',
              'LegalDocumentStatus.signed',
          )
          text = text.replace(
              'item.status == LegalDocumentStatus.signed ||\n              item.status == LegalDocumentStatus.active',
              'item.status == LegalDocumentStatus.signed',
          )

          if active_token in text:
              raise SystemExit('Active status reference remained after patch')

          path.write_text(text, encoding='utf-8')
          PY

          git show origin/main:.github/workflows/pr-check.yml > .github/workflows/pr-check.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add lib/features/legal/presentation/adaptive_legal_documents_screen.dart .github/workflows/pr-check.yml
          git commit -m "исправлен статус юридических документов"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
