name: Validate developer panel

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: read

concurrency:
  group: developer-panel-validation-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  validate:
    if: github.head_ref == 'agent/developer-panel-object-policies'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          show-progress: false

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version-file: .fvmrc
          cache: true

      - name: Install locked dependencies
        run: flutter pub get --enforce-lockfile >/dev/null

      - name: Analyze source
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Run regression tests
        run: flutter test --reporter compact

      - name: Build web release
        run: flutter build web --release --base-href /appstroy-web/

      - name: Check patch quality
        run: git diff --check
