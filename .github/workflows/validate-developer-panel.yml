name: Validate developer panel

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: developer-panel-validation-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  validate:
    if: github.head_ref == 'agent/developer-panel-object-policies'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          show-progress: false

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version-file: .fvmrc
          cache: true

      - name: Install locked dependencies
        run: flutter pub get --enforce-lockfile >/dev/null

      - name: Analyze source
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Run regression tests
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set +e
          flutter test --reporter compact > /tmp/flutter-test.log 2>&1
          status=$?
          cat /tmp/flutter-test.log
          if (( status != 0 )); then
            {
              echo '### Упавшие регрессионные тесты'
              echo
              echo '```text'
              tail -n 180 /tmp/flutter-test.log
              echo '```'
            } > /tmp/flutter-test-comment.md
            gh pr comment "$PR_NUMBER" --body-file /tmp/flutter-test-comment.md
            exit "$status"
          fi

      - name: Build web release
        run: flutter build web --release --base-href /appstroy-web/

      - name: Check patch quality
        run: git diff --check
