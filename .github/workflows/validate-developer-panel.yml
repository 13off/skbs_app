name: Validate developer panel

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: developer-panel-validation-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  validate:
    if: github.head_ref == 'agent/developer-panel-object-policies'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: agent/developer-panel-object-policies
          fetch-depth: 0
          show-progress: false
          persist-credentials: true

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version-file: .fvmrc
          cache: true

      - name: Install locked dependencies
        run: flutter pub get --enforce-lockfile >/dev/null

      - name: Analyze source
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Run regression tests
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set +e
          flutter test --reporter compact > /tmp/flutter-test.log 2>&1
          status=$?
          cat /tmp/flutter-test.log
          if (( status != 0 )); then
            tail -n 220 /tmp/flutter-test.log > tool/developer_panel_test_failure.log
            {
              echo '### Упавшие регрессионные тесты'
              echo
              echo 'Точный отчёт сохранён в `tool/developer_panel_test_failure.log`.'
            } > /tmp/flutter-test-comment.md
            gh pr comment "$PR_NUMBER" --body-file /tmp/flutter-test-comment.md
            git config user.name "AppStroy Automation"
            git config user.email "actions@users.noreply.github.com"
            git add tool/developer_panel_test_failure.log
            git commit -m "Сохранить отчёт упавших тестов" || true
            git push origin HEAD:agent/developer-panel-object-policies || true
            exit "$status"
          fi
          rm -f tool/developer_panel_test_failure.log

      - name: Build web release
        run: flutter build web --release --base-href /appstroy-web/

      - name: Check patch quality
        run: git diff --check
