name: Refresh Flutter dependency lock

on:
  push:
    branches:
      - main
    paths:
      - pubspec.yaml
      - .fvmrc
      - .github/workflows/refresh-toolchain-lock.yml
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: appstroy-toolchain-lock
  cancel-in-progress: true

jobs:
  refresh-lock:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup pinned Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version-file: .fvmrc
          cache: true

      - name: Resolve dependencies
        run: flutter pub get

      - name: Verify tests with resolved dependencies
        run: flutter test

      - name: Commit lockfile when changed
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f pubspec.lock
          if git diff --cached --quiet; then
            echo "pubspec.lock is already current"
            exit 0
          fi
          git commit -m "зафиксированы версии Flutter зависимостей"
          git push
