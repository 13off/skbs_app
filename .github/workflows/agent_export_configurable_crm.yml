name: Agent diagnose configurable CRM

on:
  pull_request:
    branches:
      - main
    types:
      - reopened

permissions:
  contents: write

jobs:
  diagnose:
    if: github.head_ref == 'agent/configurable-recruitment-crm'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/configurable-recruitment-crm
          fetch-depth: 0
          show-progress: false

      - name: Record package part fingerprints
        shell: bash
        run: |
          set -euo pipefail
          {
            sha256sum .agent/configurable_crm_part_*
            wc -c .agent/configurable_crm_part_*
          } > .agent/remote_hashes.txt

      - name: Commit diagnostics
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "appstroy-agent"
          git config user.email "appstroy-agent@users.noreply.github.com"
          git add .agent/remote_hashes.txt
          git commit -m "Зафиксировать диагностику пакета CRM"
          git push origin HEAD:agent/configurable-recruitment-crm
