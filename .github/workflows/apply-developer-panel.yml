name: Apply developer panel

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'agent/developer-panel-object-policies'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
          persist-credentials: true

      - name: Apply guarded source patches
        id: patch
        shell: bash
        run: |
          rm -f tool/developer_panel_patch_failure.log
          set +e
          python tool/apply_developer_panel.py > tool/developer_panel_patch_failure.log 2>&1
          status=$?
          cat tool/developer_panel_patch_failure.log
          if (( status != 0 )); then
            git config user.name "AppStroy Automation"
            git config user.email "actions@users.noreply.github.com"
            git add tool/developer_panel_patch_failure.log
            git commit -m "Сохранить ошибку интеграции панели" || true
            git push origin HEAD:agent/developer-panel-object-policies || true
            exit "$status"
          fi
          rm -f tool/developer_panel_patch_failure.log

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Resolve packages
        run: flutter pub get

      - name: Format changed Dart files
        shell: bash
        run: |
          mapfile -t files < <(git diff --name-only -- '*.dart')
          if (( ${#files[@]} )); then
            dart format "${files[@]}"
          fi

      - name: Analyze application
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Check patch quality
        run: git diff --check

      - name: Commit integrated feature
        shell: bash
        run: |
          rm -f tool/apply_developer_panel.py .github/workflows/apply-developer-panel.yml
          git config user.name "AppStroy Automation"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git commit -m "Добавить панель разработчика и объектные ограничения"
          git push origin HEAD:agent/developer-panel-object-policies
