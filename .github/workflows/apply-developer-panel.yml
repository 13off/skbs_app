name: Apply developer panel

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write
  pull-requests: write

jobs:
  apply:
    if: github.head_ref == 'agent/developer-panel-object-policies'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
          persist-credentials: true

      - name: Refine guarded patch
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('tool/apply_developer_panel.py')
          text = path.read_text(encoding='utf-8')
          text = text.replace('from pathlib import Path\n', 'from pathlib import Path\nimport re\n', 1)
          old_function = '''def replace_once(path: str, old: str, new: str) -> None:
              content = read(path)
              count = content.count(old)
              if count != 1:
                  raise RuntimeError(f'{path}: expected one match, got {count}: {old[:100]!r}')
              write(path, content.replace(old, new, 1))
          '''
          new_function = '''def replace_once(path: str, old: str, new: str) -> None:
              content = read(path)
              count = content.count(old)
              if count == 1:
                  write(path, content.replace(old, new, 1))
                  return
              if count > 1:
                  raise RuntimeError(f'{path}: expected one match, got {count}: {old[:100]!r}')
              pattern_lines = []
              for line in old.split('\\n'):
                  stripped = line.lstrip(' \\t')
                  prefix = r'[ \\t]*' if stripped != line else ''
                  pattern_lines.append(prefix + re.escape(stripped))
              matches = list(re.finditer('\\n'.join(pattern_lines), content))
              if len(matches) != 1:
                  raise RuntimeError(
                      f'{path}: expected one indentation-tolerant match, got {len(matches)}: {old[:100]!r}'
                  )
              match = matches[0]
              write(path, content[:match.start()] + new + content[match.end():])
          '''
          if old_function not in text:
              raise SystemExit('Не найдена функция защитной замены')
          text = text.replace(old_function, new_function, 1)

          first = '''replace_once(
              'lib/features/company/data/company_repository.dart',
              "    required String role,\\n    String? objectId,\\n  }) async {",
              "    required String role,\\n    String profession = '',\\n    String? objectId,\\n  }) async {",
          )'''
          replacement = '''replace_all(
              'lib/features/company/data/company_repository.dart',
              "    required String role,\\n    String? objectId,\\n  }) async {",
              "    required String role,\\n    String profession = '',\\n    String? objectId,\\n  }) async {",
              minimum=2,
          )'''
          second = '''replace_once(
              'lib/features/company/data/company_repository.dart',
              "    required String role,\\n    String? objectId,\\n  }) async {\\n    await _client\\n",
              "    required String role,\\n    String profession = '',\\n    String? objectId,\\n  }) async {\\n    await _client\\n",
          )
          '''
          if first not in text or second not in text:
              raise SystemExit('Не найден защитный блок сигнатур')
          text = text.replace(first, replacement, 1).replace(second, '', 1)

          ambiguous = '''replace_once(path, "               enabled: !isSaving && canEdit,", "               enabled: !isSaving && canEditStatus,")'''
          precise = '''replace_once(
              path,
              "              controller: notDoneCommentController,\\n              enabled: !isSaving && canEdit,",
              "              controller: notDoneCommentController,\\n              enabled: !isSaving && canEditStatus,",
          )'''
          if ambiguous not in text:
              raise SystemExit('Не найден неоднозначный блок комментария задачи')
          text = text.replace(ambiguous, precise, 1)

          ambiguous_fields = '''replace_all(path, "             enabled: !isSaving && canEdit,", "             enabled: !isSaving && canEditAxesWork,", minimum=2)'''
          precise_fields = '''replace_once(
              path,
              "            controller: axesController,\\n            enabled: !isSaving && canEdit,",
              "            controller: axesController,\\n            enabled: !isSaving && canEditAxesWork,",
          )
          replace_once(
              path,
              "              controller: workController,\\n              enabled: !isSaving && canEdit,",
              "              controller: workController,\\n              enabled: !isSaving && canEditAxesWork,",
          )'''
          if ambiguous_fields not in text:
              raise SystemExit('Не найден неоднозначный блок полей задачи')
          text = text.replace(ambiguous_fields, precise_fields, 1)
          path.write_text(text, encoding='utf-8')
          PY

      - name: Apply guarded source patches
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set +e
          python tool/apply_developer_panel.py > /tmp/developer_panel_patch.log 2>&1
          status=$?
          cat /tmp/developer_panel_patch.log
          if (( status != 0 )); then
            {
              echo '### Ошибка защитной интеграции'
              echo
              echo '```text'
              cat /tmp/developer_panel_patch.log
              echo '```'
            } > /tmp/developer_panel_comment.md
            gh pr comment "$PR_NUMBER" --body-file /tmp/developer_panel_comment.md
            exit "$status"
          fi

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Resolve packages
        run: flutter pub get

      - name: Format changed Dart files
        shell: bash
        run: |
          mapfile -t files < <(git diff --name-only -- '*.dart')
          if (( ${#files[@]} )); then
            dart format "${files[@]}"
          fi

      - name: Analyze application
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set +e
          flutter analyze --no-fatal-infos --no-fatal-warnings > /tmp/developer_panel_analyze.log 2>&1
          status=$?
          cat /tmp/developer_panel_analyze.log
          if (( status != 0 )); then
            grep -E '(^|[[:space:]])(error|warning) •' /tmp/developer_panel_analyze.log > /tmp/developer_panel_analyze_short.log || true
            if [[ ! -s /tmp/developer_panel_analyze_short.log ]]; then
              tail -n 100 /tmp/developer_panel_analyze.log > /tmp/developer_panel_analyze_short.log
            fi
            {
              echo '### Ошибки Flutter analyzer'
              echo
              echo '```text'
              cat /tmp/developer_panel_analyze_short.log
              echo '```'
            } > /tmp/developer_panel_analyze_comment.md
            gh pr comment "$PR_NUMBER" --body-file /tmp/developer_panel_analyze_comment.md
            exit "$status"
          fi

      - name: Check patch quality
        run: git diff --check

      - name: Commit integrated feature
        shell: bash
        run: |
          rm -f tool/apply_developer_panel.py .github/workflows/apply-developer-panel.yml
          git config user.name "AppStroy Automation"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git commit -m "Добавить панель разработчика и объектные ограничения"
          git push origin HEAD:agent/developer-panel-object-policies
