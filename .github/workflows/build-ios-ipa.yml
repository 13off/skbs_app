name: Build iOS IPA

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-ios-ipa:
    runs-on: macos-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Checkout download repository
        uses: actions/checkout@v4
        with:
          repository: 13off/appstroy-web
          token: ${{ secrets.WEB_DEPLOY_TOKEN }}
          path: appstroy-web

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version-file: .fvmrc
          cache: true

      - name: Install locked dependencies
        run: dart pub get --enforce-lockfile

      - name: Run regression tests
        run: flutter test

      - name: Analyze source
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Prepare iOS app
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          project = Path('ios/Runner.xcodeproj/project.pbxproj')
          text = project.read_text(encoding='utf-8')
          text = text.replace('com.example.skbsApp', 'ru.appstroy.mobile')
          project.write_text(text, encoding='utf-8')
          PY
          /usr/libexec/PlistBuddy -c "Set :CFBundleDisplayName AppСтрой" ios/Runner/Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleName AppStroy" ios/Runner/Info.plist

      - name: Build unsigned app
        shell: bash
        run: |
          flutter build ios --release --no-codesign --dart-define=SUPABASE_URL=https://api.appstroy-web.ru

      - name: Create IPA
        shell: bash
        run: |
          SHORT_SHA="$(git rev-parse --short=12 HEAD)"
          mkdir -p ios-output/Payload
          cp -R build/ios/iphoneos/Runner.app ios-output/Payload/AppStroy.app
          cd ios-output
          zip -qry "AppStroy-${SHORT_SHA}.ipa" Payload
          cp "AppStroy-${SHORT_SHA}.ipa" AppStroy-latest.ipa
          rm -rf Payload
          shasum -a 256 AppStroy-latest.ipa > AppStroy-iOS-latest.sha256

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: AppStroy-iOS-IPA
          path: ios-output/
          retention-days: 30

      - name: Publish IPA
        shell: bash
        run: |
          cd appstroy-web
          git pull --rebase
          cd ..
          mkdir -p appstroy-web/downloads
          rm -f appstroy-web/downloads/AppStroy-*.ipa
          cp ios-output/AppStroy-*.ipa appstroy-web/downloads/
          cp ios-output/AppStroy-iOS-latest.sha256 appstroy-web/downloads/
          printf '%s\n' "$(git rev-parse HEAD)" > appstroy-web/downloads/ios-source-commit.txt
          printf 'success\n' > appstroy-web/downloads/ios-build-status.txt
          cd appstroy-web
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add downloads
          git commit -m "опубликована IPA для установки на iPhone"
          git push
