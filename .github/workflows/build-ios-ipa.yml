name: Build iOS IPA

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ios/**
      - lib/**
      - test/**
      - pubspec.yaml
      - pubspec.lock
      - .fvmrc
      - .github/workflows/build-ios-ipa.yml

permissions:
  contents: read

concurrency:
  group: appstroy-ios-ipa
  cancel-in-progress: true

env:
  FIREBASE_API_KEY: ${{ vars.FIREBASE_API_KEY }}
  FIREBASE_PROJECT_ID: ${{ vars.FIREBASE_PROJECT_ID }}
  FIREBASE_MESSAGING_SENDER_ID: ${{ vars.FIREBASE_MESSAGING_SENDER_ID }}
  FIREBASE_AUTH_DOMAIN: ${{ vars.FIREBASE_AUTH_DOMAIN }}
  FIREBASE_STORAGE_BUCKET: ${{ vars.FIREBASE_STORAGE_BUCKET }}
  FIREBASE_WEB_APP_ID: ${{ vars.FIREBASE_WEB_APP_ID }}
  FIREBASE_ANDROID_APP_ID: ${{ vars.FIREBASE_ANDROID_APP_ID }}
  FIREBASE_IOS_APP_ID: ${{ vars.FIREBASE_IOS_APP_ID }}
  FIREBASE_VAPID_KEY: ${{ vars.FIREBASE_VAPID_KEY }}

jobs:
  build-ios-ipa:
    runs-on: macos-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Checkout download repository
        uses: actions/checkout@v4
        with:
          repository: 13off/appstroy-web
          token: ${{ secrets.WEB_DEPLOY_TOKEN }}
          path: appstroy-web

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version-file: .fvmrc
          cache: true

      - name: Install locked dependencies
        run: flutter pub get --enforce-lockfile

      - name: Prepare iOS app
        id: ios_prepare
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          python3 - <<'PY' 2>&1 | tee ios-prepare.log
          from pathlib import Path

          project = Path('ios/Runner.xcodeproj/project.pbxproj')
          text = project.read_text(encoding='utf-8')
          old_bundle_count = text.count('com.example.skbsApp')
          text = text.replace('com.example.skbsApp', 'ru.appstroy.mobile')

          old_target_count = text.count('IPHONEOS_DEPLOYMENT_TARGET = 13.0;')
          text = text.replace(
              'IPHONEOS_DEPLOYMENT_TARGET = 13.0;',
              'IPHONEOS_DEPLOYMENT_TARGET = 15.0;',
          )

          entitlement_line = 'CODE_SIGN_ENTITLEMENTS = Runner/Runner.entitlements;'
          if entitlement_line not in text:
              info_line = 'INFOPLIST_FILE = Runner/Info.plist;'
              info_count = text.count(info_line)
              text = text.replace(
                  info_line,
                  entitlement_line + '\n\t\t\t\t' + info_line,
              )
          else:
              info_count = 0

          new_bundle_count = text.count(
              'PRODUCT_BUNDLE_IDENTIFIER = ru.appstroy.mobile;'
          )
          new_target_count = text.count(
              'IPHONEOS_DEPLOYMENT_TARGET = 15.0;'
          )
          entitlement_count = text.count(entitlement_line)

          print(f'Old bundle replacements: {old_bundle_count}')
          print(f'New bundle settings: {new_bundle_count}')
          print(f'Old iOS 13 targets replaced: {old_target_count}')
          print(f'New iOS 15 targets: {new_target_count}')
          print(f'Info.plist settings patched: {info_count}')
          print(f'Entitlement settings: {entitlement_count}')

          if new_bundle_count == 0:
              raise SystemExit('iOS bundle identifier was not updated')
          if new_target_count == 0:
              raise SystemExit('iOS deployment target was not raised to 15.0')
          if entitlement_count == 0:
              raise SystemExit('Runner.entitlements was not connected')

          project.write_text(text, encoding='utf-8')
          print('Prepared ru.appstroy.mobile for iOS 15 with Runner.entitlements')
          PY

      - name: Build unsigned app
        if: always() && steps.ios_prepare.outcome == 'success'
        id: ios_build
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          flutter build ios --release --no-codesign \
            --dart-define=SUPABASE_URL=https://api.appstroy-web.ru \
            --dart-define=FIREBASE_API_KEY="$FIREBASE_API_KEY" \
            --dart-define=FIREBASE_PROJECT_ID="$FIREBASE_PROJECT_ID" \
            --dart-define=FIREBASE_MESSAGING_SENDER_ID="$FIREBASE_MESSAGING_SENDER_ID" \
            --dart-define=FIREBASE_AUTH_DOMAIN="$FIREBASE_AUTH_DOMAIN" \
            --dart-define=FIREBASE_STORAGE_BUCKET="$FIREBASE_STORAGE_BUCKET" \
            --dart-define=FIREBASE_WEB_APP_ID="$FIREBASE_WEB_APP_ID" \
            --dart-define=FIREBASE_ANDROID_APP_ID="$FIREBASE_ANDROID_APP_ID" \
            --dart-define=FIREBASE_IOS_APP_ID="$FIREBASE_IOS_APP_ID" \
            --dart-define=FIREBASE_VAPID_KEY="$FIREBASE_VAPID_KEY" \
            2>&1 | tee ios-build.log

      - name: Create IPA
        if: always() && steps.ios_prepare.outcome == 'success' && steps.ios_build.outcome == 'success'
        shell: bash
        run: |
          SHORT_SHA="$(git rev-parse --short=12 HEAD)"
          mkdir -p ios-output/Payload
          cp -R build/ios/iphoneos/Runner.app ios-output/Payload/AppStroy.app
          cd ios-output
          zip -qry "AppStroy-${SHORT_SHA}.ipa" Payload
          cp "AppStroy-${SHORT_SHA}.ipa" AppStroy-latest.ipa
          rm -rf Payload
          shasum -a 256 AppStroy-latest.ipa > AppStroy-iOS-latest.sha256

      - name: Upload IPA artifact
        if: always() && steps.ios_prepare.outcome == 'success' && steps.ios_build.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: AppStroy-iOS-IPA
          path: ios-output/
          retention-days: 30

      - name: Publish final iOS build result
        if: always()
        shell: bash
        run: |
          cd appstroy-web
          git pull --rebase
          cd ..
          mkdir -p appstroy-web/downloads
          test -f ios-prepare.log || printf 'Prepare step did not produce a log\n' > ios-prepare.log
          test -f ios-build.log || printf 'Xcode build was not started\n' > ios-build.log
          cp ios-prepare.log appstroy-web/downloads/ios-prepare.log
          cp ios-build.log appstroy-web/downloads/ios-build.log
          printf '%s\n' "$(git rev-parse HEAD)" > appstroy-web/downloads/ios-source-commit.txt

          if [ "${{ steps.ios_prepare.outcome }}" = "success" ] && \
             [ "${{ steps.ios_build.outcome }}" = "success" ]; then
            rm -f appstroy-web/downloads/AppStroy-*.ipa
            cp ios-output/AppStroy-*.ipa appstroy-web/downloads/
            cp ios-output/AppStroy-iOS-latest.sha256 appstroy-web/downloads/
            printf 'success\n' > appstroy-web/downloads/ios-build-status.txt
          else
            printf 'failure\n' > appstroy-web/downloads/ios-build-status.txt
          fi

          cd appstroy-web
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add downloads
          if ! git diff --cached --quiet; then
            if [ "${{ steps.ios_prepare.outcome }}" = "success" ] && \
               [ "${{ steps.ios_build.outcome }}" = "success" ]; then
              git commit -m "опубликована проверочная IPA для iPhone"
            else
              git commit -m "сохранена ошибка сборки iOS"
            fi
            git pull --rebase
            git push
          fi

      - name: Fail workflow when iOS build failed
        if: steps.ios_prepare.outcome != 'success' || steps.ios_build.outcome != 'success'
        run: exit 1
