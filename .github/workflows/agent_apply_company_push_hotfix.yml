name: Agent apply company and push hotfix

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'agent/hotfix-company-web-push'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/hotfix-company-web-push
          fetch-depth: 0
          show-progress: false

      - name: Verify and apply audited hotfix
        shell: bash
        run: |
          set -euo pipefail
          cat .agent/hotfix_part_00 .agent/hotfix_part_01 > /tmp/hotfix.tar.gz.b64
          actual_size="$(wc -c < /tmp/hotfix.tar.gz.b64 | tr -d ' ')"
          test "$actual_size" = "15300"
          base64 --decode /tmp/hotfix.tar.gz.b64 > /tmp/hotfix.tar.gz
          echo "f276c59281df6df3ebf17cae961d53a6823e343c1704773ffb57e088f764947f  /tmp/hotfix.tar.gz" | sha256sum --check --strict
          tar -tzf /tmp/hotfix.tar.gz >/dev/null
          tar -xzf /tmp/hotfix.tar.gz
          rm -rf .agent
          rm -f .github/workflows/agent_apply_company_push_hotfix.yml
          git diff --check

      - name: Commit source changes
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "appstroy-agent"
          git config user.email "appstroy-agent@users.noreply.github.com"
          git add -A
          git commit -m "Исправить загрузку компании и регистрацию Web Push [agent-hotfix]"
          git push origin HEAD:agent/hotfix-company-web-push
