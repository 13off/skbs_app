name: Normalize archive payment contract

on:
  pull_request:
    branches:
      - main
    types:
      - reopened
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: normalize-archive-payment-contract
  cancel-in-progress: true

jobs:
  normalize-test-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout fix branch
        uses: actions/checkout@v4
        with:
          ref: fix/archive-payments-unified-pages
          fetch-depth: 0
          persist-credentials: true

      - name: Restore contract from main with four exact changes
        shell: bash
        run: |
          git fetch origin main
          git show origin/main:test/functional_contract_test.dart > test/functional_contract_test.dart
          python3 - <<'PY'
          from pathlib import Path

          path = Path('test/functional_contract_test.dart')
          text = path.read_text(encoding='utf-8')
          replacements = [
              ("title: const Text('Табель')", "title: 'Табель'"),
              ('RepaintBoundary(child: buildEmployeeRow(employee))', 'child: buildEmployeeRow(employee)'),
              ('PremiumBrandMark(size: 52, animate: false)', 'AppPageHeader('),
              ("'Рабочая сводка'", "title: 'Главная'"),
          ]
          for old, new in replacements:
              count = text.count(old)
              if count != 1:
                  raise RuntimeError(f'Маркер {old!r}: ожидалось 1, найдено {count}')
              text = text.replace(old, new, 1)
          path.write_text(text, encoding='utf-8')
          PY

      - name: Commit normalized contract
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add test/functional_contract_test.dart
          git commit -m "нормализован функциональный контракт без лишнего diff"
          git push origin HEAD:fix/archive-payments-unified-pages

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version-file: .fvmrc
          cache: true

      - name: Install locked dependencies
        run: flutter pub get --enforce-lockfile

      - name: Validate final branch
        run: |
          flutter test
          flutter analyze --no-fatal-infos --no-fatal-warnings
          flutter build web --release --base-href /appstroy-web/

      - name: Remove temporary workflow
        shell: bash
        run: |
          rm -f .github/workflows/normalize-archive-payment-contract.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "завершена финальная проверка архива выплат и страниц"
          git push origin HEAD:fix/archive-payments-unified-pages
