name: Apply task goal linking

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/apply-task-goal-linking.yml

permissions:
  contents: write

concurrency:
  group: appstroy-task-goal-linking-main
  cancel-in-progress: true

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: feature/task-goal-linking
          fetch-depth: 0

      - name: Apply patch to feature branch
        run: |
          python3 tool/apply_task_goal_linking.py
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "привязка цели и чек-лист добавлены в задачи"
          git push origin HEAD:feature/task-goal-linking

      - name: Remove temporary workflow from main
        run: |
          git fetch origin main
          git checkout -B main origin/main
          git rm .github/workflows/apply-task-goal-linking.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "удалён временный запуск патча целей задач"
          git push origin main
