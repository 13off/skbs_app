name: Invite production smoke

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main
    paths:
      - .github/workflows/invite-production-smoke.yml

permissions:
  contents: read

jobs:
  invite-route:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check production invitation routes
        shell: bash
        run: |
          set -Eeuo pipefail

          REPORT_DIR=/tmp/invite-smoke
          mkdir -p "$REPORT_DIR"

          COMPANY_ID="00000000-0000-0000-0000-000000000001"
          TOKEN_HASH="production-smoke-token-not-for-verification"
          STATIC_URL="https://api.appstroy-web.ru/app/invite.html?companyInvite=${COMPANY_ID}&inviteTokenHash=${TOKEN_HASH}&inviteType=invite"
          EDGE_URL="https://api.appstroy-web.ru/functions/v1/invite-landing/invite.html?companyInvite=${COMPANY_ID}&inviteTokenHash=${TOKEN_HASH}&inviteType=invite"
          DIRECT_URL="https://dxbrhsefgxcaxzmrbfrb.supabase.co/functions/v1/invite-landing/invite.html?companyInvite=${COMPANY_ID}&inviteTokenHash=${TOKEN_HASH}&inviteType=invite"

          request() {
            local name="$1"
            local url="$2"
            curl --silent --show-error \
              --connect-timeout 10 --max-time 30 \
              --dump-header "$REPORT_DIR/${name}-headers.txt" \
              --output "$REPORT_DIR/${name}-body.txt" \
              --write-out '%{http_code}' \
              "$url"
          }

          echo '=== Static /app/invite.html ==='
          static_status=$(request static "$STATIC_URL")
          echo "status=${static_status}"
          cat "$REPORT_DIR/static-headers.txt"
          test "$static_status" = "200"
          tr -d '\r' < "$REPORT_DIR/static-headers.txt" | grep -Eiq '^content-type: text/html([;]|$)'
          grep -Fq '–í–ĺ–Ļ—ā–ł –≤ App–°—ā—Ä–ĺ–Ļ' "$REPORT_DIR/static-body.txt"
          grep -Fq '/auth/v1/verify' "$REPORT_DIR/static-body.txt"
          grep -Fq "accept.addEventListener('click', acceptInvitation)" "$REPORT_DIR/static-body.txt"
          if grep -Fq '&lt;!DOCTYPE html&gt;' "$REPORT_DIR/static-body.txt"; then
            echo 'Static HTML returned as escaped text'
            exit 1
          fi

          echo '=== Edge landing through proxy (diagnostic) ==='
          edge_status=$(request edge "$EDGE_URL")
          echo "status=${edge_status}"
          cat "$REPORT_DIR/edge-headers.txt"

          echo '=== Edge landing direct (diagnostic) ==='
          direct_status=$(request direct "$DIRECT_URL")
          echo "status=${direct_status}"
          cat "$REPORT_DIR/direct-headers.txt"

          echo '=== proxy: Auth health ==='
          auth_status=$(request auth-health 'https://api.appstroy-web.ru/auth/v1/health')
          echo "status=${auth_status}"
          cat "$REPORT_DIR/auth-health-body.txt"
          test "$auth_status" = "200"

          echo '=== proxy: REST route reaches Supabase ==='
          rest_status=$(request rest 'https://api.appstroy-web.ru/rest/v1/')
          echo "status=${rest_status}"
          cat "$REPORT_DIR/rest-body.txt"
          case "$rest_status" in
            401|403) ;;
            *) echo "Unexpected REST status: ${rest_status}"; exit 1 ;;
          esac

          echo 'Static invitation route is production-ready.'

      - name: Upload smoke report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: invite-production-smoke
          path: /tmp/invite-smoke
          if-no-files-found: warn
          retention-days: 3
