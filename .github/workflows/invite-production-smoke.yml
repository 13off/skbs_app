name: Invite production smoke

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main
    paths:
      - .github/workflows/invite-production-smoke.yml

permissions:
  contents: read

jobs:
  invite-route:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check production invitation routes
        shell: bash
        run: |
          set -Eeuo pipefail

          REPORT_DIR=/tmp/invite-smoke
          mkdir -p "$REPORT_DIR"

          COMPANY_ID="00000000-0000-0000-0000-000000000001"
          TOKEN_HASH="production-smoke-token-not-for-verification"
          PUBLISHABLE_KEY="sb_publishable_QBdH-vIQv4F_tVVNc4Ps_w_ssxwSaEm"
          STATIC_URL="https://13off.github.io/appstroy-web/invite.html?companyInvite=${COMPANY_ID}&inviteTokenHash=${TOKEN_HASH}&inviteType=invite"
          EDGE_URL="https://api.appstroy-web.ru/functions/v1/invite-landing/invite.html?companyInvite=${COMPANY_ID}&inviteTokenHash=${TOKEN_HASH}&inviteType=invite"

          request() {
            local name="$1"
            local url="$2"
            curl --silent --show-error \
              --connect-timeout 10 --max-time 30 \
              --dump-header "$REPORT_DIR/${name}-headers.txt" \
              --output "$REPORT_DIR/${name}-body.txt" \
              --write-out '%{http_code}' \
              "$url"
          }

          echo '=== GitHub Pages invite.html ==='
          static_status=$(request static "$STATIC_URL")
          echo "status=${static_status}"
          cat "$REPORT_DIR/static-headers.txt"
          test "$static_status" = "200"
          tr -d '\r' < "$REPORT_DIR/static-headers.txt" | grep -Eiq '^content-type: text/html([;]|$)'
          grep -Fq 'Войти в AppСтрой' "$REPORT_DIR/static-body.txt"
          grep -Fq '/auth/v1/verify' "$REPORT_DIR/static-body.txt"
          grep -Fq "accept.addEventListener('click', acceptInvitation)" "$REPORT_DIR/static-body.txt"
          grep -Fq "const supabaseUrl = 'https://api.appstroy-web.ru'" "$REPORT_DIR/static-body.txt"
          if grep -Fq '&lt;!DOCTYPE html&gt;' "$REPORT_DIR/static-body.txt"; then
            echo 'Static HTML returned as escaped text'
            exit 1
          fi

          echo '=== Edge landing through proxy (known diagnostic) ==='
          edge_status=$(request edge "$EDGE_URL")
          echo "status=${edge_status}"
          cat "$REPORT_DIR/edge-headers.txt"

          echo '=== proxy: Auth health ==='
          auth_status=$(request auth-health 'https://api.appstroy-web.ru/auth/v1/health')
          echo "status=${auth_status}"
          cat "$REPORT_DIR/auth-health-body.txt"
          test "$auth_status" = "200"

          echo '=== proxy: dummy token reaches Auth API ==='
          verify_status=$(curl --silent --show-error \
            --connect-timeout 10 --max-time 30 \
            --request POST \
            --header 'Content-Type: application/json' \
            --header "apikey: ${PUBLISHABLE_KEY}" \
            --header "Authorization: Bearer ${PUBLISHABLE_KEY}" \
            --data "{\"token_hash\":\"${TOKEN_HASH}\",\"type\":\"invite\"}" \
            --output "$REPORT_DIR/verify-body.json" \
            --write-out '%{http_code}' \
            'https://api.appstroy-web.ru/auth/v1/verify')
          echo "status=${verify_status}"
          cat "$REPORT_DIR/verify-body.json"
          case "$verify_status" in
            400|403|422) ;;
            *) echo "Unexpected verify status: ${verify_status}"; exit 1 ;;
          esac

          echo 'GitHub Pages invitation route and Russian Auth API are ready.'

      - name: Upload smoke report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: invite-production-smoke
          path: /tmp/invite-smoke
          if-no-files-found: warn
          retention-days: 3
