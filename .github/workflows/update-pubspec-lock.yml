name: Refresh Flutter lockfile

on:
  push:
    branches:
      - main
    paths:
      - pubspec.yaml
      - .fvmrc
      - .github/workflows/update-pubspec-lock.yml
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: appstroy-pubspec-lock
  cancel-in-progress: true

jobs:
  refresh-lockfile:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version-file: .fvmrc
          cache: true

      - name: Resolve dependencies
        run: flutter pub get

      - name: Commit refreshed lockfile
        shell: bash
        run: |
          if git diff --quiet -- pubspec.lock; then
            echo "pubspec.lock is already current"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pubspec.lock
          git commit -m "обновлён pubspec.lock для push-уведомлений"
          git pull --rebase
          git push
