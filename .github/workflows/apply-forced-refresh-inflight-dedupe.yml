name: Apply forced refresh inflight dedupe

on:
  pull_request:
    branches:
      - main
    paths:
      - tool/forced_refresh_inflight_dedupe.trigger

permissions:
  contents: write

concurrency:
  group: forced-refresh-dedupe-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  patch-and-validate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout pull request branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
          persist-credentials: true

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version-file: .fvmrc
          cache: true

      - name: Install locked dependencies
        run: flutter pub get --enforce-lockfile

      - name: Apply request dedupe patch
        run: python3 tool/apply_forced_refresh_inflight_dedupe.py

      - name: Format changed files
        run: |
          dart format \
            lib/data/employee_repository.dart \
            lib/data/object_repository.dart \
            lib/data/attendance_repository.dart \
            lib/data/payment_repository.dart \
            lib/data/finance_summary_repository.dart \
            test/forced_refresh_inflight_dedupe_contract_test.dart

      - name: Analyze source
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Run dedupe contract
        run: flutter test test/forced_refresh_inflight_dedupe_contract_test.dart

      - name: Remove temporary patch files
        run: |
          rm -f tool/apply_forced_refresh_inflight_dedupe.py
          rm -f tool/forced_refresh_inflight_dedupe.trigger
          rm -f .github/workflows/apply-forced-refresh-inflight-dedupe.yml

      - name: Commit validated patch
        uses: stefanzweifel/git-auto-commit-action@v6
        with:
          branch: ${{ github.head_ref }}
          commit_message: объединить параллельные принудительные запросы
          file_pattern: .
