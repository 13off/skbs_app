name: Apply AI operational prompt chips

on:
  pull_request:
    branches:
      - main
    paths:
      - tool/ai_operational_prompt_chips.trigger

permissions:
  contents: write

concurrency:
  group: ai-operational-prompts-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  patch-and-validate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout pull request branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
          persist-credentials: true

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version-file: .fvmrc
          cache: true

      - name: Install locked dependencies
        run: flutter pub get --enforce-lockfile

      - name: Apply quick prompt patch
        run: python3 tool/apply_ai_operational_prompt_chips.py

      - name: Format changed files
        run: |
          dart format \
            lib/features/ai/presentation/ai_assistant_confirmed_screen.dart \
            lib/features/ai/presentation/widgets/ai_operational_prompt_chips.dart

      - name: Analyze source
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Remove temporary patch files
        run: |
          rm -f tool/apply_ai_operational_prompt_chips.py
          rm -f tool/ai_operational_prompt_chips.trigger
          rm -f .github/workflows/apply-ai-operational-prompt-chips.yml

      - name: Commit validated patch
        uses: stefanzweifel/git-auto-commit-action@v6
        with:
          branch: ${{ github.head_ref }}
          commit_message: добавлены быстрые запросы оперативной аналитики
          file_pattern: .
