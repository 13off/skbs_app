name: Dark Theme Const Autofix

on:
  push:
    branches:
      - agent/enable-dark-theme
    paths:
      - .github/workflows/dark-theme-autofix.yml

permissions:
  contents: write

jobs:
  autofix:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: agent/enable-dark-theme
          show-progress: false
      - name: Remove const only around dynamic specialist colors
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          locations = [
              ('lib/features/accounting/presentation/adaptive_accounting_dashboard_screen.dart', 202),
              ('lib/features/accounting/presentation/adaptive_accounting_dashboard_screen.dart', 216),
              ('lib/features/accounting/presentation/adaptive_accounting_dashboard_screen.dart', 266),
              ('lib/features/accounting/presentation/adaptive_accounting_payments_screen.dart', 497),
              ('lib/features/company/presentation/desktop_company_management_screen.dart', 534),
              ('lib/features/company/presentation/desktop_company_management_screen.dart', 543),
              ('lib/features/company/presentation/desktop_company_management_screen.dart', 632),
              ('lib/features/company/presentation/desktop_company_user_dialogs.dart', 51),
              ('lib/features/company/presentation/desktop_company_user_dialogs.dart', 288),
              ('lib/features/company/presentation/desktop_company_user_dialogs.dart', 306),
              ('lib/features/company/presentation/desktop_company_user_dialogs.dart', 368),
              ('lib/features/foreman/presentation/foreman_attendance_control.dart', 44),
              ('lib/features/foreman/presentation/foreman_attendance_control.dart', 88),
              ('lib/features/foreman/presentation/foreman_home_summary_widgets.dart', 45),
              ('lib/features/foreman/presentation/foreman_home_summary_widgets.dart', 64),
              ('lib/features/foreman/presentation/foreman_home_summary_widgets.dart', 73),
              ('lib/features/foreman/presentation/foreman_home_summary_widgets.dart', 80),
              ('lib/features/foreman/presentation/foreman_home_summary_widgets.dart', 99),
              ('lib/features/foreman/presentation/foreman_home_summary_widgets.dart', 105),
              ('lib/features/foreman/presentation/foreman_task_control.dart', 73),
              ('lib/features/foreman/presentation/foreman_task_control.dart', 178),
              ('lib/features/foreman/presentation/foreman_task_filters.dart', 67),
              ('lib/features/foreman/presentation/foreman_task_filters.dart', 93),
              ('lib/features/foreman/presentation/foreman_task_filters.dart', 102),
              ('lib/features/foreman/presentation/foreman_task_filters.dart', 109),
              ('lib/features/foreman/presentation/foreman_task_filters.dart', 177),
              ('lib/features/foreman/presentation/foreman_task_filters.dart', 211),
              ('lib/features/foreman/presentation/foreman_task_filters.dart', 228),
              ('lib/features/foreman/presentation/foreman_task_filters.dart', 252),
              ('lib/features/legal/presentation/adaptive_legal_dashboard_screen.dart', 178),
              ('lib/features/legal/presentation/adaptive_legal_dashboard_screen.dart', 256),
              ('lib/features/legal/presentation/adaptive_legal_documents_screen.dart', 425),
              ('lib/features/legal/presentation/adaptive_legal_matters_screen.dart', 539),
              ('lib/features/shared/presentation/specialist_desktop_table.dart', 50),
              ('lib/features/shared/presentation/specialist_desktop_table.dart', 83),
              ('lib/features/shared/presentation/specialist_desktop_table.dart', 106),
          ]

          files = {}
          for raw_path, line_number in locations:
              path = Path(raw_path)
              lines = files.setdefault(path, path.read_text().splitlines())
              index = line_number - 1
              for cursor in range(index, max(-1, index - 30), -1):
                  if 'const ' in lines[cursor]:
                      lines[cursor] = lines[cursor].replace('const ', '', 1)
                      break
              else:
                  raise RuntimeError(f'No const expression found for {path}:{line_number}')

          for path, lines in files.items():
              path.write_text('\n'.join(lines) + '\n')

          for raw_path in [
              'lib/features/legal/presentation/adaptive_legal_documents_screen.dart',
              'lib/features/legal/presentation/adaptive_legal_matters_screen.dart',
          ]:
              path = Path(raw_path)
              text = path.read_text()
              text = text.replace(
                  'final Color color;\n\n  const _Summary({',
                  'final Color? color;\n\n  const _Summary({',
              )
              text = text.replace('    this.color = specialistMuted,\n', '    this.color,\n')
              marker = '  Widget build(BuildContext context) {\n    return Container('
              replacement = (
                  '  Widget build(BuildContext context) {\n'
                  '    final effectiveColor = color ?? specialistMuted;\n'
                  '    return Container('
              )
              summary_index = text.index('class _Summary extends StatelessWidget')
              prefix = text[:summary_index]
              summary = text[summary_index:].replace(marker, replacement, 1)
              summary = summary.replace(
                  'Icon(icon, size: 18, color: color)',
                  'Icon(icon, size: 18, color: effectiveColor)',
              )
              summary = summary.replace(
                  'style: TextStyle(color: color, fontWeight: FontWeight.w900)',
                  'style: TextStyle(color: effectiveColor, fontWeight: FontWeight.w900)',
              )
              path.write_text(prefix + summary)
          PY
      - name: Commit autofix
        shell: bash
        run: |
          if git diff --quiet; then
            echo "No changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add lib
          git commit -m "Исправить const-виджеты для динамической темы"
          git push origin HEAD:agent/enable-dark-theme
