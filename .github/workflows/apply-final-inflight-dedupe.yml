name: Apply final inflight dedupe

on:
  pull_request:
    branches:
      - main
    paths:
      - tool/final_inflight_dedupe.trigger

permissions:
  contents: write

concurrency:
  group: final-inflight-dedupe-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  patch-and-validate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout pull request branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
          persist-credentials: true

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version-file: .fvmrc
          cache: true

      - name: Install locked dependencies
        run: flutter pub get --enforce-lockfile

      - name: Apply final dedupe patch
        run: python3 tool/apply_final_inflight_dedupe.py

      - name: Format changed files
        run: |
          dart format \
            lib/data/task_repository.dart \
            lib/data/notification_repository.dart \
            test/final_inflight_dedupe_contract_test.dart

      - name: Analyze source
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Run final dedupe contract
        run: flutter test test/final_inflight_dedupe_contract_test.dart

      - name: Remove temporary patch files
        run: |
          rm -f tool/apply_final_inflight_dedupe.py
          rm -f tool/final_inflight_dedupe.trigger
          rm -f .github/workflows/apply-final-inflight-dedupe.yml

      - name: Commit validated patch
        uses: stefanzweifel/git-auto-commit-action@v6
        with:
          branch: ${{ github.head_ref }}
          commit_message: закрыть оставшиеся дубли запросов
          file_pattern: .
