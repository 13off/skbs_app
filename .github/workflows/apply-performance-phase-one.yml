name: Apply performance phase one

on:
  pull_request:
    branches:
      - main
    paths:
      - tool/performance_phase1.trigger
      - .github/workflows/apply-performance-phase-one.yml

permissions:
  contents: write

concurrency:
  group: performance-phase-one-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  apply-and-validate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout pull request branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
          persist-credentials: true

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version-file: .fvmrc
          cache: true

      - name: Install dependencies
        run: flutter pub get --enforce-lockfile

      - name: Apply validated performance patch
        shell: bash
        run: |
          echo '' | base64 -d | gzip -d > /tmp/performance_phase1.patch
          patch -p1 < /tmp/performance_phase1.patch

      - name: Format changed Dart files
        run: |
          dart format lib/data/app_data_sync.dart lib/data/notification_repository.dart lib/features/accounting/presentation/accounting_main_screen.dart lib/features/developer/data/developer_policy_repository.dart lib/features/developer/presentation/developer_main_screen.dart lib/features/foreman/presentation/foreman_desktop_tasks_screen.dart lib/features/foreman/presentation/foreman_main_screen.dart lib/features/legal/presentation/legal_main_screen.dart lib/features/recruitment/presentation/recruitment_main_screen.dart lib/features/reports/presentation/manager_main_screen.dart lib/features/shell/presentation/persistent_tab_shell.dart lib/features/shell/presentation/premium_main_screen.dart lib/screens/desktop_tasks_screen.dart lib/screens/mobile_tasks_screen.dart lib/screens/profile_screen.dart lib/screens/task_details_screen.dart lib/widgets/notification_bell.dart lib/widgets/professional_bottom_navigation.dart test/performance_responsiveness_contract_test.dart test/persistent_tab_shell_contract_test.dart

      - name: Analyze source
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Run focused performance tests
        run: |
          flutter test test/performance_responsiveness_contract_test.dart --reporter compact
          flutter test test/persistent_tab_shell_contract_test.dart --reporter compact
          flutter test test/professional_bottom_navigation_test.dart --reporter compact
          flutter test test/ui_motion_contract_test.dart --reporter compact
          flutter test test/stable_shell_release_contract_test.dart --reporter compact

      - name: Remove temporary apply files
        run: |
          rm -f tool/performance_phase1.trigger
          rm -f .github/workflows/apply-performance-phase-one.yml

      - name: Commit validated phase one
        uses: stefanzweifel/git-auto-commit-action@v6
        with:
          branch: ${{ github.head_ref }}
          commit_message: ускорены переходы и отклик основных экранов
          file_pattern: .
