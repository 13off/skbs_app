name: Validate archive payment and page fixes

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: archive-payment-page-fix
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout fix branch
        uses: actions/checkout@v4
        with:
          ref: fix/archive-payments-unified-pages
          fetch-depth: 0
          persist-credentials: true

      - name: Restore current functional contract and update changed markers
        shell: bash
        run: |
          git fetch origin main
          git show origin/main:test/functional_contract_test.dart > test/functional_contract_test.dart
          python3 - <<'PY'
          from pathlib import Path

          path = Path('test/functional_contract_test.dart')
          text = path.read_text(encoding='utf-8')
          replacements = {
              "title: const Text('Табель')": "title: 'Табель'",
              'RepaintBoundary(child: buildEmployeeRow(employee))': 'child: buildEmployeeRow(employee)',
              'PremiumBrandMark(size: 52, animate: false)': 'AppPageHeader(',
              "'Рабочая сводка'": "title: 'Главная'",
          }
          for old, new in replacements.items():
              if old not in text:
                  raise RuntimeError(f'Не найден маркер функционального контракта: {old}')
              text = text.replace(old, new, 1)
          path.write_text(text, encoding='utf-8')
          PY

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version-file: .fvmrc
          cache: true

      - name: Install locked dependencies
        run: flutter pub get --enforce-lockfile

      - name: Format changed Dart files
        run: |
          dart format \
            lib/widgets/app_page.dart \
            lib/features/archive/presentation/archive_management_screen_v3.dart \
            lib/screens/add_payment_screen.dart \
            lib/screens/home_screen.dart \
            lib/screens/employees_screen.dart \
            lib/screens/timesheet_screen.dart \
            test/functional_contract_test.dart \
            test/archive_payment_page_contract_test.dart

      - name: Commit normalized draft
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            lib/widgets/app_page.dart \
            lib/features/archive/presentation/archive_management_screen_v3.dart \
            lib/screens/add_payment_screen.dart \
            lib/screens/home_screen.dart \
            lib/screens/employees_screen.dart \
            lib/screens/timesheet_screen.dart \
            test/functional_contract_test.dart \
            test/archive_payment_page_contract_test.dart
          git commit -m "нормализован проверяемый черновик архива выплат и страниц" || true
          git push origin HEAD:fix/archive-payments-unified-pages

      - name: Validate tests analysis and web build
        id: validation
        shell: bash
        run: |
          set +e
          set -o pipefail
          {
            flutter test -r expanded &&
            flutter analyze --no-fatal-infos --no-fatal-warnings &&
            flutter build web --release --base-href /appstroy-web/
          } 2>&1 | tee tool/archive_payment_page_validation.log
          status=${PIPESTATUS[0]}
          echo "exit_code=${status}" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Save failed validation diagnostics
        if: steps.validation.outputs.exit_code != '0'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f tool/archive_payment_page_validation.log
          git commit -m "сохранена диагностика архива выплат и страниц" || true
          git push origin HEAD:fix/archive-payments-unified-pages
          exit 1

      - name: Finalize verified branch
        if: steps.validation.outputs.exit_code == '0'
        shell: bash
        run: |
          rm -f tool/apply_archive_payment_page_fix.py
          rm -f tool/fix_archive_payment_patch_quote.py
          rm -f tool/archive_payment_page_format.log
          rm -f tool/archive_payment_page_validation.log
          rm -f .github/workflows/apply-archive-payment-page-fix.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "исправлены архив выплаты и единый дизайн страниц"
          git push origin HEAD:fix/archive-payments-unified-pages
