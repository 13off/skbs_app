name: Apply archive payment and page fixes

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: archive-payment-page-fix
  cancel-in-progress: true

jobs:
  apply-test-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout fix branch
        uses: actions/checkout@v4
        with:
          ref: fix/archive-payments-unified-pages
          persist-credentials: true

      - name: Apply source changes
        run: python3 tool/apply_archive_payment_page_fix.py

      - name: Format changed Dart files
        run: |
          dart format \
            lib/widgets/app_page.dart \
            lib/features/archive/presentation/archive_management_screen_v3.dart \
            lib/screens/add_payment_screen.dart \
            lib/screens/home_screen.dart \
            lib/screens/employees_screen.dart \
            lib/screens/timesheet_screen.dart \
            test/functional_contract_test.dart \
            test/archive_payment_page_contract_test.dart

      - name: Commit generated draft
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            lib/widgets/app_page.dart \
            lib/features/archive/presentation/archive_management_screen_v3.dart \
            lib/screens/add_payment_screen.dart \
            lib/screens/home_screen.dart \
            lib/screens/employees_screen.dart \
            lib/screens/timesheet_screen.dart \
            test/functional_contract_test.dart \
            test/archive_payment_page_contract_test.dart
          git commit -m "применён проверяемый черновик архива выплат и страниц" || true
          git push origin HEAD:fix/archive-payments-unified-pages

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version-file: .fvmrc
          cache: true

      - name: Install locked dependencies
        run: flutter pub get --enforce-lockfile

      - name: Validate tests analysis and web build
        id: validation
        shell: bash
        run: |
          set +e
          set -o pipefail
          {
            flutter test -r expanded &&
            flutter analyze --no-fatal-infos --no-fatal-warnings &&
            flutter build web --release --base-href /appstroy-web/
          } 2>&1 | tee tool/archive_payment_page_validation.log
          status=${PIPESTATUS[0]}
          echo "exit_code=${status}" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Save failed diagnostics
        if: steps.validation.outputs.exit_code != '0'
        shell: bash
        run: |
          git pull --rebase origin fix/archive-payments-unified-pages
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f tool/archive_payment_page_validation.log
          git commit -m "сохранена диагностика архива выплат и страниц" || true
          git push origin HEAD:fix/archive-payments-unified-pages
          exit 1

      - name: Finalize verified branch
        if: steps.validation.outputs.exit_code == '0'
        shell: bash
        run: |
          git pull --rebase origin fix/archive-payments-unified-pages
          rm -f tool/apply_archive_payment_page_fix.py
          rm -f tool/archive_payment_page_validation.log
          rm -f .github/workflows/apply-archive-payment-page-fix.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "исправлены архив выплаты и единый дизайн страниц"
          git push origin HEAD:fix/archive-payments-unified-pages
