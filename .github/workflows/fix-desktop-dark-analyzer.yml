name: Fix desktop dark analyzer

on:
  push:
    branches:
      - agent/desktop-dark-contrast
    paths:
      - tool/fix_desktop_dark_analyzer.py
      - .github/workflows/fix-desktop-dark-analyzer.yml

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/desktop-dark-contrast
          fetch-depth: 0
      - uses: subosito/flutter-action@v2
        with:
          flutter-version-file: .fvmrc
          cache: true
      - run: python3 tool/fix_desktop_dark_analyzer.py
      - run: |
          dart format \
            lib/screens/desktop_home_widgets.dart \
            lib/screens/desktop_employees_view.dart \
            lib/screens/desktop_tasks_screen.dart
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            lib/screens/desktop_home_widgets.dart \
            lib/screens/desktop_employees_view.dart \
            lib/screens/desktop_tasks_screen.dart
          git commit -m "исправлены const-конфликты desktop-темы"
          git push origin HEAD:agent/desktop-dark-contrast
