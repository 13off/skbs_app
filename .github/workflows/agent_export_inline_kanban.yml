name: Agent export inline kanban source

on:
  workflow_dispatch:
  push:
    branches:
      - agent/inline-kanban-columns
    paths:
      - .github/workflows/agent_export_inline_kanban.yml
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Prepare source
        run: |
          mkdir -p export/lib/features/recruitment/presentation
          cp lib/features/recruitment/presentation/recruitment_applications_screen.dart export/lib/features/recruitment/presentation/
          cp lib/features/recruitment/presentation/recruitment_automation_settings_panel.dart export/lib/features/recruitment/presentation/
          cp lib/features/recruitment/presentation/recruitment_crm_settings_screen.dart export/lib/features/recruitment/presentation/
          cp -R test export/test
          cp pubspec.yaml pubspec.lock .fvmrc export/
      - uses: actions/upload-artifact@v4
        with:
          name: inline-kanban-source
          path: export
          retention-days: 1
