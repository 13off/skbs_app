name: Apply role permission header fix

on:
  pull_request:
    branches:
      - main
    paths:
      - tool/role_permission_header_fix.trigger

permissions:
  contents: write

concurrency:
  group: role-permission-header-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  patch-and-validate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout pull request branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
          persist-credentials: true

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version-file: .fvmrc
          cache: true

      - name: Install locked dependencies
        run: flutter pub get --enforce-lockfile

      - name: Apply header fix
        run: python3 tool/fix_role_permission_matrix_header.py

      - name: Format screen
        run: dart format lib/features/developer/presentation/role_permission_matrix_screen.dart

      - name: Run analyzer
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Remove temporary patch files
        run: |
          rm -f tool/fix_role_permission_matrix_header.py
          rm -f tool/role_permission_header_fix.trigger
          rm -f .github/workflows/apply-role-permission-header-fix.yml

      - name: Commit validated fix
        uses: stefanzweifel/git-auto-commit-action@v6
        with:
          branch: ${{ github.head_ref }}
          commit_message: исправлен заголовок матрицы ролей
          file_pattern: .
