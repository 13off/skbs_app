name: Keep web deployment current

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  actions: write
  contents: read

concurrency:
  group: ensure-appstroy-web-current
  cancel-in-progress: true

jobs:
  check-and-dispatch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source app
        uses: actions/checkout@v4
        with:
          path: skbs_app

      - name: Checkout published web app
        uses: actions/checkout@v4
        with:
          repository: 13off/appstroy-web
          path: appstroy-web

      - name: Compare source fingerprint with published build
        id: freshness
        shell: bash
        run: |
          SOURCE_FINGERPRINT="$(
            git -C skbs_app ls-files -s -- \
              lib \
              test \
              assets \
              web \
              pubspec.yaml \
              pubspec.lock \
              .fvmrc \
              .github/workflows/deploy-web.yml \
              | sha256sum \
              | awk '{print $1}'
          )"
          PUBLISHED_FINGERPRINT="$(cat appstroy-web/downloads/web-source-fingerprint.txt 2>/dev/null || true)"

          echo "source_fingerprint=${SOURCE_FINGERPRINT}"
          echo "published_fingerprint=${PUBLISHED_FINGERPRINT:-missing}"

          if [ -n "${PUBLISHED_FINGERPRINT}" ] && [ "${SOURCE_FINGERPRINT}" = "${PUBLISHED_FINGERPRINT}" ]; then
            echo "needs_deploy=false" >> "$GITHUB_OUTPUT"
          else
            echo "needs_deploy=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Dispatch web deployment when stale
        if: steps.freshness.outputs.needs_deploy == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
        shell: bash
        run: |
          RUNS_JSON="$(
            curl --fail-with-body --silent --show-error --location \
              --header "Accept: application/vnd.github+json" \
              --header "Authorization: Bearer ${GH_TOKEN}" \
              --header "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${REPOSITORY}/actions/workflows/deploy-web.yml/runs?branch=main&per_page=20"
          )"

          ACTIVE_RUNS="$(
            printf '%s' "${RUNS_JSON}" | python3 -c "import json, sys; data=json.load(sys.stdin); active={'queued','in_progress','requested','waiting','pending'}; print(sum(run.get('status') in active for run in data.get('workflow_runs', [])))"
          )"

          if [ "${ACTIVE_RUNS}" -gt 0 ]; then
            echo "Web deployment is already active"
            exit 0
          fi

          curl --fail-with-body --silent --show-error --location \
            --request POST \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer ${GH_TOKEN}" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${REPOSITORY}/actions/workflows/deploy-web.yml/dispatches" \
            --data '{"ref":"main"}'

          echo "Stale web build detected; deployment dispatched"
