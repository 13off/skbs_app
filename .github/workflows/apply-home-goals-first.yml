name: Apply goals-first home

on:
  push:
    branches:
      - feature/home-goals-first

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/home-goals-first
          fetch-depth: 0

      - name: Apply UI changes
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          def replace_once(text: str, old: str, new: str, label: str) -> str:
              if old not in text:
                  raise SystemExit(f'Pattern not found: {label}')
              return text.replace(old, new, 1)

          # Mobile home: compact header, goals first, completed tasks last.
          path = Path('lib/screens/home_screen.dart')
          text = path.read_text(encoding='utf-8')
          text = replace_once(
              text,
              "import '../features/ai/presentation/ai_assistant_screen.dart';\n",
              "import '../features/ai/presentation/ai_assistant_screen.dart';\nimport '../features/milestones/presentation/milestone_home_overlay.dart';\n",
              'home milestone import',
          )
          text = text.replace("import '../widgets/app_page.dart';\n", '', 1)

