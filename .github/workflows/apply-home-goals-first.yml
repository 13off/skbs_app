          trailing: NotificationBell(
            selectedObjectName: widget.selectedObjectName,
          ),
        ),
        const SizedBox(height: 14),
        PremiumWorkCard(
          radius: 26,
          padding: const EdgeInsets.all(16),
          child: Column(
            crossAxisAlignment: CrossAxisAlignment.stretch,
            children: [
              Row(
                children: [
                  const Icon(
                    Icons.calendar_month_outlined,
                    color: _muted,
