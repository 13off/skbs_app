name: Apply employee scroll position fix

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/apply-employee-scroll-fix.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Patch employees screen
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('lib/screens/employees_screen.dart')
          text = path.read_text(encoding='utf-8')

          old = "  final TextEditingController searchController = TextEditingController();\n"
          new = (
              "  final TextEditingController searchController = TextEditingController();\n"
              "  final ScrollController employeesScrollController = ScrollController();\n"
          )
          if old not in text:
              raise SystemExit('search controller anchor not found')
          text = text.replace(old, new, 1)

          old = """  @override
  void dispose() {
    searchController.dispose();
    super.dispose();
  }
"""
          new = """  @override
  void dispose() {
    searchController.dispose();
    employeesScrollController.dispose();
    super.dispose();
  }
"""
          if old not in text:
              raise SystemExit('dispose anchor not found')
          text = text.replace(old, new, 1)

          old = """  Future<void> openEmployeeDetails(
    BuildContext context,
    Employee employee,
  ) async {
    await Navigator.push<void>(
      context,
      CupertinoPageRoute<void>(
        builder: (_) =>
            EmployeeDetailsScreen(profile: widget.profile, employee: employee),
      ),
    );

    if (!mounted) return;
    loadEmployees();
  }
"""
          new = """  Future<void> openEmployeeDetails(
    BuildContext context,
    Employee employee,
  ) async {
    final savedScrollOffset = employeesScrollController.hasClients
        ? employeesScrollController.offset
        : 0.0;

    await Navigator.push<void>(
      context,
      CupertinoPageRoute<void>(
        builder: (_) =>
            EmployeeDetailsScreen(profile: widget.profile, employee: employee),
      ),
    );

    if (!mounted) return;

    await loadEmployees();

    if (!mounted) return;

    WidgetsBinding.instance.addPostFrameCallback((_) {
      if (!mounted || !employeesScrollController.hasClients) return;

      final position = employeesScrollController.position;
      final targetOffset = savedScrollOffset
          .clamp(position.minScrollExtent, position.maxScrollExtent)
          .toDouble();

      if ((position.pixels - targetOffset).abs() > 0.5) {
        employeesScrollController.jumpTo(targetOffset);
      }
    });
  }
"""
          if old not in text:
              raise SystemExit('employee details method anchor not found')
          text = text.replace(old, new, 1)

          old = """        child: ListView(
          padding: const EdgeInsets.fromLTRB(18, 18, 18, 120),
          children: content,
        ),
"""
          new = """        child: ListView(
          key: PageStorageKey<String>(
            'employees-list-${widget.selectedObjectName ?? 'all'}',
          ),
          controller: employeesScrollController,
          padding: const EdgeInsets.fromLTRB(18, 18, 18, 120),
          children: content,
        ),
"""
          if old not in text:
              raise SystemExit('list view anchor not found')
          text = text.replace(old, new, 1)

          path.write_text(text, encoding='utf-8')
          PY

      - name: Remove one-time workflow
        run: rm .github/workflows/apply-employee-scroll-fix.yml

      - name: Commit source change
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add lib/screens/employees_screen.dart .github/workflows/apply-employee-scroll-fix.yml
          git commit -m "позиция списка сотрудников сохраняется после возврата"
          git push
