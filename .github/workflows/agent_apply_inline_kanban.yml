name: Agent apply inline kanban

on:
  push:
    branches:
      - agent/inline-kanban-columns
    paths:
      - .github/workflows/agent_apply_inline_kanban.yml

permissions:
  contents: write

concurrency:
  group: agent-apply-inline-kanban-${{ github.ref }}
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Apply prepared sources
        shell: bash
        run: |
          set -euo pipefail
          cat .agent/inline_kanban_apply_* | base64 --decode > /tmp/inline-kanban-update.tar.gz
          echo "ba64a3521622aa9462a07c640d618f40fa82dd1ce9d56a75ba6afc1ca8525184  /tmp/inline-kanban-update.tar.gz" | sha256sum --check -
          tar -xzf /tmp/inline-kanban-update.tar.gz -C .
          rm -f .agent/inline_kanban_apply_* \
            .github/workflows/agent_export_inline_kanban.yml \
            .github/workflows/agent_apply_inline_kanban.yml
          rmdir .agent 2>/dev/null || true

      - uses: subosito/flutter-action@v2
        with:
          flutter-version-file: .fvmrc
          cache: true

      - name: Install locked dependencies
        run: flutter pub get --enforce-lockfile

      - name: Format changed Dart files
        run: |
          dart format \
            lib/features/recruitment/presentation/recruitment_applications_screen.dart \
            lib/features/recruitment/presentation/recruitment_automation_settings_panel.dart \
            test/recruitment_inline_kanban_contract_test.dart

      - name: Analyze
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Run focused tests
        run: flutter test test/recruitment_inline_kanban_contract_test.dart --reporter compact

      - name: Commit implementation
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Управлять колонками прямо на канбане"
          git push origin HEAD:${{ github.ref_name }}
