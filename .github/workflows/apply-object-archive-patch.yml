name: Apply object archive patch

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Patch archive behavior
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path
          import re

          def sub(text, pattern, replacement, label, count=1):
              new, n = re.subn(pattern, replacement, text, count=count, flags=re.S)
              if n != count:
                  raise SystemExit(f'{label}: expected {count}, got {n}')
              return new

          # Object repository: any object can be archived; data stays in Supabase.
          p = Path('lib/data/object_repository.dart')
          s = p.read_text(encoding='utf-8')
          s = re.sub(r"\n  static const Set<String> _baseObjectNames = \{'Мурманск', 'Москва'\};", '', s)
          s = sub(s, r"\n  static bool _isBaseObjectName\(String value\) \{.*?\n  \}\n", '\n', 'remove base helper')
          s = sub(s, r"\n  static Future<void> _ensureNoObjectReferencesForDelete\(String objectName\) async \{.*?\n  \}\n", '\n', 'remove delete guard')
          s = re.sub(r"\n    if \(_isBaseObjectName\(cleanOldName\)\) \{.*?\n    \}\n", '\n', s, flags=re.S)
          s = s.replace(".select('name')\n          .eq('name', cleanName)", ".select('name, is_active')\n          .eq('name', cleanName)", 1)
          s = s.replace("      if (existing != null) {\n        clearCache();\n\n        return existing['name']?.toString() ?? cleanName;\n      }", "      if (existing != null) {\n        if (existing['is_active'] != true) {\n          await restoreObject(name: cleanName);\n        }\n\n        clearCache();\n        return existing['name']?.toString() ?? cleanName;\n      }", 1)
          archive_block = '''  static Future<void> archiveObject({required String name}) async {
            final cleanName = cleanObjectName(name);

            if (cleanName == null) {
              throw Exception('Не найден объект');
            }

            await _client.rpc('archive_object', params: {'p_name': cleanName});
            clearCache();
          }

          static Future<void> deleteObject({required String name}) async {
            await archiveObject(name: name);
          }

          static Future<List<String>> fetchArchivedObjectNames({
            bool forceRefresh = false,
          }) async {
            final rows = await _client
                .from('objects')
                .select('name')
                .eq('is_active', false)
                .order('name', ascending: true);

            return rows
                .map<String>((row) => row['name']?.toString().trim() ?? '')
                .where((name) => name.isNotEmpty)
                .toList();
          }

          static Future<void> restoreObject({required String name}) async {
            final cleanName = cleanObjectName(name);

            if (cleanName == null) {
              throw Exception('Не найден объект');
            }

            await _client.rpc('restore_object', params: {'p_name': cleanName});
            clearCache();
          }

'''
          s = sub(s, r"  static Future<void> deleteObject\(\{required String name\}\) async \{.*?\n  \}\n\n", archive_block, 'replace delete with archive')
          p.write_text(s, encoding='utf-8')

          # Employee repository: object list comes only from active objects table.
          p = Path('lib/data/employee_repository.dart')
          s = p.read_text(encoding='utf-8')
          s = s.replace("static const List<String> baseObjects = ['Мурманск', 'Москва'];", "static const List<String> baseObjects = <String>[];")
          fetch_names = '''  static Future<List<String>> fetchObjectNames({
            bool forceRefresh = false,
          }) async {
            if (!forceRefresh && _cachedObjectNames != null) {
              return List<String>.from(_cachedObjectNames!);
            }

            final result = await ObjectRepository.fetchObjectNames(
              forceRefresh: forceRefresh,
            );

            _cachedObjectNames = List<String>.from(result);
            return List<String>.from(result);
          }

'''
          s = sub(s, r"  static Future<List<String>> fetchObjectNames\(\{.*?\n  \}\n\n  static Future<String\?> addEmployee", fetch_names + '  static Future<String?> addEmployee', 'replace object names')
          s = s.replace("final cleanObjectName = objectName.trim().isEmpty\n        ? 'Мурманск'\n        : objectName.trim();", "final cleanObjectName = objectName.trim();\n\n    if (cleanObjectName.isEmpty) {\n      throw Exception('Выберите объект');\n    }")
          p.write_text(s, encoding='utf-8')

          # Home screen: archive wording, archive list and restore button.
          p = Path('lib/screens/home_screen.dart')
          s = p.read_text(encoding='utf-8')
          s = s.replace("static const String _deleteObjectPrefix = '__delete_object__::';", "static const String _archiveObjectPrefix = '__archive_object__::';\n  static const String _showArchiveValue = '__show_object_archive__';")
          s = s.replace('handleDeleteObject', 'handleArchiveObject')
          s = s.replace('ObjectRepository.deleteObject(name: objectName)', 'ObjectRepository.archiveObject(name: objectName)')
          s = s.replace('Удалить объект?', 'Архивировать объект?')
          s = s.replace('будет удалён из списка. Если к нему привязаны сотрудники, табель, задачи или пользователь, удаление будет запрещено.', 'уйдёт в архив. Табели, задачи и выплаты сохранятся, а сотрудники на этом объекте станут уволенными.')
          s = s.replace("label: const Text('Удалить')", "label: const Text('В архив')")
          s = s.replace("SnackBar(content: Text('Объект \"$objectName\" удалён'))", "SnackBar(content: Text('Объект \"$objectName\" перемещён в архив'))")
          s = s.replace('_deleteObjectPrefix', '_archiveObjectPrefix')
          s = s.replace("tooltip: 'Удалить объект'", "tooltip: 'Архивировать объект'")
          s = s.replace('Icons.delete_outline', 'Icons.archive_outlined')

          archive_method = '''  Future<void> showArchivedObjectsSheet(BuildContext context) async {
            final archived = await ObjectRepository.fetchArchivedObjectNames(
              forceRefresh: true,
            );

            if (!mounted) return;

            await showModalBottomSheet<void>(
              context: context,
              isScrollControlled: true,
              backgroundColor: Colors.transparent,
              builder: (sheetContext) {
                return SafeArea(
                  child: Container(
                    margin: const EdgeInsets.all(12),
                    padding: const EdgeInsets.all(18),
                    constraints: BoxConstraints(
                      maxHeight: MediaQuery.of(sheetContext).size.height * 0.72,
                    ),
                    decoration: BoxDecoration(
                      color: _card,
                      borderRadius: BorderRadius.circular(28),
                      border: Border.all(color: _line),
                    ),
                    child: Column(
                      mainAxisSize: MainAxisSize.min,
                      children: [
                        Row(
                          children: [
                            const Expanded(
                              child: Text(
                                'Архив объектов',
                                style: TextStyle(
                                  color: _text,
                                  fontSize: 22,
                                  fontWeight: FontWeight.w900,
                                ),
                              ),
                            ),
                            IconButton(
                              onPressed: () => Navigator.pop(sheetContext),
                              icon: const Icon(Icons.close),
                            ),
                          ],
                        ),
                        const SizedBox(height: 10),
                        if (archived.isEmpty)
                          const Padding(
                            padding: EdgeInsets.symmetric(vertical: 28),
                            child: Text(
                              'Архив пуст',
                              style: TextStyle(
                                color: _muted,
                                fontWeight: FontWeight.w700,
                              ),
                            ),
                          )
                        else
                          Flexible(
                            child: ListView.separated(
                              shrinkWrap: true,
                              itemCount: archived.length,
                              separatorBuilder: (_, __) => const SizedBox(height: 10),
                              itemBuilder: (context, index) {
                                final objectName = archived[index];

                                return Container(
                                  padding: const EdgeInsets.fromLTRB(14, 10, 8, 10),
                                  decoration: BoxDecoration(
                                    color: _softCard,
                                    borderRadius: BorderRadius.circular(18),
                                    border: Border.all(color: _line),
                                  ),
                                  child: Row(
                                    children: [
                                      const Icon(Icons.inventory_2_outlined),
                                      const SizedBox(width: 12),
                                      Expanded(
                                        child: Text(
                                          objectName,
                                          style: const TextStyle(
                                            color: _text,
                                            fontWeight: FontWeight.w900,
                                          ),
                                        ),
                                      ),
                                      TextButton.icon(
                                        onPressed: () async {
                                          await ObjectRepository.restoreObject(
                                            name: objectName,
                                          );

                                          if (!sheetContext.mounted) return;
                                          Navigator.pop(sheetContext);
                                          refreshObjectsAndDashboard();

                                          if (!mounted) return;
                                          ScaffoldMessenger.of(this.context).showSnackBar(
                                            SnackBar(
                                              content: Text(
                                                'Объект \"$objectName\" восстановлен',
                                              ),
                                            ),
                                          );
                                        },
                                        icon: const Icon(Icons.restore, size: 18),
                                        label: const Text('Восстановить'),
                                      ),
                                    ],
                                  ),
                                );
                              },
                            ),
                          ),
                      ],
                    ),
                  ),
                );
              },
            );
          }

'''
          marker = '  Future<void> showObjectPicker(\n'
          if marker not in s:
              raise SystemExit('home archive method marker not found')
          s = s.replace(marker, archive_method + marker, 1)

          header_old = """                    FilledButton.tonalIcon(
                      onPressed: () {
                        Navigator.pop(context, _addObjectValue);
                      },"""
          header_new = """                    IconButton(
                      tooltip: 'Архив объектов',
                      onPressed: () {
                        Navigator.pop(context, _showArchiveValue);
                      },
                      icon: const Icon(Icons.inventory_2_outlined),
                    ),
                    FilledButton.tonalIcon(
                      onPressed: () {
                        Navigator.pop(context, _addObjectValue);
                      },"""
          if header_old not in s:
              raise SystemExit('home archive header marker not found')
          s = s.replace(header_old, header_new, 1)

          picked_old = """    if (pickedValue == _addObjectValue) {
      await handleAddObject();
      return;
    }
"""
          picked_new = """    if (pickedValue == _showArchiveValue) {
      await showArchivedObjectsSheet(context);
      return;
    }

    if (pickedValue == _addObjectValue) {
      await handleAddObject();
      return;
    }
"""
          if picked_old not in s:
              raise SystemExit('home archive picked marker not found')
          s = s.replace(picked_old, picked_new, 1)
          p.write_text(s, encoding='utf-8')

          # Active dashboard must ignore archived-object tasks and finance.
          p = Path('lib/data/task_repository.dart')
          s = p.read_text(encoding='utf-8')
          if "import 'object_repository.dart';" not in s:
              s = s.replace("import 'image_compression_service.dart';", "import 'image_compression_service.dart';\nimport 'object_repository.dart';")
          s = s.replace("    final tasks = rows\n        .map<TaskItemData>((row) => TaskItemData.fromSupabase(row))\n        .toList();", "    final allTasks = rows\n        .map<TaskItemData>((row) => TaskItemData.fromSupabase(row))\n        .toList();\n    final activeObjects = cleanObject == null\n        ? (await ObjectRepository.fetchObjectNames()).toSet()\n        : null;\n    final tasks = activeObjects == null\n        ? allTasks\n        : allTasks\n              .where((task) => activeObjects.contains(task.objectName.trim()))\n              .toList();", 1)
          p.write_text(s, encoding='utf-8')

          p = Path('lib/data/finance_summary_repository.dart')
          s = p.read_text(encoding='utf-8')
          if "import 'object_repository.dart';" not in s:
              s = s.replace("import 'employee_repository.dart';", "import 'employee_repository.dart';\nimport 'object_repository.dart';")
          old = """    final employees = await EmployeeRepository.fetchEmployees(
      objectName: cleanObject,
      includeFired: true,
    );
    final employeesById = _employeesById(employees);"""
          new = """    final allEmployees = await EmployeeRepository.fetchEmployees(
      objectName: cleanObject,
      includeFired: true,
    );
    final activeObjectNames = cleanObject == null
        ? (await ObjectRepository.fetchObjectNames()).toSet()
        : null;
    final employees = activeObjectNames == null
        ? allEmployees
        : allEmployees
              .where(
                (employee) => activeObjectNames.contains(employee.objectName.trim()),
              )
              .toList();
    final employeesById = _employeesById(employees);"""
          if old not in s:
              raise SystemExit('finance employee block not found')
          s = s.replace(old, new, 1)
          p.write_text(s, encoding='utf-8')
          PY

      - name: Commit patch
        shell: bash
        run: |
          rm -f .github/workflows/apply-object-archive-patch.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "добавлен архив объектов"
          git push
