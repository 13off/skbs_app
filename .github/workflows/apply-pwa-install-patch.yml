name: Apply PWA install patch

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]

permissions:
  contents: write

concurrency:
  group: pwa-install-patch-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  apply:
    if: github.head_ref == 'agent/pwa-install'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: agent/pwa-install
          token: ${{ github.token }}
          show-progress: false

      - name: Apply targeted source patch
        run: python3 tool/apply_pwa_install_patch.py

      - name: Remove temporary patch tooling
        run: |
          rm -f tool/apply_pwa_install_patch.py
          rm -f .github/workflows/apply-pwa-install-patch.yml

      - name: Commit patched sources
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if ! git diff --cached --quiet; then
            git commit -m "Подключить установку PWA в профиль"
            git push origin HEAD:agent/pwa-install
          fi
