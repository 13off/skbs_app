name: Publish role preview now

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches: [main]

permissions:
  contents: read

concurrency:
  group: appstroy-role-preview-publish
  cancel-in-progress: true

env:
  APP_PUBLIC_URL: https://13off.github.io/appstroy-web/
  FIREBASE_API_KEY: ${{ vars.FIREBASE_API_KEY }}
  FIREBASE_PROJECT_ID: ${{ vars.FIREBASE_PROJECT_ID }}
  FIREBASE_MESSAGING_SENDER_ID: ${{ vars.FIREBASE_MESSAGING_SENDER_ID }}
  FIREBASE_AUTH_DOMAIN: ${{ vars.FIREBASE_AUTH_DOMAIN }}
  FIREBASE_STORAGE_BUCKET: ${{ vars.FIREBASE_STORAGE_BUCKET }}
  FIREBASE_WEB_APP_ID: ${{ vars.FIREBASE_WEB_APP_ID }}
  FIREBASE_ANDROID_APP_ID: ${{ vars.FIREBASE_ANDROID_APP_ID }}
  FIREBASE_IOS_APP_ID: ${{ vars.FIREBASE_IOS_APP_ID }}
  FIREBASE_VAPID_KEY: ${{ vars.FIREBASE_VAPID_KEY }}

jobs:
  publish:
    if: github.head_ref == 'deploy/admin-role-preview-web'
    runs-on: ubuntu-latest
    steps:
      - name: Check deploy token
        shell: bash
        run: |
          if [ -z "${{ secrets.WEB_DEPLOY_TOKEN }}" ]; then
            echo "::error::Не найден secret WEB_DEPLOY_TOKEN"
            exit 1
          fi

      - name: Checkout source app
        uses: actions/checkout@v4
        with:
          path: skbs_app
          show-progress: false

      - name: Preserve payments object scope
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          employees = Path('skbs_app/lib/screens/employees_screen.dart')
          employee_text = employees.read_text(encoding='utf-8')
          if 'selectedObjectName: widget.selectedObjectName' not in employee_text:
              old = 'AppPageRoute(builder: (_) => const PaymentsScreen()),'
              new = '''AppPageRoute(
                builder: (_) => PaymentsScreen(
                  selectedObjectName: widget.selectedObjectName,
                ),
              ),'''
              if old not in employee_text:
                  raise SystemExit('Payments route fragment was not found')
              employee_text = employee_text.replace(old, new, 1)
              employees.write_text(employee_text, encoding='utf-8')

          payments = Path(
              'skbs_app/lib/features/payments/presentation/screens/payments_screen.dart'
          )
          payment_text = payments.read_text(encoding='utf-8')
          if 'final String? selectedObjectName;' not in payment_text:
              old = '''class PaymentsScreen extends StatefulWidget {
            const PaymentsScreen({super.key});'''
              new = '''class PaymentsScreen extends StatefulWidget {
            final String? selectedObjectName;

            const PaymentsScreen({super.key, this.selectedObjectName});'''
              if old not in payment_text:
                  raise SystemExit('PaymentsScreen constructor fragment was not found')
              payment_text = payment_text.replace(old, new, 1)

          if 'objectName: widget.selectedObjectName' not in payment_text:
              old = '''        month: targetMonth.month,
                forceRefresh: forceRefresh,'''
              new = '''        month: targetMonth.month,
                objectName: widget.selectedObjectName,
                includeFired: true,
                forceRefresh: forceRefresh,'''
              if old not in payment_text:
                  old = '''        month: targetMonth.month,
                forceRefresh: forceRefresh,'''.replace('                ', '        ')
                  new = '''        month: targetMonth.month,
        objectName: widget.selectedObjectName,
        includeFired: true,
        forceRefresh: forceRefresh,'''
              if old not in payment_text:
                  raise SystemExit('Monthly timesheet scope fragment was not found')
              payment_text = payment_text.replace(old, new, 1)

          payments.write_text(payment_text, encoding='utf-8')
          PY

      - name: Checkout web repository
        uses: actions/checkout@v4
        with:
          repository: 13off/appstroy-web
          token: ${{ secrets.WEB_DEPLOY_TOKEN }}
          path: appstroy-web
          show-progress: false

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version-file: skbs_app/.fvmrc
          cache: true

      - name: Generate web icons
        shell: bash
        run: |
          sudo apt-get update >/dev/null
          sudo apt-get install -y librsvg2-bin >/dev/null
          mkdir -p skbs_app/web/icons
          rsvg-convert -w 192 -h 192 skbs_app/web/icons/app_icon_matte_v2.svg -o skbs_app/web/icons/AppStroy-192-v2.png
          rsvg-convert -w 512 -h 512 skbs_app/web/icons/app_icon_matte_v2.svg -o skbs_app/web/icons/AppStroy-512-v2.png
          rsvg-convert -w 64 -h 64 skbs_app/web/icons/app_icon_matte_v2.svg -o skbs_app/web/favicon-v2.png

      - name: Install locked dependencies
        working-directory: skbs_app
        run: flutter pub get --enforce-lockfile >/dev/null

      - name: Verify source
        working-directory: skbs_app
        run: |
          flutter analyze --no-fatal-infos --no-fatal-warnings
          flutter test --reporter compact

      - name: Configure public Firebase web values
        working-directory: skbs_app
        shell: bash
        run: |
          python3 - <<'PY'
          import os
          from pathlib import Path
          path = Path('web/firebase-messaging-sw.js')
          text = path.read_text(encoding='utf-8')
          replacements = {
              '__FIREBASE_API_KEY__': os.environ.get('FIREBASE_API_KEY', ''),
              '__FIREBASE_AUTH_DOMAIN__': os.environ.get('FIREBASE_AUTH_DOMAIN', ''),
              '__FIREBASE_PROJECT_ID__': os.environ.get('FIREBASE_PROJECT_ID', ''),
              '__FIREBASE_STORAGE_BUCKET__': os.environ.get('FIREBASE_STORAGE_BUCKET', ''),
              '__FIREBASE_MESSAGING_SENDER_ID__': os.environ.get('FIREBASE_MESSAGING_SENDER_ID', ''),
              '__FIREBASE_WEB_APP_ID__': os.environ.get('FIREBASE_WEB_APP_ID', ''),
              '__APP_PUBLIC_URL__': os.environ.get('APP_PUBLIC_URL', ''),
          }
          for marker, value in replacements.items():
              text = text.replace(marker, value)
          path.write_text(text, encoding='utf-8')
          PY

      - name: Build Flutter web
        working-directory: skbs_app
        run: |
          flutter build web --release \
            --base-href /appstroy-web/ \
            --dart-define=SUPABASE_URL=https://api.appstroy-web.ru \
            --dart-define=FIREBASE_API_KEY="$FIREBASE_API_KEY" \
            --dart-define=FIREBASE_PROJECT_ID="$FIREBASE_PROJECT_ID" \
            --dart-define=FIREBASE_MESSAGING_SENDER_ID="$FIREBASE_MESSAGING_SENDER_ID" \
            --dart-define=FIREBASE_AUTH_DOMAIN="$FIREBASE_AUTH_DOMAIN" \
            --dart-define=FIREBASE_STORAGE_BUCKET="$FIREBASE_STORAGE_BUCKET" \
            --dart-define=FIREBASE_WEB_APP_ID="$FIREBASE_WEB_APP_ID" \
            --dart-define=FIREBASE_ANDROID_APP_ID="$FIREBASE_ANDROID_APP_ID" \
            --dart-define=FIREBASE_IOS_APP_ID="$FIREBASE_IOS_APP_ID" \
            --dart-define=FIREBASE_VAPID_KEY="$FIREBASE_VAPID_KEY"

      - name: Bust cache
        shell: bash
        run: |
          BUILD_ID="$(git -C skbs_app rev-parse --short=12 HEAD)"
          sed -i "s/manifest\.json/manifest.json?v=${BUILD_ID}/g" skbs_app/build/web/index.html
          sed -i "s/flutter_bootstrap\.js/flutter_bootstrap.js?v=${BUILD_ID}/g" skbs_app/build/web/index.html
          sed -i "s/main\.dart\.js/main.dart.js?v=${BUILD_ID}/g" skbs_app/build/web/flutter_bootstrap.js
          cp skbs_app/build/web/index.html skbs_app/build/web/404.html

      - name: Publish web files
        working-directory: appstroy-web
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git reset --hard origin/main
          find . -mindepth 1 -maxdepth 1 ! -name '.git' ! -name 'downloads' -exec rm -rf {} +
          cp -R ../skbs_app/build/web/. ./
          touch .nojekyll
          git add -A
          if ! git diff --cached --quiet; then
            git commit -m "опубликован переключатель платформ"
            git push origin HEAD:main
          fi

      - name: Publish build status
        working-directory: appstroy-web
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git reset --hard origin/main
          mkdir -p downloads
          printf '%s\n' success > downloads/web-build-status.txt
          printf '%s\n' "$(git -C ../skbs_app rev-parse HEAD)" > downloads/web-source-commit.txt
          git add downloads/web-build-status.txt downloads/web-source-commit.txt
          if ! git diff --cached --quiet; then
            git commit -m "сохранён статус сборки переключателя платформ"
            git push origin HEAD:main
          fi
