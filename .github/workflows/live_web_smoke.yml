name: Live web smoke

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  smoke:
    if: github.head_ref == 'agent/live-web-smoke'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/live-web-smoke
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install Playwright
        run: |
          npm init -y >/dev/null 2>&1
          npm install playwright@1.54.1 >/dev/null
          npx playwright install --with-deps chromium >/dev/null
      - name: Open live AppStroy and capture failures
        shell: bash
        run: |
          set +e
          rm -rf .diagnostics
          mkdir -p .diagnostics
          {
            echo '=== CURL ROOT ==='
            curl -I -L --max-time 60 https://13off.github.io/appstroy-web/
            echo '=== CURL BOOTSTRAP ==='
            curl -I -L --max-time 60 https://13off.github.io/appstroy-web/flutter_bootstrap.js
            echo '=== CURL MAIN ==='
            curl -I -L --max-time 60 https://13off.github.io/appstroy-web/main.dart.js
            echo '=== CURL CANVASKIT CDN ==='
            curl -I -L --max-time 60 https://www.gstatic.com/flutter-canvaskit/a4ce257c68517c1410f4b48ac9852ab5642a3f8d/canvaskit.js
          } > .diagnostics/curl.log 2>&1
          cat > smoke.mjs <<'EOF'
          import { chromium } from 'playwright';
          import { writeFile } from 'node:fs/promises';
          const url = 'https://13off.github.io/appstroy-web/';
          const result = { checkedAt: new Date().toISOString(), requestedUrl: url, consoleMessages: [], errors: [], failed: [], badResponses: [] };
          let browser;
          try {
            browser = await chromium.launch({ headless: true });
            const page = await browser.newPage({ viewport: { width: 1440, height: 1000 } });
            page.on('console', msg => {
              result.consoleMessages.push(`[${msg.type()}] ${msg.text()}`);
              if (msg.type() === 'error') result.errors.push(msg.text());
            });
            page.on('pageerror', error => result.errors.push(error.stack || error.message));
            page.on('requestfailed', request => result.failed.push({ url: request.url(), error: request.failure()?.errorText || 'unknown' }));
            page.on('response', response => {
              if (response.status() >= 400) result.badResponses.push({ status: response.status(), url: response.url() });
            });
            try {
              const response = await page.goto(url, { waitUntil: 'domcontentloaded', timeout: 60000 });
              result.navigationStatus = response?.status() ?? null;
              await page.waitForTimeout(30000);
            } catch (error) {
              result.navigationError = error.stack || error.message;
            }
            result.finalUrl = page.url();
            result.title = await page.title().catch(() => '');
            result.body = await page.locator('body').innerText().catch(() => '');
            result.flutterViews = await page.locator('flutter-view').count().catch(() => -1);
            result.canvases = await page.locator('canvas').count().catch(() => -1);
            await page.screenshot({ path: '.diagnostics/live-web-smoke.png', fullPage: true }).catch(error => { result.screenshotError = String(error); });
          } catch (error) {
            result.runnerError = error.stack || error.message;
          } finally {
            await browser?.close().catch(() => {});
            await writeFile('.diagnostics/live-web-smoke.json', JSON.stringify(result, null, 2));
          }
          EOF
          node smoke.mjs > .diagnostics/node.log 2>&1
          echo "node_exit=$?" >> .diagnostics/node.log
          rm -f smoke.mjs
          exit 0
      - name: Commit diagnostics
        run: |
          git config user.name "appstroy-agent"
          git config user.email "appstroy-agent@users.noreply.github.com"
          git add -f .diagnostics
          git commit -m "Сохранить диагностику живой web-версии" || exit 0
          git push origin HEAD:agent/live-web-smoke
