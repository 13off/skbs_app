name: Live web smoke

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  smoke:
    if: github.head_ref == 'agent/live-web-smoke'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/live-web-smoke
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install Playwright
        run: |
          npm init -y >/dev/null 2>&1
          npm install playwright@1.54.1 >/dev/null
          npx playwright install --with-deps chromium >/dev/null
      - name: Open live AppStroy and capture failures
        run: |
          mkdir -p .diagnostics
          cat > /tmp/smoke.mjs <<'EOF'
          import { chromium } from 'playwright';
          import { writeFile } from 'node:fs/promises';
          const url = 'https://13off.github.io/appstroy-web/';
          const browser = await chromium.launch({ headless: true });
          const page = await browser.newPage({ viewport: { width: 1440, height: 1000 } });
          const consoleMessages = [];
          const errors = [];
          const failed = [];
          const responses = [];
          page.on('console', msg => {
            consoleMessages.push(`[${msg.type()}] ${msg.text()}`);
            if (msg.type() === 'error') errors.push(msg.text());
          });
          page.on('pageerror', error => errors.push(error.stack || error.message));
          page.on('requestfailed', request => failed.push({
            url: request.url(),
            error: request.failure()?.errorText || 'unknown',
          }));
          page.on('response', response => {
            if (response.status() >= 400) responses.push({ status: response.status(), url: response.url() });
          });
          let navigationStatus = null;
          let navigationError = null;
          try {
            const response = await page.goto(url, { waitUntil: 'domcontentloaded', timeout: 60000 });
            navigationStatus = response?.status() ?? null;
            await page.waitForTimeout(30000);
          } catch (error) {
            navigationError = error.stack || error.message;
          }
          const result = {
            checkedAt: new Date().toISOString(),
            url: page.url(),
            navigationStatus,
            navigationError,
            title: await page.title().catch(() => ''),
            body: await page.locator('body').innerText().catch(() => ''),
            flutterViews: await page.locator('flutter-view').count().catch(() => -1),
            canvases: await page.locator('canvas').count().catch(() => -1),
            consoleMessages,
            errors,
            failed,
            badResponses: responses,
          };
          await page.screenshot({ path: '.diagnostics/live-web-smoke.png', fullPage: true }).catch(() => {});
          await writeFile('.diagnostics/live-web-smoke.json', JSON.stringify(result, null, 2));
          await browser.close();
          EOF
          node /tmp/smoke.mjs
      - name: Commit diagnostics
        run: |
          git config user.name "appstroy-agent"
          git config user.email "appstroy-agent@users.noreply.github.com"
          git add .diagnostics/live-web-smoke.json .diagnostics/live-web-smoke.png
          git commit -m "Сохранить диагностику живой web-версии" || exit 0
          git push origin HEAD:agent/live-web-smoke
