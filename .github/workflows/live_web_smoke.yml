name: Live web smoke

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  smoke:
    if: github.head_ref == 'agent/live-web-smoke'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/live-web-smoke
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install Playwright
        run: |
          npm init -y >/dev/null 2>&1
          npm install playwright@1.54.1 >/dev/null
          npx playwright install --with-deps chromium >/dev/null
      - name: Open published AppStroy
        shell: bash
        run: |
          set +e
          rm -rf .diagnostics
          mkdir -p .diagnostics
          cat > smoke.mjs <<'EOF'
          import { chromium } from 'playwright';
          import { writeFile } from 'node:fs/promises';
          const url = 'https://13off.github.io/appstroy-web/?smoke=d9359c4e';
          const result = {
            checkedAt: new Date().toISOString(),
            requestedUrl: url,
            consoleMessages: [],
            errors: [],
            failed: [],
            badResponses: [],
          };
          let browser;
          try {
            browser = await chromium.launch({ headless: true });
            const page = await browser.newPage({ viewport: { width: 1440, height: 1000 } });
            result.navigatorLanguageBefore = await page.evaluate(() => navigator.language);
            result.navigatorLanguagesBefore = await page.evaluate(() => navigator.languages);
            page.on('console', msg => {
              result.consoleMessages.push(`[${msg.type()}] ${msg.text()}`);
              if (msg.type() === 'error') result.errors.push(msg.text());
            });
            page.on('pageerror', error => result.errors.push(error.stack || error.message));
            page.on('requestfailed', request => result.failed.push({
              url: request.url(),
              error: request.failure()?.errorText || 'unknown',
            }));
            page.on('response', response => {
              if (response.status() >= 400) {
                result.badResponses.push({ status: response.status(), url: response.url() });
              }
            });
            const response = await page.goto(url, {
              waitUntil: 'domcontentloaded',
              timeout: 60000,
            });
            result.navigationStatus = response?.status() ?? null;
            await page.waitForFunction(
              () => document.querySelector('flutter-view') != null,
              null,
              { timeout: 60000 },
            );
            await page.waitForTimeout(3000);
            result.finalUrl = page.url();
            result.title = await page.title();
            result.body = await page.locator('body').innerText().catch(() => '');
            result.flutterViews = await page.locator('flutter-view').count();
            result.canvases = await page.locator('canvas').count();
            result.navigatorLanguageAfter = await page.evaluate(() => navigator.language);
            result.navigatorLanguagesAfter = await page.evaluate(() => navigator.languages);
            result.guardedLocale = await page.evaluate(() => window.appstroyBrowserLocale ?? null);
            await page.screenshot({ path: '.diagnostics/live-web-smoke.png', fullPage: true });
          } catch (error) {
            result.runnerError = error.stack || error.message;
          } finally {
            await browser?.close().catch(() => {});
            await writeFile('.diagnostics/live-web-smoke.json', JSON.stringify(result, null, 2));
          }
          EOF
          node smoke.mjs > .diagnostics/node.log 2>&1
          echo "node_exit=$?" >> .diagnostics/node.log
          rm -f smoke.mjs
          exit 0
      - name: Commit diagnostics
        run: |
          git config user.name "appstroy-agent"
          git config user.email "appstroy-agent@users.noreply.github.com"
          git add -f .diagnostics
          git commit -m "Проверить опубликованный hotfix локали" || exit 0
          git push origin HEAD:agent/live-web-smoke
