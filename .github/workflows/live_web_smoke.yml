name: Live web smoke

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  smoke:
    if: github.head_ref == 'agent/live-web-smoke'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install Playwright
        run: |
          npm init -y >/dev/null 2>&1
          npm install playwright@1.54.1 >/dev/null
          npx playwright install --with-deps chromium >/dev/null
      - name: Open live AppStroy and capture failures
        run: |
          cat > /tmp/smoke.mjs <<'EOF'
          import { chromium } from 'playwright';
          const url = 'https://13off.github.io/appstroy-web/';
          const browser = await chromium.launch({ headless: true });
          const page = await browser.newPage({ viewport: { width: 1440, height: 1000 } });
          const errors = [];
          const failed = [];
          page.on('console', msg => {
            console.log(`[console:${msg.type()}] ${msg.text()}`);
            if (msg.type() === 'error') errors.push(msg.text());
          });
          page.on('pageerror', error => {
            console.log(`[pageerror] ${error.stack || error.message}`);
            errors.push(error.message);
          });
          page.on('requestfailed', request => {
            const failure = `${request.url()} :: ${request.failure()?.errorText || 'unknown'}`;
            console.log(`[requestfailed] ${failure}`);
            failed.push(failure);
          });
          const response = await page.goto(url, { waitUntil: 'domcontentloaded', timeout: 60000 });
          console.log(`HTTP ${response?.status()} ${response?.url()}`);
          await page.waitForTimeout(30000);
          console.log(`title=${await page.title()}`);
          console.log(`url=${page.url()}`);
          console.log(`body=${(await page.locator('body').innerText()).slice(0, 1000)}`);
          console.log(`flutterViews=${await page.locator('flutter-view').count()}`);
          console.log(`canvases=${await page.locator('canvas').count()}`);
          await page.screenshot({ path: 'live-web-smoke.png', fullPage: true });
          await browser.close();
          if (errors.length || failed.length) {
            console.error(`errors=${JSON.stringify(errors)}`);
            console.error(`failed=${JSON.stringify(failed)}`);
            process.exit(1);
          }
          EOF
          node /tmp/smoke.mjs
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: live-web-smoke
          path: live-web-smoke.png
          retention-days: 1
