name: Agent export source

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'agent/unify-ui-recruitment-crm' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/unify-ui-recruitment-crm
          fetch-depth: 0
          show-progress: false

      - name: Apply audited source changes
        shell: bash
        run: |
          set -euo pipefail
          cat > /tmp/ui-crm.tar.gz.b64 <<'PAYLOAD'

PAYLOAD
          base64 --decode /tmp/ui-crm.tar.gz.b64 > /tmp/ui-crm.tar.gz
          tar -xzf /tmp/ui-crm.tar.gz
          rm -f .github/workflows/agent_export_source.yml
          rm -f .github/workflows/agent_apply_ui_crm.yml

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version-file: .fvmrc
          cache: true

      - name: Install locked dependencies
        run: flutter pub get --enforce-lockfile >/dev/null

      - name: Format changed Dart files
        shell: bash
        run: |
          dart format \
            lib/app/app_ui_tokens.dart \
            lib/app/app_theme.dart \
            lib/app/app_dark_theme.dart \
            lib/app/premium_depth_theme.dart \
            lib/widgets/app_page.dart \
            lib/widgets/premium_ui_v2.dart \
            lib/widgets/premium_surfaces_v3.dart \
            lib/widgets/home_card.dart \
            lib/widgets/professional_bottom_navigation.dart \
            lib/features/shared/presentation/specialist_desktop_ui.dart \
            lib/features/recruitment/models/recruitment_models.dart \
            lib/features/recruitment/presentation/recruitment_applications_screen.dart \
            lib/features/recruitment/presentation/recruitment_main_screen.dart \
            test/compact_page_headers_contract_test.dart \
            test/desktop_secondary_ui_contract_test.dart \
            test/specialist_desktop_workspaces_contract_test.dart \
            test/recruitment_mvp_contract_test.dart \
            test/unified_ui_system_contract_test.dart \
            test/recruitment_crm_kanban_contract_test.dart
          git diff --check

      - name: Analyze source
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Run regression tests
        run: flutter test --reporter compact

      - name: Build web release
        run: flutter build web --release

      - name: Commit verified changes
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "appstroy-agent"
          git config user.email "appstroy-agent@users.noreply.github.com"
          git add -A
          git commit -m "Унифицировать интерфейс и добавить CRM кандидатов [agent-ui-crm]"
          git push origin HEAD:agent/unify-ui-recruitment-crm
