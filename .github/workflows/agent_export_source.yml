name: Agent apply UI CRM

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'agent/unify-ui-recruitment-crm-v2'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/unify-ui-recruitment-crm-v2
          fetch-depth: 0
          show-progress: false
      - name: Extract and apply audited package
        shell: bash
        run: |
          set -euo pipefail
          grep '^H4sI' .github/workflows/agent_apply_ui_crm.yml > /tmp/ui-crm.tar.gz.b64
          test -s /tmp/ui-crm.tar.gz.b64
          base64 --decode /tmp/ui-crm.tar.gz.b64 > /tmp/ui-crm.tar.gz
          tar -tzf /tmp/ui-crm.tar.gz >/dev/null
          tar -xzf /tmp/ui-crm.tar.gz
          rm -f .github/workflows/agent_export_source.yml
          rm -f .github/workflows/agent_apply_ui_crm.yml
      - name: Commit source changes
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "appstroy-agent"
          git config user.email "appstroy-agent@users.noreply.github.com"
          git add -A
          git commit -m "Унифицировать интерфейс и добавить CRM кандидатов [agent-ui-crm]"
          git push origin HEAD:agent/unify-ui-recruitment-crm-v2
