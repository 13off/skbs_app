name: Agent export source

on:
  push:
    branches:
      - agent/unify-ui-recruitment-crm
  workflow_dispatch:

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/unify-ui-recruitment-crm
          show-progress: false
      - name: Pack source
        run: |
          tar --exclude=.git --exclude=build --exclude=.dart_tool -czf /tmp/skbs_app_source.tar.gz .
      - uses: actions/upload-artifact@v4
        with:
          name: skbs-app-source
          path: /tmp/skbs_app_source.tar.gz
          retention-days: 1
