name: Agent apply UI CRM

on:
  pull_request:
    branches:
      - main
    types:
      - reopened

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'agent/unify-ui-recruitment-crm-v2'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/unify-ui-recruitment-crm-v2
          fetch-depth: 0
          show-progress: false

      - name: Verify and apply audited package
        shell: bash
        run: |
          set -euo pipefail
          cat .agent/ui_crm_part_00 \
              .agent/ui_crm_part_01 \
              .agent/ui_crm_part_02 \
              .agent/ui_crm_part_03 \
              .agent/ui_crm_part_04 \
              .agent/ui_crm_part_05 \
              .agent/ui_crm_part_06 > /tmp/ui-crm.tar.gz.b64
          actual_size="$(wc -c < /tmp/ui-crm.tar.gz.b64 | tr -d ' ')"
          test "$actual_size" = "41484"
          base64 --decode /tmp/ui-crm.tar.gz.b64 > /tmp/ui-crm.tar.gz
          tar -tzf /tmp/ui-crm.tar.gz >/dev/null
          tar -xzf /tmp/ui-crm.tar.gz
          rm -rf .agent
          rm -f .github/workflows/agent_export_source.yml
          rm -f .github/workflows/agent_apply_ui_crm.yml
          git diff --check

      - name: Commit source changes
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "appstroy-agent"
          git config user.email "appstroy-agent@users.noreply.github.com"
          git add -A
          git commit -m "Унифицировать интерфейс и добавить CRM кандидатов [agent-ui-crm]"
          git push origin HEAD:agent/unify-ui-recruitment-crm-v2
