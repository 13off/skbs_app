name: Apply recruitment documents and chat

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  patch-and-check:
    if: github.head_ref == 'feature/recruitment-documents-chat' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Apply recruitment patch
        run: python3 tool/apply_recruitment_documents_chat.py

      - uses: subosito/flutter-action@v2
        with:
          flutter-version-file: .fvmrc
          cache: true

      - name: Format and verify
        shell: bash
        run: |
          dart format \
            lib/features/recruitment \
            lib/data/app_data_sync.dart \
            test/recruitment_documents_chat_contract_test.dart
          flutter pub get
          flutter test
          flutter analyze --no-fatal-infos --no-fatal-warnings
          flutter build web --release --base-href /appstroy-web/

      - name: Commit checked changes
        shell: bash
        run: |
          rm tool/apply_recruitment_documents_chat.py
          rm .github/workflows/apply-recruitment-documents-chat.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Добавить документы и чат кандидата"
          git push origin HEAD:feature/recruitment-documents-chat
