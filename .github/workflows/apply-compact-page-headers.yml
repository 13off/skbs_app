name: Apply compact page headers

on:
  push:
    branches:
      - feature/compact-page-headers

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/compact-page-headers
          fetch-depth: 0

      - name: Compact shared page headers
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          def replace_once(text: str, old: str, new: str, label: str) -> str:
              if old not in text:
                  raise SystemExit(f'Pattern not found: {label}')
              return text.replace(old, new, 1)

          path = Path('lib/widgets/app_page.dart')
          text = path.read_text(encoding='utf-8')
          text = replace_once(
              text,
              'padding: const EdgeInsets.fromLTRB(18, 18, 18, 120),',
              'padding: const EdgeInsets.fromLTRB(14, 12, 14, 120),',
              'app page outer padding',
          )
          text = replace_once(
              text,
              '''                    const SizedBox(height: 18),
                    child,
''',
              '''                    const SizedBox(height: 14),
                    child,
''',
              'app page header gap',
          )
          text = text.replace(
              'const PremiumBrandMark(size: 50, animate: false)',
              'const PremiumBrandMark(size: 40, animate: false)',
              1,
          )
          text = text.replace(
              'const SizedBox(width: 16),',
              'const SizedBox(width: 12),',
          )
          text = text.replace('fontSize: 11,', 'fontSize: 10,', 1)
          text = text.replace('letterSpacing: 0.75,', 'letterSpacing: 0.55,', 1)
          text = text.replace(
              'const SizedBox(height: 8),',
              'const SizedBox(height: 6),',
          )
          text = text.replace('fontSize: 30,', 'fontSize: 24,', 1)
          text = text.replace('height: 1.02,', 'height: 1.05,', 1)
          text = text.replace('letterSpacing: -0.8,', 'letterSpacing: -0.45,', 1)
          text = text.replace('fontSize: 15,', 'fontSize: 13,', 1)
          text = text.replace('radius: 30,', 'radius: 24,', 1)
          text = text.replace(
              'padding: const EdgeInsets.fromLTRB(20, 18, 20, 20),',
              'padding: const EdgeInsets.fromLTRB(16, 14, 16, 16),',
              1,
          )
          text = text.replace(
              'const SizedBox(height: 16),',
              'const SizedBox(height: 12),',
              1,
          )
          path.write_text(text, encoding='utf-8')

          path = Path('lib/features/shared/presentation/specialist_desktop_ui.dart')
          text = path.read_text(encoding='utf-8')
          text = replace_once(
              text,
              'padding: const EdgeInsets.fromLTRB(28, 24, 28, 120),',
              'padding: const EdgeInsets.fromLTRB(24, 18, 24, 120),',
              'desktop page outer padding',
          )
          text = replace_once(
              text,
              '''                const SizedBox(height: 18),
                ...children,
''',
              '''                const SizedBox(height: 14),
                ...children,
''',
              'desktop header gap',
          )
          path.write_text(text, encoding='utf-8')

          path = Path('lib/screens/home_screen.dart')
          text = path.read_text(encoding='utf-8')
          old_header = '''  Widget buildHeader(BuildContext context, DateTime today) {
    return Column(
      crossAxisAlignment: CrossAxisAlignment.stretch,
      children: [
        Row(
          children: [
            const Expanded(
              child: Text(
                'Главная',
                style: TextStyle(
                  color: _text,
                  fontSize: 24,
                  fontWeight: FontWeight.w900,
                ),
              ),
            ),
            NotificationBell(selectedObjectName: widget.selectedObjectName),
          ],
        ),
        const SizedBox(height: 10),
        PremiumWorkCard(
          radius: 20,
          padding: const EdgeInsets.all(10),
          child: Column(
            crossAxisAlignment: CrossAxisAlignment.stretch,
            children: [
              Row(
                children: [
                  const Icon(
                    Icons.calendar_month_outlined,
                    color: _muted,
                    size: 18,
                  ),
                  const SizedBox(width: 8),
                  Text(
                    'Сегодня, ${dateText(today)}',
                    style: const TextStyle(
                      color: _muted,
                      fontSize: 14,
                      fontWeight: FontWeight.w700,
                    ),
                  ),
                ],
              ),
              const SizedBox(height: 8),
              buildObjectSelector(context),
            ],
          ),
        ),
      ],
    );
  }
'''
          new_header = '''  Widget buildHeader(BuildContext context, DateTime today) {
    return Column(
      crossAxisAlignment: CrossAxisAlignment.stretch,
      children: [
        Row(
          children: [
            const Expanded(
              child: Text(
                'Главная',
                style: TextStyle(
                  color: _text,
                  fontSize: 20,
                  fontWeight: FontWeight.w900,
                ),
              ),
            ),
            NotificationBell(selectedObjectName: widget.selectedObjectName),
          ],
        ),
        const SizedBox(height: 8),
        PremiumWorkCard(
          radius: 18,
          padding: const EdgeInsets.all(8),
          child: Column(
            crossAxisAlignment: CrossAxisAlignment.stretch,
            children: [
              Row(
                children: [
                  const Icon(
                    Icons.calendar_month_outlined,
                    color: _muted,
                    size: 16,
                  ),
                  const SizedBox(width: 7),
                  Text(
                    'Сегодня, ${dateText(today)}',
                    style: const TextStyle(
                      color: _muted,
                      fontSize: 13,
                      fontWeight: FontWeight.w700,
                    ),
                  ),
                ],
              ),
              const SizedBox(height: 6),
              buildObjectSelector(context),
            ],
          ),
        ),
      ],
    );
  }
'''
          text = replace_once(text, old_header, new_header, 'compact home header')
          path.write_text(text, encoding='utf-8')

          Path('test/compact_page_headers_contract_test.dart').write_text(
              '''import 'dart:io';

import 'package:flutter_test/flutter_test.dart';

String source(String path) => File(path).readAsStringSync();

void main() {
  test('all role tabs use the compact shared page header', () {
    final header = source('lib/widgets/app_page.dart');
    final specialist = source(
      'lib/features/shared/presentation/specialist_desktop_ui.dart',
    );

    expect(header, contains('PremiumBrandMark(size: 40'));
    expect(header, contains('fontSize: 24'));
    expect(header, contains('radius: 24'));
    expect(header, isNot(contains('fontSize: 30')));
    expect(specialist, contains('AppPageHeader('));
    expect(
      specialist,
      contains('EdgeInsets.fromLTRB(24, 18, 24, 120)'),
    );
  });

  test('home tab keeps its separate compact title', () {
    final home = source('lib/screens/home_screen.dart');

    expect(home, contains("'Главная'"));
    expect(home, contains('fontSize: 20'));
    expect(home, contains('radius: 18'));
  });
}
''',
              encoding='utf-8',
          )
          PY

      - uses: subosito/flutter-action@v2
        with:
          flutter-version-file: .fvmrc
          cache: true

      - name: Format and verify
        shell: bash
        run: |
          dart format \
            lib/widgets/app_page.dart \
            lib/features/shared/presentation/specialist_desktop_ui.dart \
            lib/screens/home_screen.dart \
            test/compact_page_headers_contract_test.dart
          flutter pub get --enforce-lockfile
          flutter test
          flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Commit result
        shell: bash
        run: |
          rm .github/workflows/apply-compact-page-headers.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Уменьшить заголовки во всех ролях"
          git push origin HEAD:feature/compact-page-headers
