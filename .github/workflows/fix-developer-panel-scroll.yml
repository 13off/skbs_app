name: Fix developer panel scroll

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write

jobs:
  fix-and-validate:
    if: github.head_ref == 'agent/fix-developer-panel-scroll'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: agent/fix-developer-panel-scroll
          fetch-depth: 0
          persist-credentials: true
          show-progress: false

      - name: Patch desktop scrolling
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('lib/features/developer/presentation/developer_panel_screen.dart')
          text = path.read_text(encoding='utf-8')

          replacements = [
              (
                  """                  final selector = _buildSelector();
                  final editor = _buildEditor();""",
                  """                  final selector = _buildSelector(scrollable: desktop);
                  final editor = _buildEditor(scrollable: desktop);""",
              ),
              (
                  """  Widget _buildSelector() {
    final value = center!;
    return ListView(
      shrinkWrap: true,
      physics: const NeverScrollableScrollPhysics(),""",
                  """  Widget _buildSelector({required bool scrollable}) {
    final value = center!;
    return ListView(
      primary: false,
      shrinkWrap: !scrollable,
      physics: scrollable
          ? const AlwaysScrollableScrollPhysics()
          : const NeverScrollableScrollPhysics(),""",
              ),
              (
                  """  Widget _buildEditor() {
    final object = selectedObject;
    return ListView(
      shrinkWrap: true,
      physics: const NeverScrollableScrollPhysics(),""",
                  """  Widget _buildEditor({required bool scrollable}) {
    final object = selectedObject;
    return ListView(
      primary: false,
      shrinkWrap: !scrollable,
      physics: scrollable
          ? const AlwaysScrollableScrollPhysics()
          : const NeverScrollableScrollPhysics(),""",
              ),
          ]

          for old, new in replacements:
              count = text.count(old)
              if count != 1:
                  raise RuntimeError(f'Expected exactly one match, found {count}: {old[:80]!r}')
              text = text.replace(old, new)

          path.write_text(text, encoding='utf-8')
          PY

          cat > test/developer_panel_scroll_contract_test.dart <<'DART'
          import 'dart:io';

          import 'package:flutter_test/flutter_test.dart';

          void main() {
            test('developer panel scrolls independently on desktop', () {
              final source = File(
                'lib/features/developer/presentation/developer_panel_screen.dart',
              ).readAsStringSync();

              expect(source, contains('_buildSelector(scrollable: desktop)'));
              expect(source, contains('_buildEditor(scrollable: desktop)'));
              expect(source, contains('primary: false'));
              expect(source, contains('shrinkWrap: !scrollable'));
              expect(source, contains('AlwaysScrollableScrollPhysics'));
              expect(
                RegExp(r'NeverScrollableScrollPhysics').allMatches(source).length,
                greaterThanOrEqualTo(2),
              );
            });
          }
          DART

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version-file: .fvmrc
          cache: true

      - name: Format changed Dart files
        run: dart format lib/features/developer/presentation/developer_panel_screen.dart test/developer_panel_scroll_contract_test.dart

      - name: Install locked dependencies
        run: flutter pub get --enforce-lockfile >/dev/null

      - name: Analyze source
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Run regression tests
        run: flutter test --reporter compact

      - name: Build web release
        run: flutter build web --release --base-href /appstroy-web/

      - name: Commit fix and remove temporary workflow
        shell: bash
        run: |
          rm -f .github/workflows/fix-developer-panel-scroll.yml
          git config user.name "AppStroy Automation"
          git config user.email "actions@users.noreply.github.com"
          git add lib/features/developer/presentation/developer_panel_screen.dart test/developer_panel_scroll_contract_test.dart .github/workflows/fix-developer-panel-scroll.yml
          git commit -m "Исправить прокрутку панели разработчика"
          git push origin HEAD:agent/fix-developer-panel-scroll

# synchronize trigger
