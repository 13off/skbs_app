name: Apply foreman task edit follow-up

on:
  pull_request:
    types: [synchronize, reopened]
    branches: [main]

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'feature/foreman-task-edit-window'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          token: ${{ github.token }}
          fetch-depth: 0

      - name: Apply follow-up patch
        run: python3 tooling/apply_foreman_task_edit_followup.py

      - name: Remove temporary tooling
        run: |
          rm -f tooling/apply_foreman_task_edit_followup.py
          rm -f .github/workflows/apply-foreman-task-edit-followup.yml

      - name: Commit follow-up
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Закрыть все поля задачи после окончания дня"
          git push origin HEAD:${{ github.head_ref }}
