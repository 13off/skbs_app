name: Agent apply company chat

on:
  push:
    branches:
      - agent/company-chat-ai
    paths:
      - .agent/company_chat_apply_*
      - .github/workflows/agent_apply_company_chat.yml

permissions:
  contents: write

concurrency:
  group: agent-apply-company-chat-${{ github.ref }}
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Apply prepared source package
        shell: bash
        run: |
          set -euo pipefail
          cat .agent/company_chat_apply_* | base64 --decode > /tmp/company-chat-update.tar.gz
          echo "960e052fd815c1f26843f137a3d5132604daa72e51aebc7337f97db0280ad097  /tmp/company-chat-update.tar.gz" | sha256sum --check -
          tar -xzf /tmp/company-chat-update.tar.gz -C .
          rm -f .agent/company_chat_* \
            .github/workflows/agent_export_company_chat_source.yml \
            .github/workflows/agent_apply_company_chat.yml
          rmdir .agent 2>/dev/null || true

      - name: Commit implementation
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "Добавить чат компании с ИИ-помощником"
          git push origin HEAD:${{ github.ref_name }}
