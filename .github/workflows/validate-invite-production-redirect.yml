name: Validate invitation production redirect

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: invite-production-redirect
  cancel-in-progress: true

jobs:
  apply-test-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout hotfix branch
        uses: actions/checkout@v4
        with:
          ref: hotfix/invite-production-redirect
          persist-credentials: true

      - name: Apply redirect hotfix
        run: python3 tool/apply_invite_redirect_hotfix.py

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version-file: .fvmrc
          cache: true

      - name: Install locked dependencies
        run: flutter pub get --enforce-lockfile

      - name: Format changed Dart files
        run: |
          dart format \
            lib/features/auth/data/user_repository.dart \
            test/invitation_redirect_contract_test.dart

      - name: Commit generated hotfix
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            lib/features/auth/data/user_repository.dart \
            supabase/functions/invite-company-member/index.ts \
            test/invitation_redirect_contract_test.dart
          git commit -m "приглашения направлены только на опубликованный AppСтрой" || true
          git push origin HEAD:hotfix/invite-production-redirect

      - name: Validate tests analysis and web build
        run: |
          flutter test
          flutter analyze --no-fatal-infos --no-fatal-warnings
          flutter build web --release --base-href /appstroy-web/

      - name: Remove temporary files
        shell: bash
        run: |
          rm -f tool/apply_invite_redirect_hotfix.py
          rm -f .github/workflows/validate-invite-production-redirect.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "завершена проверка адреса приглашений"
          git push origin HEAD:hotfix/invite-production-redirect
