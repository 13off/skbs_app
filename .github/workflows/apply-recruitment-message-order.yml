name: Apply recruitment message order

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  patch-and-check:
    if: github.head_ref == 'fix/recruitment-message-order' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Apply message order fix
        run: python3 tool/apply_recruitment_message_order.py

      - uses: subosito/flutter-action@v2
        with:
          flutter-version-file: .fvmrc
          cache: true

      - name: Run verification
        run: |
          dart format lib/features/recruitment/data/recruitment_repository.dart lib/features/recruitment/presentation/recruitment_application_detail_screen.dart test/recruitment_documents_chat_contract_test.dart
          flutter pub get
          flutter test
          flutter analyze --no-fatal-infos --no-fatal-warnings
          flutter build web --release --base-href /appstroy-web/

      - name: Commit verified changes
        run: |
          rm tool/apply_recruitment_message_order.py
          rm .github/workflows/apply-recruitment-message-order.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Исправить порядок сообщений кандидата"
          git push origin HEAD:fix/recruitment-message-order
