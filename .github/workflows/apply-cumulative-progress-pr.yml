name: Apply cumulative progress PR patch

on:
  pull_request_target:
    types: [opened, synchronize, reopened]
    paths:
      - tool/apply_cumulative_task_progress.py

permissions:
  contents: write
  pull-requests: read

jobs:
  apply:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
      - run: python3 tool/apply_cumulative_task_progress.py
      - run: rm -f .github/workflows/apply-cumulative-task-progress.yml tool/apply_cumulative_task_progress.py
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: added cumulative daily task progress
          branch: ${{ github.event.pull_request.head.ref }}
