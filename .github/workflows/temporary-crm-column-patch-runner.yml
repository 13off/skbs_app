name: Temporary CRM column patch runner

on:
  push:
    branches:
      - fix/crm-column-order-persistence

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/crm-column-order-persistence
          fetch-depth: 0

      - name: Run branch patch script
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import textwrap

          workflow = Path('.github/workflows/apply-crm-column-order-fix.yml')
          source = workflow.read_text(encoding='utf-8')
          start = source.index('          from pathlib import Path')
          end = source.index('\n          PY', start)
          code = textwrap.dedent(source[start:end])
          exec(compile(code, str(workflow), 'exec'))
          PY

      - name: Commit patch
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Исправить сохранение порядка колонок CRM"
          git push origin HEAD:fix/crm-column-order-persistence
