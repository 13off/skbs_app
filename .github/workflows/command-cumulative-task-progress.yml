name: Command cumulative task progress

on:
  issue_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: read

jobs:
  apply:
    if: github.event.issue.pull_request && contains(github.event.comment.body, '/apply-cumulative-progress')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/cumulative-task-progress
      - run: python3 tool/apply_cumulative_task_progress.py
      - run: rm -f .github/workflows/apply-cumulative-task-progress.yml tool/apply_cumulative_task_progress.py
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: added cumulative daily task progress
          branch: feature/cumulative-task-progress
