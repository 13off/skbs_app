name: Agent fix CRM edge row types

on:
  pull_request:
    branches:
      - main
    types:
      - reopened

permissions:
  contents: write

jobs:
  fix:
    if: github.head_ref == 'agent/recruitment-crm-full'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/recruitment-crm-full
          fetch-depth: 0
          show-progress: false
      - name: Add row type annotations
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          path = Path('supabase/functions/run-recruitment-crm-automations/index.ts')
          source = path.read_text()
          source = source.replace(
              '    const applications = (applicationsData ?? []).map((raw) => {',
              '    const applications: ApplicationRow[] = (applicationsData ?? []).map((raw: JsonMap) => {',
          )
          source = source.replace(
              '    const allowedCompanies = new Set((memberships ?? []).map((row) => String(row.company_id)));',
              '    const allowedCompanies = new Set((memberships ?? []).map((row: JsonMap) => String(row.company_id)));',
          )
          path.write_text(source)
          PY
          rm -f .github/workflows/agent_fix_crm_edge_rows.yml
          git diff --check
      - name: Commit fix
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "appstroy-agent"
          git config user.email "appstroy-agent@users.noreply.github.com"
          git add -A
          git commit -m "Уточнить типы строк CRM-автоматизации [agent-crm-row-types]"
          git push origin HEAD:agent/recruitment-crm-full
