name: Restore payment report const contract

on:
  pull_request:
    branches:
      - main
    paths:
      - tool/restore_payment_report_const.trigger

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Prepare pull request branch
        run: git switch -C "${GITHUB_HEAD_REF}"

      - name: Restore exact functional contract
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('lib/features/payments/presentation/screens/payments_screen.dart')
          text = path.read_text(encoding='utf-8')
          old = "label: Text('Отчёт'),"
          new = "label: const Text('Отчёт'),"
          if old not in text:
              raise SystemExit('payment report label fragment not found')
          path.write_text(text.replace(old, new, 1), encoding='utf-8')
          PY

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version-file: .fvmrc
          cache: true

      - name: Install locked dependencies
        run: flutter pub get --enforce-lockfile

      - name: Format and test contracts
        run: |
          dart format lib/features/payments/presentation/screens/payments_screen.dart
          flutter test test/dark_theme_business_screens_contract_test.dart
          flutter test test/functional_contract_test.dart
          flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Remove temporary files
        run: |
          rm -f .github/workflows/restore-payment-report-const.yml
          rm -f tool/restore_payment_report_const.trigger

      - name: Commit validated fix
        uses: stefanzweifel/git-auto-commit-action@v6
        with:
          branch: ${{ github.head_ref }}
          commit_message: сохранён контракт кнопки отчёта выплат
          file_pattern: .
