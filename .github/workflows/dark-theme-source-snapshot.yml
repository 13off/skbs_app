name: Dark Theme Source Snapshot

on:
  push:
    branches:
      - agent/enable-dark-theme
    paths:
      - .github/workflows/dark-theme-source-snapshot.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          show-progress: false
      - name: Upload source snapshot
        uses: actions/upload-artifact@v4
        with:
          name: dark-theme-source
          path: |
            .
            !.git
          include-hidden-files: true
          retention-days: 1
