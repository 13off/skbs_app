name: Deploy notification control edge

on:
  push:
    branches:
      - feature/notification-control-center

permissions:
  contents: read

jobs:
  deploy:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/notification-control-center

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy dispatch-push-job
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          test -n "$SUPABASE_ACCESS_TOKEN"
          supabase functions deploy dispatch-push-job \
            --project-ref dxbrhsefgxcaxzmrbfrb \
            --no-verify-jwt
